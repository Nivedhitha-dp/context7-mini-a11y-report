<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    /* CSS custom properties for easy theming and high-contrast overrides */
    :root {
      --color-bg: #ffffff;
      --color-surface: #f8f9fa;
      --color-border: #6b7280;
      --color-border-focus: #1d4ed8;
      --color-text: #111827;
      --color-text-muted: #374151;
      --color-helper: #4b5563;
      --color-error: #b91c1c;
      --color-accent: #1d4ed8;
      --color-accent-hover: #1e40af;
      --color-btn-text: #ffffff;
      --radius: 6px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
    }

    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      /* 4.5:1+ contrast: #111827 on #ffffff = ~18:1 */
      line-height: 1.6;
      padding: var(--spacing-xl) var(--spacing-md);
    }

    /* Skip link: hidden until focused, lets keyboard users bypass repeated content */
    .skip-link {
      position: absolute;
      top: -999px;
      left: -999px;
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--color-accent);
      color: var(--color-btn-text);
      font-weight: 600;
      border-radius: var(--radius);
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus {
      top: var(--spacing-sm);
      left: var(--spacing-sm);
    }

    main {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: var(--spacing-lg);
      color: var(--color-text);
    }

    form {
      background: var(--color-surface);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius);
      padding: var(--spacing-xl);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    /* Each form-field wraps: label, input (or input+optional badge), helper text */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    .field-label-row {
      display: flex;
      align-items: baseline;
      gap: var(--spacing-sm);
    }

    label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-text);
    }

    /* Visual required indicator — paired with aria-required on the input so screen readers announce it */
    .required-mark {
      color: var(--color-error);
      /* aria-hidden so screen readers rely on aria-required instead, avoiding duplicate announcement */
      font-size: 1rem;
    }

    .optional-badge {
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--color-helper);
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--color-text);
      background: var(--color-bg);
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      transition: border-color 0.15s ease;
    }

    input[type="text"]:hover,
    input[type="email"]:hover,
    input[type="tel"]:hover {
      border-color: var(--color-accent);
    }

    /* Visible focus style: 3px outline offset from element — meets 3:1 UI component contrast */
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 3px solid var(--color-border-focus);
      outline-offset: 2px;
      border-color: var(--color-border-focus);
    }

    /* Helper text linked via aria-describedby so screen readers announce it after the field label */
    .helper-text {
      font-size: 0.8125rem;
      color: var(--color-helper);
      /* #4b5563 on #f8f9fa = ~7.2:1 — well above 4.5:1 minimum */
    }

    button[type="submit"] {
      align-self: flex-start;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--color-btn-text);
      background: var(--color-accent);
      /* #ffffff on #1d4ed8 = ~7.3:1 contrast — passes AA */
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s ease;
      /* Minimum 44×44px touch target */
      min-height: 44px;
      min-width: 44px;
    }

    button[type="submit"]:hover {
      background: var(--color-accent-hover);
    }

    button[type="submit"]:focus-visible {
      outline: 3px solid var(--color-border-focus);
      outline-offset: 3px;
    }

    /* Respect user preference for reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }

    /* Ensure layout holds at 320px (WCAG 1.4.10 Reflow) */
    @media (max-width: 360px) {
      form { padding: var(--spacing-md); }
      button[type="submit"] { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Skip link: first focusable element, allows keyboard users to bypass the form heading -->
  <a href="#contact-form" class="skip-link">Skip to form</a>

  <main>
    <h1>Contact Us</h1>

    <form
      id="contact-form"
      aria-label="Contact form"
      novalidate
    >

      <!-- Full Name field -->
      <div class="form-field">
        <div class="field-label-row">
          <!--
            for="full-name" associates this label with the input programmatically.
            aria-hidden on the asterisk prevents "star" being read by screen readers;
            aria-required="true" on the input conveys required status instead.
          -->
          <label for="full-name">Full Name</label>
          <span class="required-mark" aria-hidden="true">*</span>
        </div>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          aria-required="true"
          spellcheck="false"
        >
      </div>

      <!-- Email Address field — helper text linked via aria-describedby -->
      <div class="form-field">
        <div class="field-label-row">
          <label for="email">Email Address</label>
          <span class="required-mark" aria-hidden="true">*</span>
        </div>
        <!--
          aria-describedby="email-hint" links the helper text to this input.
          Screen readers will announce the label first, then the hint after a brief pause.
        -->
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          aria-required="true"
          aria-describedby="email-hint"
          inputmode="email"
          spellcheck="false"
        >
        <span id="email-hint" class="helper-text">
          Enter a valid email address, e.g. name@example.com
        </span>
      </div>

      <!-- Phone Number field — optional, helper text linked via aria-describedby -->
      <div class="form-field">
        <div class="field-label-row">
          <label for="phone">Phone Number</label>
          <!--
            "(optional)" is surfaced as visible text in a badge rather than relying on
            the absence of an asterisk, which is a color-only / convention-only signal.
          -->
          <span class="optional-badge">(optional)</span>
        </div>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-required="false"
          aria-describedby="phone-hint"
          inputmode="tel"
        >
        <span id="phone-hint" class="helper-text">
          Preferred format: (555) 555-5555 or +1 555 555 5555
        </span>
      </div>

      <!--
        <button type="submit"> is used (not <input type="submit"> or a <div>)
        so it inherits implicit button role and is keyboard-operable by default.
      -->
      <button type="submit">Send Message</button>

    </form>
  </main>

</body>
</html>
