<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    /* CSS custom properties for consistent theming and high-contrast overrides */
    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --color-label: #2d2d2d;
      --color-helper: #595959;
      --color-border: #767676;
      --color-border-focus: #0057b8;
      --color-accent: #0057b8;
      --color-accent-hover: #003d82;
      --color-required: #b91c1c;
      --color-input-bg: #ffffff;
      --radius: 6px;
      --spacing-field: 1.5rem;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    /* skip-link: lets keyboard users bypass page chrome and jump to the form */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 1rem;
      padding: 0.5rem 1rem;
      background: var(--color-accent);
      color: #fff;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 1rem;
    }

    main {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
      color: var(--color-text);
    }

    /* required-note: communicates the * convention before the form so users understand upfront */
    .required-note {
      font-size: 0.875rem;
      color: var(--color-helper);
      margin-bottom: 2rem;
    }
    .required-note span[aria-hidden="true"] {
      color: var(--color-required);
      font-weight: 700;
      margin-right: 0.125rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-field);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-label);
    }

    /* required-star: aria-hidden so screen readers rely on aria-required on the input instead */
    .required-star {
      color: var(--color-required);
      font-weight: 700;
      margin-left: 0.125rem;
      aria-hidden: true; /* duplicated via aria-required on input */
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--color-text);
      background: var(--color-input-bg);
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      transition: border-color 0.15s ease;
      /* min touch target height: 44px per WCAG 2.5.5 */
      min-height: 44px;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 3px solid var(--color-border-focus);
      outline-offset: 2px;
      border-color: var(--color-border-focus);
    }

    /* helper text: color meets 4.5:1 on white (#595959 on #fff = 7:1) */
    .helper-text {
      font-size: 0.8125rem;
      color: var(--color-helper);
    }

    .submit-btn {
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #ffffff;
      background: var(--color-accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s ease;
      align-self: flex-start;
    }

    .submit-btn:hover {
      background: var(--color-accent-hover);
    }

    /* Visible focus ring on the button that meets 3:1 UI component contrast */
    .submit-btn:focus-visible {
      outline: 3px solid var(--color-border-focus);
      outline-offset: 3px;
    }

    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      input, .submit-btn {
        transition: none;
      }
    }

    /* Responsive: readable at 320px and when zoomed to 200% */
    @media (max-width: 400px) {
      .submit-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- skip-link: first focusable element so keyboard users can reach the form directly -->
  <a href="#contact-form" class="skip-link">Skip to contact form</a>

  <main>
    <h1>Contact Us</h1>

    <!-- Explains the * required convention before the form starts, meeting WCAG 3.3.2 -->
    <p class="required-note">
      <span aria-hidden="true">*</span> Indicates a required field
    </p>

    <form id="contact-form" novalidate>

      <div class="form-field">
        <label for="full-name">
          Full Name
          <!-- aria-hidden hides the star from screen readers; aria-required on input conveys requirement -->
          <span class="required-star" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-star" aria-hidden="true">*</span>
        </label>
        <!-- aria-describedby links the input to its helper text so screen readers announce it after the label -->
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-helper"
        >
        <span class="helper-text" id="email-helper">
          Enter your email in the format name@example.com
        </span>
      </div>

      <div class="form-field">
        <label for="phone">
          Phone Number
          <!-- No required-star: field is optional — absence of star communicates that -->
        </label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-helper"
        >
        <span class="helper-text" id="phone-helper">
          Preferred format: (123) 456-7890
        </span>
      </div>

      <button type="submit" class="submit-btn">Submit</button>

    </form>
  </main>

</body>
</html>
