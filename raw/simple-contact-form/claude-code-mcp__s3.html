<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f5;
      margin: 0;
      padding: 2rem 1rem;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.25rem;
    }

    .required-note {
      font-size: 0.875rem;
      color: #555;
      margin: 0 0 1.5rem;
    }

    .required-note abbr {
      text-decoration: none;
      color: #c00;
      font-weight: bold;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .required-marker {
      color: #c00;
      font-weight: bold;
      margin-left: 0.125rem;
      aria-hidden: true;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #767676;
      border-radius: 4px;
      width: 100%;
      color: #1a1a1a;
      background: #fff;
      transition: border-color 0.15s, outline 0.15s;
    }

    input:focus {
      outline: 3px solid #005fcc;
      outline-offset: 1px;
      border-color: #005fcc;
    }

    .helper-text {
      font-size: 0.8125rem;
      color: #555;
    }

    button[type="submit"] {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      color: #fff;
      background: #005fcc;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #0047a3;
    }

    button[type="submit"]:focus {
      outline: 3px solid #005fcc;
      outline-offset: 3px;
      background: #0047a3;
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-note">Fields marked <abbr title="required">*</abbr> are required.</p>

    <form novalidate>
      <div class="form-field">
        <label for="full-name">
          Full Name<span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          required
          aria-required="true"
          autocomplete="name"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address<span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          autocomplete="email"
          inputmode="email"
        >
        <span id="email-hint" class="helper-text">Enter a valid email address, for example: name@example.com</span>
      </div>

      <div class="form-field">
        <label for="phone">
          Phone Number <span style="font-weight:400; color:#555;">(optional)</span>
        </label>
        <input
          type="tel"
          id="phone"
          name="phone"
          aria-describedby="phone-hint"
          autocomplete="tel"
          inputmode="tel"
        >
        <span id="phone-hint" class="helper-text">Preferred format: (555) 555-5555</span>
      </div>

      <button type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
