<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .required-note {
      font-size: 0.875rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .required-note span[aria-hidden] {
      color: #c00;
      font-weight: bold;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    label .required-marker {
      color: #c00;
      margin-left: 0.2em;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      font-size: 1rem;
      padding: 0.5rem 0.75rem;
      border: 2px solid #767676;
      border-radius: 4px;
      color: #1a1a1a;
      background: #fff;
      width: 100%;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 3px solid #005fcc;
      outline-offset: 2px;
      border-color: #005fcc;
    }

    .helper-text {
      font-size: 0.8125rem;
      color: #555;
      line-height: 1.4;
    }

    button[type="submit"] {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.65rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      background: #005fcc;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #0047a3;
    }

    button[type="submit"]:focus {
      outline: 3px solid #005fcc;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-note">Fields marked <span aria-hidden="true">*</span><span class="sr-only">with an asterisk</span> are required.</p>

    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <form novalidate>
      <div class="form-field">
        <label for="full-name">
          Full Name
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          required
          aria-required="true"
          autocomplete="name"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          required
          aria-required="true"
          aria-describedby="email-helper"
          autocomplete="email"
        >
        <span id="email-helper" class="helper-text">
          Enter a valid email address, for example: name@example.com
        </span>
      </div>

      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          aria-describedby="phone-helper"
          autocomplete="tel"
        >
        <span id="phone-helper" class="helper-text">
          Optional. Preferred format: (555) 555-5555
        </span>
      </div>

      <button type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
