<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      background: #fff;
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.75rem;
      color: #111;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: .375rem;
      margin-bottom: 1.5rem;
    }

    label {
      font-weight: 600;
      font-size: .9375rem;
      color: #1a1a1a;
    }

    label .required-marker {
      color: #c0392b;
      margin-left: .2em;
      aria-hidden: true;
    }

    .required-text {
      font-size: .8125rem;
      font-weight: 400;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      padding: .625rem .75rem;
      font-size: 1rem;
      border: 2px solid #767676;
      border-radius: 4px;
      color: #1a1a1a;
      background: #fff;
      width: 100%;
      transition: border-color .15s, outline .15s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 3px solid #005fcc;
      outline-offset: 1px;
      border-color: #005fcc;
    }

    .helper-text {
      font-size: .8125rem;
      color: #555;
      line-height: 1.4;
    }

    .required-legend {
      font-size: .8125rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: .75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #005fcc;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: .5rem;
      transition: background .15s;
    }

    button[type="submit"]:hover {
      background: #004aa0;
    }

    button[type="submit"]:focus-visible {
      outline: 3px solid #005fcc;
      outline-offset: 3px;
      background: #004aa0;
    }

    button[type="submit"]:active {
      background: #003880;
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-legend">
      Fields marked with <span aria-hidden="true">*</span><span class="sr-only">an asterisk</span> are required.
    </p>

    <form novalidate>

      <div class="form-field">
        <label for="full-name">
          Full Name
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          spellcheck="false"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-helper"
          inputmode="email"
          spellcheck="false"
        >
        <span id="email-helper" class="helper-text">
          Enter a valid email address, for example: name@example.com
        </span>
      </div>

      <div class="form-field">
        <label for="phone">
          Phone Number
          <span class="required-text">(optional)</span>
        </label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-helper"
          inputmode="tel"
        >
        <span id="phone-helper" class="helper-text">
          Preferred format: (555) 555-5555. Include country code for international numbers, e.g. +1 555 555 5555.
        </span>
      </div>

      <button type="submit">Send Message</button>

    </form>
  </main>

  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</body>
</html>
