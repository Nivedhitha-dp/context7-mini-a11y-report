<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.75rem;
      color: #111;
    }

    .form-field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      color: #1a1a1a;
    }

    .required-indicator {
      color: #c0392b;
      margin-left: 0.25rem;
      aria-hidden: true;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      display: block;
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      border: 2px solid #767676;
      border-radius: 4px;
      color: #1a1a1a;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: none;
      border-color: #0057b8;
      box-shadow: 0 0 0 3px rgba(0, 87, 184, 0.25);
    }

    input[aria-invalid="true"] {
      border-color: #c0392b;
    }

    .helper-text {
      margin-top: 0.375rem;
      font-size: 0.875rem;
      color: #595959;
      line-height: 1.4;
    }

    .optional-badge {
      font-size: 0.8125rem;
      font-weight: 400;
      color: #595959;
      margin-left: 0.375rem;
    }

    button[type="submit"] {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #0057b8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #004494;
    }

    button[type="submit"]:focus-visible {
      outline: 3px solid #0057b8;
      outline-offset: 3px;
      box-shadow: 0 0 0 5px rgba(0, 87, 184, 0.25);
    }

    .required-note {
      font-size: 0.875rem;
      color: #595959;
      margin-bottom: 1.25rem;
    }

    .required-note span {
      color: #c0392b;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-note">Fields marked <span aria-hidden="true">*</span><span class="sr-only">with an asterisk</span> are required.</p>

    <form novalidate>
      <div class="form-field">
        <label for="full-name">
          Full Name<span class="required-indicator" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address<span class="required-indicator" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
        >
        <p id="email-hint" class="helper-text">Enter your email address, e.g. name@example.com</p>
      </div>

      <div class="form-field">
        <label for="phone">
          Phone Number<span class="optional-badge">(optional)</span>
        </label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
        >
        <p id="phone-hint" class="helper-text">Include area code, e.g. (555) 123-4567</p>
      </div>

      <button type="submit">Submit</button>
    </form>
  </main>

  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</body>
</html>
