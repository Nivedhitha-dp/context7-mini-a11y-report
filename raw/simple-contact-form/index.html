<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <style>
    /* ── Reset / tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #005fcc;   /* button bg, focus ring — white text 7.03:1 ✓ SC 1.4.3 */
      --accent-dark:  #004ab8;   /* button hover — white text 9.10:1 ✓ */
      --text:         #111827;   /* body text — on white 18.7:1 ✓ */
      --text-muted:   #4b5563;   /* helper text — on white 7.12:1 ✓ SC 1.4.3 */
      --border:       #6b7280;   /* input border — on white 4.59:1 ✓ SC 1.4.11 */
      --border-focus: #005fcc;   /* focused input border — same as accent */
      --error:        #b91c1c;   /* error text/icon — on white 6.47:1 ✓ SC 1.4.3 */
      --error-bg:     #fef2f2;   /* error field background */
      --bg-page:      #f3f4f6;
      --bg-card:      #ffffff;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Form card ───────────────────────────────────────────────────── */
    .form-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border-radius: 0.75rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2rem;
    }

    /* ── Page heading ────────────────────────────────────────────────── */
    /*
     * H1 is the accessible name source for the form via aria-labelledby.
     * Only one H1 per page (SC 1.3.1).
     */
    .form-heading {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e3a5f;           /* on white 13.5:1 ✓ */
      margin-bottom: 0.25rem;
    }

    .form-subheading {
      font-size: 0.9375rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    /* ── Required-field note ─────────────────────────────────────────── */
    /*
     * Explains the asterisk convention before any starred field appears.
     * SC 3.3.2 (Labels or Instructions) — users must know what * means.
     */
    .required-note {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .required-note .asterisk {
      color: var(--error);
      font-weight: 700;
    }

    /* ── Form layout ─────────────────────────────────────────────────── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── div.form-field — wraps label + input + helper + error ───────── */
    /*
     * Each field group is a div.form-field as specified.
     * Contains: <label>, <input>, helper text <span>, error <span>.
     */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    /* ── Label ───────────────────────────────────────────────────────── */
    /*
     * Visible label permanently associated with its input via for/id.
     * Placeholder alone is NOT a label (fails SC 1.3.1 + 3.3.2).
     * Required asterisk is aria-hidden (screen reader gets state from
     * the `required` attribute on the input — not from reading "asterisk").
     */
    .form-field label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .form-field label .asterisk {
      /* aria-hidden on the span prevents "asterisk" being read aloud;
         the `required` attribute conveys required state to AT. */
      color: var(--error);
      font-weight: 700;
      margin-left: 0.1em;
    }

    .form-field label .optional-tag {
      font-weight: 400;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-left: 0.25em;
    }

    /* ── Input ───────────────────────────────────────────────────────── */
    /*
     * Border #6b7280 on white = 4.59:1 ✓ SC 1.4.11 (≥3:1 for UI components).
     * :focus-visible provides keyboard-only focus ring (SC 2.4.7 / 2.4.11).
     * No outline:none without replacement — outline is mandatory for keyboard.
     */
    .form-field input {
      padding: 0.625rem 0.75rem;
      border: 1.5px solid var(--border); /* 4.59:1 on white ✓ SC 1.4.11 */
      border-radius: 0.375rem;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      width: 100%;
      transition: border-color 0.15s;
    }

    .form-field input::placeholder {
      color: #9ca3af; /* #9ca3af on white = 2.85:1 — placeholder is
                         supplemental only, not the label. SC 1.3.1 is met
                         via the visible <label> element. */
    }

    .form-field input:focus-visible {
      outline: 3px solid var(--border-focus); /* #005fcc on white = 7.03:1 ✓ */
      outline-offset: 2px;
      border-color: var(--border-focus);
    }

    /*
     * Error state — input border turns red AND background is tinted
     * to provide a non-color cue (SC 1.4.1).
     * aria-invalid="true" is set by JS after validation.
     */
    .form-field input[aria-invalid="true"] {
      border-color: var(--error);
      background: var(--error-bg);
    }

    .form-field input[aria-invalid="true"]:focus-visible {
      outline-color: var(--error);
    }

    /* ── Helper text ─────────────────────────────────────────────────── */
    /*
     * Persistent <span> with a stable ID — always in the DOM so that
     * aria-describedby resolves correctly on page load (SC 1.3.1).
     * Linked to the input via aria-describedby on the <input>.
     */
    .helper-text {
      font-size: 0.8125rem;
      color: var(--text-muted); /* #4b5563 on white = 7.12:1 ✓ SC 1.4.3 */
      line-height: 1.5;
    }

    /* ── Error message ───────────────────────────────────────────────── */
    /*
     * Pre-rendered with `hidden` attribute — toggled by JS on validation.
     * Never inject or remove error elements from the DOM: aria-describedby
     * must point to an element that exists when the input is focused.
     *
     * role="alert" announces text changes immediately to screen readers
     * (SC 4.1.3). Combined with aria-describedby for re-read on re-focus.
     *
     * Error text (#b91c1c on white = 6.47:1 ✓ SC 1.4.3).
     * Red color is supplemental — icon + text convey the error (SC 1.4.1).
     */
    .error-message {
      display: flex;
      align-items: flex-start;
      gap: 0.3rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--error);
      line-height: 1.4;
    }

    .error-message[hidden] { display: none; }

    .error-icon {
      flex-shrink: 0;
      margin-top: 0.1em;
    }

    /* ── Submit button ───────────────────────────────────────────────── */
    /*
     * Native <button type="submit"> — keyboard (Enter + Space) and role
     * for free per ARIA APG button pattern.
     * Accessible name from visible text "Send Message" (SC 4.1.2).
     * White text on #005fcc = 7.03:1 ✓ SC 1.4.3.
     */
    .btn-submit {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
      width: 100%;
    }

    .btn-submit:hover { background: var(--accent-dark); }

    .btn-submit:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Success message ─────────────────────────────────────────────── */
    /*
     * Shown after successful submission.
     * role="status" aria-live="polite" — announces success to AT without
     * interrupting (SC 4.1.3). Focus also moves here on success.
     */
    .success-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    .success-message[hidden] { display: none; }

    .success-icon { font-size: 2.5rem; }

    .success-message h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e3a5f;
    }

    .success-message p {
      font-size: 0.9375rem;
      color: var(--text-muted);
    }

    /* ── Reduced motion ──────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>

  <div class="form-card">

    <!--
      H1 is the page title and the accessible name source for the form.
      aria-labelledby on <form> references this H1 (SC 1.3.1 / 4.1.2).
    -->
    <h1 class="form-heading" id="contact-heading">Contact Us</h1>
    <p class="form-subheading">We'll get back to you within 1–2 business days.</p>

    <!--
      Required-field legend — appears before any required field so users
      know the asterisk convention before encountering it (SC 3.3.2).
      The asterisk span is aria-hidden; screen readers learn required
      state from the `required` attribute on each input, not by reading *.
    -->
    <p class="required-note" id="required-note">
      <span class="asterisk" aria-hidden="true">*</span>
      indicates a required field
    </p>

    <!--
      Success message — hidden until form submits successfully.
      role="status" + aria-live="polite" announces the success text.
      tabindex="-1" allows JS to move focus here after success (SC 2.4.3).
    -->
    <div
      class="success-message"
      id="success-msg"
      role="status"
      aria-live="polite"
      tabindex="-1"
      hidden
    >
      <span class="success-icon" aria-hidden="true">✅</span>
      <h2>Message sent!</h2>
      <p>Thank you for reaching out. We'll be in touch soon.</p>
    </div>

    <!--
      <form>:
        • aria-labelledby="contact-heading" — names the form from the H1.
        • novalidate — disables native browser validation UI so our custom
          accessible validation runs instead (custom errors use aria-describedby).
        • action/method can be set for real back-end; omitted here for demo.
    -->
    <form
      class="contact-form"
      id="contact-form"
      aria-labelledby="contact-heading"
      novalidate
    >

      <!-- ── Field 1: Full Name (required) ────────────────────────── -->
      <!--
        div.form-field wraps: label + input + helper text + error container.

        Input attributes:
          • type="text" — correct type for a name field.
          • required — activates browser constraint validation AND tells AT
            the field is required (preferred over aria-required alone).
          • autocomplete="name" — SC 1.3.5 (Identify Input Purpose, AA).
          • aria-describedby="name-error" — links to the error container.
            No hint text for name, so only one ID is listed here.
          • aria-invalid="false" — explicit initial state; set to "true"
            by JS only after a validation trigger (not on page load).
      -->
      <div class="form-field">
        <label for="full-name">
          Full Name
          <span class="asterisk" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          required
          autocomplete="name"
          placeholder="e.g. Jane Smith"
          aria-describedby="name-error"
          aria-invalid="false"
        />
        <!--
          Error container — always present in the DOM (stable ID).
          `hidden` attribute removes it from layout and a11y tree until needed.
          role="alert" announces content changes immediately (SC 4.1.3).
        -->
        <span
          class="error-message"
          id="name-error"
          role="alert"
          hidden
        >
          <svg class="error-icon" aria-hidden="true" focusable="false"
               width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="name-error-text"></span>
        </span>
      </div>

      <!-- ── Field 2: Email Address (required, with helper text) ────── -->
      <!--
        Input attributes:
          • type="email" — triggers email keyboard on mobile, enables
            browser format validation, communicates purpose to AT.
          • autocomplete="email" — SC 1.3.5.
          • aria-describedby="email-hint email-error" — space-separated list;
            hint ID first (read before error), error ID second (SC 1.3.1).
      -->
      <div class="form-field">
        <label for="email-address">
          Email Address
          <span class="asterisk" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email-address"
          name="email"
          required
          autocomplete="email"
          placeholder="name@example.com"
          aria-describedby="email-hint email-error"
          aria-invalid="false"
        />
        <!--
          Helper text — persistent <span> with stable ID.
          Always rendered; visible below the input at all times.
          Screen reader reads: "[label] [role/state] [hint] [error]"
        -->
        <span class="helper-text" id="email-hint">
          e.g. name@example.com
        </span>
        <span
          class="error-message"
          id="email-error"
          role="alert"
          hidden
        >
          <svg class="error-icon" aria-hidden="true" focusable="false"
               width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="email-error-text"></span>
        </span>
      </div>

      <!-- ── Field 3: Phone Number (optional, with helper text) ──────── -->
      <!--
        Optional field — "(optional)" is visible text inside the <label>.
        No asterisk. No `required` attribute. No aria-required.
        This is the most universally supported pattern (SC 3.3.2).

        Input attributes:
          • type="tel" — triggers numeric keyboard on mobile.
            Does NOT restrict characters (allows dashes, parentheses, spaces
            as in the helper text example). Never use type="number" for phones.
          • autocomplete="tel" — SC 1.3.5.
      -->
      <div class="form-field">
        <label for="phone-number">
          Phone Number
          <span class="optional-tag">(optional)</span>
        </label>
        <input
          type="tel"
          id="phone-number"
          name="phone"
          autocomplete="tel"
          placeholder="(555) 123-4567"
          aria-describedby="phone-hint"
          aria-invalid="false"
        />
        <span class="helper-text" id="phone-hint">
          Preferred format: (555) 123-4567 — include area code
        </span>
        <!--
          Phone has no required validation, but we pre-render the error
          container in case JS needs to flag a format error in the future.
        -->
        <span
          class="error-message"
          id="phone-error"
          role="alert"
          hidden
        >
          <svg class="error-icon" aria-hidden="true" focusable="false"
               width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="phone-error-text"></span>
        </span>
      </div>

      <!-- ── Submit button ─────────────────────────────────────────── -->
      <!--
        Native <button type="submit"> — keyboard operable via Enter + Space.
        Accessible name from visible text "Send Message" (SC 4.1.2).
        Do not use <input type="submit"> or <div role="button">.
      -->
      <button class="btn-submit" type="submit">
        Send Message
      </button>

    </form>

  </div>

  <script>
    /*
     * ── Accessible form validation ──────────────────────────────────
     *
     * Strategy: validate on submit (Option A from pre-flight checklist).
     *   • aria-invalid is never set to "true" before user interaction.
     *   • On submit: validate all required fields, collect errors.
     *   • If errors: show them, set aria-invalid="true", move focus to
     *     the first invalid input (SC 3.3.1, 2.4.3).
     *   • On correction: clear error when the field becomes valid
     *     (on input event) — not on every keystroke, but as soon as the
     *     value is non-empty / valid.
     *   • On success: hide form, show success message, move focus there.
     *
     * Error rendering:
     *   • Sets text content of the inner <span id="*-error-text">.
     *   • Removes `hidden` from the outer .error-message container.
     *   • Sets aria-invalid="true" on the input.
     *   • role="alert" on the container announces the change immediately.
     *   • aria-describedby keeps the error associated for re-read on focus.
     */

    const form        = document.getElementById('contact-form');
    const successMsg  = document.getElementById('success-msg');

    const fields = {
      name: {
        input:     document.getElementById('full-name'),
        errorWrap: document.getElementById('name-error'),
        errorText: document.getElementById('name-error-text'),
      },
      email: {
        input:     document.getElementById('email-address'),
        errorWrap: document.getElementById('email-error'),
        errorText: document.getElementById('email-error-text'),
      },
      phone: {
        input:     document.getElementById('phone-number'),
        errorWrap: document.getElementById('phone-error'),
        errorText: document.getElementById('phone-error-text'),
      },
    };

    /* ── Show an error on a field ─────────────────────────────────── */
    function showError(key, message) {
      const { input, errorWrap, errorText } = fields[key];
      errorText.textContent = message;
      errorWrap.hidden = false;
      input.setAttribute('aria-invalid', 'true');
    }

    /* ── Clear an error on a field ────────────────────────────────── */
    function clearError(key) {
      const { input, errorWrap, errorText } = fields[key];
      errorText.textContent = '';
      errorWrap.hidden = true;
      input.setAttribute('aria-invalid', 'false');
    }

    /* ── Live clear: remove error as soon as field becomes valid ───── */
    /*
     * Triggered by the `input` event (on every character change).
     * Only clears — never shows a new error mid-typing (avoids hostile UX).
     */
    fields.name.input.addEventListener('input', () => {
      if (fields.name.input.value.trim()) clearError('name');
    });

    fields.email.input.addEventListener('input', () => {
      if (fields.email.input.validity.valid) clearError('email');
    });

    /* ── Validate all fields, return list of keys with errors ───────── */
    function validate() {
      const errors = [];

      /* Full Name — required, non-empty */
      if (!fields.name.input.value.trim()) {
        showError('name', 'Full Name is required.');
        errors.push('name');
      } else {
        clearError('name');
      }

      /* Email — required + valid email format */
      if (!fields.email.input.value.trim()) {
        showError('email', 'Email Address is required.');
        errors.push('email');
      } else if (!fields.email.input.validity.valid) {
        showError('email', 'Enter a valid email address, e.g. name@example.com');
        errors.push('email');
      } else {
        clearError('email');
      }

      /* Phone — optional; no required validation */
      clearError('phone');

      return errors;
    }

    /* ── Form submit handler ────────────────────────────────────────── */
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const errors = validate();

      if (errors.length > 0) {
        /*
         * Move focus to the first invalid input (SC 2.4.3 / 3.3.1).
         * The role="alert" on the error container will also announce
         * the error message immediately to screen readers.
         */
        fields[errors[0]].input.focus();
        return;
      }

      /*
       * ── Success path ───────────────────────────────────────────────
       * Hide the form, show the success message, and move focus to it.
       * The role="status" + aria-live="polite" on #success-msg will
       * announce the success text to screen readers (SC 4.1.3).
       */
      form.hidden = true;
      successMsg.hidden = false;
      successMsg.focus();
    });
  </script>

</body>
</html>
