<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <style>
    /* CSS custom properties for easy theming and high-contrast overrides */
    :root {
      --color-bg: #ffffff;
      --color-surface: #f8f9fa;
      --color-border: #6b7280;
      --color-border-focus: #1d4ed8;
      --color-text: #111827;
      --color-text-muted: #4b5563;
      --color-error: #b91c1c;
      --color-accent: #1d4ed8;
      --color-accent-hover: #1e3a8a;
      --color-accent-text: #ffffff;
      --radius: 6px;
      --focus-ring: 0 0 0 3px #93c5fd;
    }

    /* skip-link: lets keyboard users bypass repeated nav and jump to the form */
    .skip-link {
      position: absolute;
      top: -9999px;
      left: -9999px;
      background: var(--color-accent);
      color: var(--color-accent-text);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 1rem;
      left: 1rem;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      /* 16px base → text remains readable and not overflow at large sizes */
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      /* contrast: #111827 on #ffffff = 17.4:1 ✓ */
      color: var(--color-text);
    }

    .form-description {
      color: var(--color-text-muted);
      /* contrast: #4b5563 on #ffffff = 7.0:1 ✓ */
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* Each field wrapper: label + input + helper text */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      margin-bottom: 1.5rem;
    }

    .form-field label {
      font-weight: 600;
      font-size: 0.925rem;
      color: var(--color-text);
    }

    /* "Required" badge — not conveyed by color alone; explicit text used */
    .required-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-error);
      /* contrast: #b91c1c on #ffffff = 5.9:1 ✓ */
      margin-left: 0.35rem;
      vertical-align: middle;
      /* aria-hidden so screen readers use aria-required on the input instead */
    }

    .form-field input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      color: var(--color-text);
      background: var(--color-bg);
      /* minimum touch target height satisfied — ~44px with padding */
      min-height: 44px;
      transition: border-color 0.15s ease;
    }

    /* Visible focus ring — never hidden, minimum 3px, high contrast */
    .form-field input:focus {
      outline: none;
      border-color: var(--color-border-focus);
      box-shadow: var(--focus-ring);
    }

    /* Helper text linked via aria-describedby — gives context without replacing the label */
    .helper-text {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      /* contrast: #4b5563 on #ffffff = 7.0:1 ✓ */
    }

    /* Optional badge — text-based, not color-only */
    .optional-badge {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-text-muted);
      margin-left: 0.35rem;
    }

    /* Submit button — <button> element, not a div, for native keyboard access */
    .btn-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.75rem 1.5rem;
      background: var(--color-accent);
      color: var(--color-accent-text);
      /* contrast: #ffffff on #1d4ed8 = 7.0:1 ✓ */
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 44px;
      margin-top: 0.5rem;
      transition: background-color 0.15s ease;
    }

    .btn-submit:hover {
      background: var(--color-accent-hover);
    }

    .btn-submit:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    /* Reduce or remove animation for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      .form-field input,
      .btn-submit {
        transition: none;
      }
    }

    /* Ensure layout works at 320px width and when zoomed to 200% */
    @media (max-width: 400px) {
      h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <!-- skip-link: lets keyboard users bypass page chrome and jump straight to the form -->
  <a href="#contact-form" class="skip-link">Skip to contact form</a>

  <!-- <main> landmark so screen reader users can jump to primary content -->
  <main>
    <!-- One <h1> per page — establishes the page topic for screen readers -->
    <h1>Contact Us</h1>
    <p class="form-description">Fill out the form below and we'll get back to you shortly.</p>

    <form
      id="contact-form"
      novalidate
      aria-label="Contact form"
    >
      <!-- Full Name field -->
      <div class="form-field">
        <label for="full-name">
          Full Name
          <!-- aria-hidden: screen readers rely on aria-required on the input, not this visual badge -->
          <span class="required-badge" aria-hidden="true">*&nbsp;Required</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          aria-required="true"
          spellcheck="false"
        />
      </div>

      <!-- Email Address field — helper text linked via aria-describedby so screen readers announce it after the label -->
      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-badge" aria-hidden="true">*&nbsp;Required</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          aria-required="true"
          aria-describedby="email-hint"
          spellcheck="false"
          inputmode="email"
        />
        <!-- id matches aria-describedby above; announced by screen readers after field label -->
        <span id="email-hint" class="helper-text">
          Enter a valid email address, e.g. name@example.com
        </span>
      </div>

      <!-- Phone Number field — optional, helper text for preferred format -->
      <div class="form-field">
        <label for="phone">
          Phone Number
          <span class="optional-badge" aria-hidden="true">(optional)</span>
        </label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-required="false"
          aria-describedby="phone-hint"
          inputmode="tel"
        />
        <span id="phone-hint" class="helper-text">
          Preferred format: (555) 000-0000. Include country code for international numbers.
        </span>
      </div>

      <!-- <button> element ensures native keyboard access (Enter/Space) without extra JS -->
      <button type="submit" class="btn-submit">
        Send Message
      </button>
    </form>
  </main>
</body>
</html>
