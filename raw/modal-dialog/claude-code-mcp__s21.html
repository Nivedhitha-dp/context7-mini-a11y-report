<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    button.trigger {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.625rem 1.25rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button.trigger:focus-visible {
      outline: 3px solid #1d4ed8;
      outline-offset: 3px;
    }
    button.trigger:hover { background: #1d4ed8; }

    /* Backdrop */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.is-open {
      display: flex;
    }

    /* Dialog */
    [role="dialog"] {
      background: #fff;
      border-radius: 10px;
      padding: 1.75rem;
      max-width: 480px;
      width: calc(100% - 2rem);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .modal-close {
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      color: #555;
      padding: 0.25rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { background: #f0f0f0; color: #111; }
    .modal-close:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .modal-body {
      color: #444;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9375rem;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn-secondary:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9375rem;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:focus-visible { outline: 3px solid #1d4ed8; outline-offset: 2px; }
  </style>
</head>
<body>

  <button class="trigger" type="button" aria-haspopup="dialog" aria-controls="example-modal">
    Open Modal
  </button>

  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div
      role="dialog"
      id="example-modal"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <button class="modal-close" type="button" aria-label="Close dialog">
          <svg aria-hidden="true" focusable="false" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <p id="modal-desc">
          Are you sure you want to proceed? This action cannot be undone. Please review
          your selection before confirming.
        </p>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" type="button" data-dismiss>Cancel</button>
        <button class="btn-primary" type="button" data-confirm>Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const backdrop = document.getElementById('modal-backdrop');
      const dialog  = document.getElementById('example-modal');
      const trigger = document.querySelector('button.trigger');

      const FOCUSABLE = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(', ');

      function getFocusable() {
        return Array.from(dialog.querySelectorAll(FOCUSABLE));
      }

      function open() {
        backdrop.classList.add('is-open');
        backdrop.removeAttribute('aria-hidden');
        dialog.focus();
        document.addEventListener('keydown', onKeyDown);
      }

      function close() {
        backdrop.classList.remove('is-open');
        backdrop.setAttribute('aria-hidden', 'true');
        document.removeEventListener('keydown', onKeyDown);
        trigger.focus();
      }

      function trapFocus(e) {
        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];

        if (e.shiftKey) {
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      function onKeyDown(e) {
        if (e.key === 'Escape') { close(); return; }
        if (e.key === 'Tab')    { trapFocus(e); }
      }

      trigger.addEventListener('click', open);

      dialog.querySelector('.modal-close').addEventListener('click', close);
      dialog.querySelector('[data-dismiss]').addEventListener('click', close);
      dialog.querySelector('[data-confirm]').addEventListener('click', close);

      backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) close();
      });
    })();
  </script>
</body>
</html>
