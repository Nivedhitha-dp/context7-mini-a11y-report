<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-primary: #1a56db;
      --color-primary-hover: #1240a8;
      --color-text: #1a1a1a;
      --color-text-muted: #4a4a4a;
      --color-border: #d0d0d0;
      --color-danger: #b91c1c;
      --color-danger-hover: #991b1b;
      --color-overlay: rgba(0, 0, 0, 0.55);
      --radius: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* skip link: lets keyboard users bypass page chrome */
    .skip-link {
      position: absolute;
      top: -9999px;
      left: 0;
      background: var(--color-primary);
      color: #fff;
      padding: 8px 16px;
      font-weight: 600;
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 0;
    }

    /* visible focus styles — never remove :focus */
    :focus-visible {
      outline: 3px solid var(--color-primary);
      outline-offset: 2px;
    }

    .page-content {
      text-align: center;
      padding: 2rem;
    }

    .page-content h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      color: var(--color-text);
    }

    /* trigger button */
    .trigger {
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 0.65rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 44px; /* touch target minimum */
      min-width: 44px;
      transition: background 0.15s;
    }
    .trigger:hover { background: var(--color-primary-hover); }
    .trigger:focus-visible {
      outline: 3px solid var(--color-primary);
      outline-offset: 3px;
    }

    /* backdrop overlay */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    /* when open, use flex */
    .modal-backdrop.is-open {
      display: flex;
    }

    /* dialog container */
    .modal-dialog {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: min(480px, calc(100vw - 2rem));
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      padding: 1.75rem;
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.3;
    }

    /* close button in header */
    .modal-close {
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      width: 36px;
      height: 36px;
      min-width: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover {
      background: #f0f0f0;
      color: var(--color-text);
    }
    .modal-close svg { pointer-events: none; }

    .modal-body {
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-size: 0.975rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 0.55rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f0f0f0; }

    .btn-danger {
      background: var(--color-danger);
      color: #fff;
      border: none;
      padding: 0.55rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: var(--color-danger-hover); }

    /* reduced motion: disable transitions for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      .trigger, .btn-secondary, .btn-danger, .modal-close {
        transition: none;
      }
    }
  </style>
</head>
<body>

  <!-- skip link: lets keyboard users jump past chrome to main content -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <div class="page-content">
      <h1>Modal Dialog Demo</h1>

      <!--
        trigger class as required.
        aria-haspopup="dialog" signals this opens a dialog.
        aria-controls links to the dialog element.
      -->
      <button
        class="trigger"
        type="button"
        aria-haspopup="dialog"
        aria-controls="confirm-modal"
      >
        Open Dialog
      </button>
    </div>
  </main>

  <!--
    Backdrop: click outside the dialog to close.
    role="presentation" so screen readers don't announce the backdrop itself.
  -->
  <div
    class="modal-backdrop"
    id="modal-backdrop"
    role="presentation"
  >
    <!--
      role="dialog" + aria-modal="true": tells screen readers this is a modal
      and that content behind it should be ignored.
      aria-labelledby links the dialog to its visible title for screen readers.
    -->
    <div
      id="confirm-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      class="modal-dialog"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>

        <!--
          Close button: aria-label provides the accessible name since the
          button contains only an SVG icon with no visible text.
        -->
        <button
          type="button"
          class="modal-close"
          id="modal-close-btn"
          aria-label="Close dialog"
        >
          <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to proceed? This action cannot be undone. Please review your selection before confirming.</p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button type="button" class="btn-danger" id="modal-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const backdrop    = document.getElementById('modal-backdrop');
      const dialog      = document.getElementById('confirm-modal');
      const openBtn     = document.querySelector('button.trigger');
      const closeBtn    = document.getElementById('modal-close-btn');
      const cancelBtn   = document.getElementById('modal-cancel-btn');
      const confirmBtn  = document.getElementById('modal-confirm-btn');

      // All focusable element types to include in the focus trap
      const FOCUSABLE = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(', ');

      function getFocusable() {
        return Array.from(dialog.querySelectorAll(FOCUSABLE));
      }

      function openModal() {
        backdrop.classList.add('is-open');
        // aria-hidden on the rest of the page so screen readers stay inside the dialog
        document.querySelector('main').setAttribute('aria-hidden', 'true');
        // move focus to the first focusable element inside the dialog
        const focusable = getFocusable();
        if (focusable.length) focusable[0].focus();
      }

      function closeModal() {
        backdrop.classList.remove('is-open');
        document.querySelector('main').removeAttribute('aria-hidden');
        // return focus to the element that opened the dialog
        openBtn.focus();
      }

      // open
      openBtn.addEventListener('click', openModal);

      // close via header X button
      closeBtn.addEventListener('click', closeModal);

      // close via Cancel button
      cancelBtn.addEventListener('click', closeModal);

      // confirm action (extend as needed)
      confirmBtn.addEventListener('click', function () {
        closeModal();
      });

      // close when clicking the backdrop (outside the dialog box)
      backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) closeModal();
      });

      // keyboard handling inside the dialog
      dialog.addEventListener('keydown', function (e) {
        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];

        // Escape closes the dialog
        if (e.key === 'Escape') {
          e.preventDefault();
          closeModal();
          return;
        }

        // Tab cycles focus within the dialog (focus trap)
        if (e.key === 'Tab') {
          if (focusable.length === 0) { e.preventDefault(); return; }

          if (e.shiftKey) {
            // Shift+Tab: if focus is on first element, wrap to last
            if (document.activeElement === first) {
              e.preventDefault();
              last.focus();
            }
          } else {
            // Tab: if focus is on last element, wrap to first
            if (document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          }
        }
      });
    })();
  </script>

</body>
</html>
