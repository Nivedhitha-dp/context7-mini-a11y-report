<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f4f4f5;
    }

    .trigger {
      padding: 0.625rem 1.25rem;
      font-size: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
    }
    .trigger:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }
    .trigger:hover { background: #1d4ed8; }

    /* Backdrop */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    /* Dialog */
    .modal {
      background: #fff;
      border-radius: 0.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 1.5rem;
      width: min(90vw, 28rem);
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111827;
    }

    .modal-close {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 0.25rem;
      cursor: pointer;
      color: #6b7280;
      font-size: 1.25rem;
      line-height: 1;
    }
    .modal-close:hover { background: #f3f4f6; color: #111827; }
    .modal-close:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }

    .modal-body {
      color: #374151;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-secondary:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }

    .btn-primary {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <button class="trigger" type="button" aria-haspopup="dialog" id="open-modal">
    Open Modal
  </button>

  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      class="modal"
      id="modal"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <button class="modal-close" type="button" aria-label="Close dialog" id="modal-close">
          &#x2715;
        </button>
      </div>
      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to proceed? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" type="button" id="modal-cancel">Cancel</button>
        <button class="btn-primary" type="button" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const backdrop = document.getElementById('modal-backdrop');
    const modal    = document.getElementById('modal');
    const openBtn  = document.getElementById('open-modal');
    const closeBtn = document.getElementById('modal-close');
    const cancelBtn = document.getElementById('modal-cancel');
    const confirmBtn = document.getElementById('modal-confirm');

    const FOCUSABLE = 'a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])';

    function getFocusable() {
      return Array.from(modal.querySelectorAll(FOCUSABLE));
    }

    function openModal() {
      backdrop.classList.add('open');
      backdrop.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
      modal.focus();
    }

    function closeModal() {
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      openBtn.focus();
    }

    function trapFocus(e) {
      const focusable = getFocusable();
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];

      if (e.key === 'Tab') {
        if (e.shiftKey) {
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      if (e.key === 'Escape') {
        closeModal();
      }
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);

    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });

    modal.addEventListener('keydown', trapFocus);
  </script>

</body>
</html>
