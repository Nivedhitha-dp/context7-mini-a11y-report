<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f4f8;
    }

    .trigger {
      padding: 0.75rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    .trigger:hover { background: #1d4ed8; }
    .trigger:focus-visible {
      outline: 3px solid #1d4ed8;
      outline-offset: 3px;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.is-open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      max-width: 480px;
      width: calc(100% - 2rem);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111827;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
      color: #6b7280;
      font-size: 1.25rem;
      line-height: 1;
    }
    .modal-close:hover { color: #111827; background: #f3f4f6; }
    .modal-close:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .modal-body {
      color: #374151;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      padding: 0.6rem 1.25rem;
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-secondary:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .btn-primary {
      padding: 0.6rem 1.25rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:focus-visible {
      outline: 3px solid #1d4ed8;
      outline-offset: 3px;
    }
  </style>
</head>
<body>

  <button class="trigger" aria-haspopup="dialog" id="open-modal">Open Modal</button>

  <div
    class="modal-backdrop"
    id="modal-backdrop"
    aria-hidden="true"
  >
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      id="modal"
      class="modal"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <button class="modal-close" id="modal-close" aria-label="Close dialog">&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to proceed? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const backdrop = document.getElementById('modal-backdrop');
    const modal = document.getElementById('modal');
    const openBtn = document.getElementById('open-modal');
    const closeBtn = document.getElementById('modal-close');
    const cancelBtn = document.getElementById('modal-cancel');
    const confirmBtn = document.getElementById('modal-confirm');

    const focusableSelectors = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

    function openModal() {
      backdrop.classList.add('is-open');
      backdrop.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
      closeBtn.focus();
    }

    function closeModal() {
      backdrop.classList.remove('is-open');
      backdrop.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      openBtn.focus();
    }

    function trapFocus(e) {
      if (!backdrop.classList.contains('is-open')) return;
      const focusable = Array.from(modal.querySelectorAll(focusableSelectors));
      const first = focusable[0];
      const last = focusable[focusable.length - 1];

      if (e.key === 'Tab') {
        if (e.shiftKey) {
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      if (e.key === 'Escape') closeModal();
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', trapFocus);

    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });
  </script>

</body>
</html>
