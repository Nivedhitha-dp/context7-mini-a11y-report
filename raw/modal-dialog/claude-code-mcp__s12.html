<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .trigger {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .trigger:focus-visible {
      outline: 3px solid #f59e0b;
      outline-offset: 2px;
    }
    .trigger:hover { background: #1d4ed8; }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.is-open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      max-width: 480px;
      width: 90%;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 0.75rem;
    }

    .modal-body {
      color: #444;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .modal-close-btn {
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid #d1d5db;
      background: #fff;
      color: #374151;
    }
    .modal-close-btn:focus-visible {
      outline: 3px solid #f59e0b;
      outline-offset: 2px;
    }
    .modal-close-btn:hover { background: #f3f4f6; }

    .modal-confirm-btn {
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      background: #2563eb;
      color: #fff;
    }
    .modal-confirm-btn:focus-visible {
      outline: 3px solid #f59e0b;
      outline-offset: 2px;
    }
    .modal-confirm-btn:hover { background: #1d4ed8; }

    .modal-x {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      color: #6b7280;
      padding: 0.25rem;
      border-radius: 4px;
    }
    .modal-x:focus-visible {
      outline: 3px solid #f59e0b;
      outline-offset: 2px;
    }
    .modal-x:hover { color: #111; }
  </style>
</head>
<body>

  <button class="trigger" aria-haspopup="dialog">Open Modal</button>

  <div
    class="modal-backdrop"
    id="modal-backdrop"
    role="presentation"
  >
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      id="modal"
      class="modal"
    >
      <button class="modal-x" id="modal-x" aria-label="Close dialog">&times;</button>
      <h2 class="modal-title" id="modal-title">Confirm Action</h2>
      <p class="modal-body">
        Are you sure you want to proceed? This action cannot be undone.
        Please review before confirming.
      </p>
      <div class="modal-actions">
        <button class="modal-close-btn" id="modal-cancel">Cancel</button>
        <button class="modal-confirm-btn" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const backdrop = document.getElementById('modal-backdrop');
      const modal = document.getElementById('modal');
      const triggerBtn = document.querySelector('.trigger');
      const cancelBtn = document.getElementById('modal-cancel');
      const confirmBtn = document.getElementById('modal-confirm');
      const xBtn = document.getElementById('modal-x');

      const FOCUSABLE = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(',');

      function openModal() {
        backdrop.classList.add('is-open');
        const first = modal.querySelectorAll(FOCUSABLE)[0];
        if (first) first.focus();
      }

      function closeModal() {
        backdrop.classList.remove('is-open');
        triggerBtn.focus();
      }

      triggerBtn.addEventListener('click', openModal);
      cancelBtn.addEventListener('click', closeModal);
      xBtn.addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', closeModal);

      backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) closeModal();
      });

      modal.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeModal(); return; }
        if (e.key !== 'Tab') return;

        const focusable = Array.from(modal.querySelectorAll(FOCUSABLE));
        if (!focusable.length) { e.preventDefault(); return; }

        const first = focusable[0];
        const last = focusable[focusable.length - 1];

        if (e.shiftKey) {
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      });
    })();
  </script>

</body>
</html>
