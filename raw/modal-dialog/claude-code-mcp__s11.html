<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-primary: #1a56db;
      --color-primary-dark: #1040b0;
      --color-text: #111827;
      --color-text-muted: #4b5563;
      --color-border: #d1d5db;
      --color-overlay: rgba(0, 0, 0, 0.55);
      --focus-ring: 0 0 0 3px #1a56db;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Skip link: visually hidden until focused */
    .skip-link {
      position: absolute;
      top: -9999px;
      left: 1rem;
      background: var(--color-primary);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 1rem;
    }

    /* Visible focus styles for all interactive elements */
    :focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .trigger {
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .trigger:hover {
      background: var(--color-primary-dark);
    }
    .trigger:focus-visible {
      box-shadow: var(--focus-ring);
      outline: none;
    }

    /* Overlay backdrop */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-overlay);
      z-index: 100;
      /* Centers the dialog */
      align-items: center;
      justify-content: center;
    }
    /* Use flex only when open so display:none hides it completely */
    .modal-overlay[data-open="true"] {
      display: flex;
    }

    /* The dialog panel */
    .modal-dialog {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 480px;
      padding: 2rem;
      position: relative;
      /* Prevent overlay clicks from closing when clicking inside dialog */
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      /* id referenced by aria-labelledby */
    }

    .modal-close {
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      font-size: 1.25rem;
      line-height: 1;
      color: var(--color-text-muted);
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .modal-close:hover {
      background: var(--color-bg);
    }
    .modal-close:focus-visible {
      box-shadow: var(--focus-ring);
      outline: none;
    }

    .modal-description {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      /* id referenced by aria-describedby */
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 0.6rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--color-bg); }
    .btn-secondary:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      padding: 0.6rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--color-primary-dark); }
    .btn-primary:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    /* Prevent body scroll when modal is open */
    body.modal-open { overflow: hidden; }

    /* Respect reduced-motion preferences */
    @media (prefers-reduced-motion: no-preference) {
      .modal-dialog {
        animation: dialog-in 0.2s ease;
      }
      @keyframes dialog-in {
        from { opacity: 0; transform: translateY(-12px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
    }

    /* Responsive: full-width on small screens */
    @media (max-width: 520px) {
      .modal-dialog { padding: 1.5rem; margin: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Skip link: lets keyboard users bypass repeated content -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content">
    <button class="trigger" type="button" aria-haspopup="dialog">
      Open Dialog
    </button>
  </main>

  <!--
    role="dialog": identifies this as a dialog widget
    aria-modal="true": tells screen readers to treat the rest of the page as inert
    aria-labelledby: points to the visible title for screen reader announcement
    aria-describedby: points to the description text read after the title
  -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    role="presentation"
  >
    <div
      class="modal-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      id="modal-dialog"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <!-- aria-label provides an accessible name distinct from the × glyph -->
        <button class="modal-close" type="button" aria-label="Close dialog" id="modal-close-btn">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <p class="modal-description" id="modal-desc">
        Are you sure you want to proceed? This action can be undone from your account settings
        within 30 days.
      </p>

      <div class="modal-actions">
        <button class="btn-secondary" type="button" id="modal-cancel-btn">Cancel</button>
        <button class="btn-primary" type="button" id="modal-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const overlay     = document.getElementById('modal-overlay');
      const dialog      = document.getElementById('modal-dialog');
      const openBtn     = document.querySelector('.trigger');
      const closeBtn    = document.getElementById('modal-close-btn');
      const cancelBtn   = document.getElementById('modal-cancel-btn');
      const confirmBtn  = document.getElementById('modal-confirm-btn');

      // All keyboard-focusable element selectors for the focus trap
      const FOCUSABLE = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(', ');

      function getFocusable() {
        return Array.from(dialog.querySelectorAll(FOCUSABLE));
      }

      function openModal() {
        overlay.dataset.open = 'true';
        document.body.classList.add('modal-open');
        // Move focus into the dialog so screen readers announce it immediately
        dialog.focus();
      }

      function closeModal() {
        overlay.dataset.open = 'false';
        document.body.classList.remove('modal-open');
        // Return focus to the trigger that opened the dialog
        openBtn.focus();
      }

      // Trap focus: cycle through focusable elements inside the dialog
      function trapFocus(e) {
        if (e.key !== 'Tab') return;
        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];

        if (e.shiftKey) {
          // Shift+Tab: if focus is on first element, wrap to last
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          // Tab: if focus is on last element, wrap to first
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      function handleDialogKeydown(e) {
        if (e.key === 'Escape') {
          // Escape always closes the dialog
          closeModal();
        }
        trapFocus(e);
      }

      // Close when clicking the backdrop (but not the dialog panel itself)
      function handleOverlayClick(e) {
        if (e.target === overlay) {
          closeModal();
        }
      }

      openBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      cancelBtn.addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', closeModal); // replace with real action as needed
      overlay.addEventListener('click', handleOverlayClick);
      dialog.addEventListener('keydown', handleDialogKeydown);
    })();
  </script>
</body>
</html>
