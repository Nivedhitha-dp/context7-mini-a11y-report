<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }

    .trigger {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .trigger:focus-visible {
      outline: 3px solid #1d4ed8;
      outline-offset: 3px;
    }

    .trigger:hover { background: #1d4ed8; }

    /* Backdrop */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.is-open { display: flex; }

    /* Dialog */
    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      max-width: 480px;
      width: calc(100% - 2rem);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
      line-height: 1;
      font-size: 1.5rem;
      color: #555;
    }

    .modal-close:hover { color: #111; background: #f3f4f6; }

    .modal-close:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .modal-body { color: #374151; line-height: 1.6; margin-bottom: 1.5rem; }

    .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; }

    .btn-secondary {
      padding: 0.6rem 1.25rem;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn-secondary:hover { background: #f9fafb; }
    .btn-secondary:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }

    .btn-primary {
      padding: 0.6rem 1.25rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:focus-visible { outline: 3px solid #1d4ed8; outline-offset: 2px; }
  </style>
</head>
<body>

  <button class="trigger" aria-haspopup="dialog">Open Modal</button>

  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      id="modal"
      class="modal"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <button class="modal-close" aria-label="Close dialog">&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to proceed? This action cannot be undone once confirmed.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" data-close>Cancel</button>
        <button class="btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.querySelector('.trigger');
    const backdrop = document.getElementById('modal-backdrop');
    const modal = document.getElementById('modal');
    const closeBtn = modal.querySelector('.modal-close');
    const cancelBtn = modal.querySelector('[data-close]');

    const FOCUSABLE = [
      'a[href]', 'button:not([disabled])', 'input:not([disabled])',
      'select:not([disabled])', 'textarea:not([disabled])',
      '[tabindex]:not([tabindex="-1"])'
    ].join(', ');

    function openModal() {
      backdrop.classList.add('is-open');
      backdrop.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
      // Move focus to first focusable element inside modal
      const first = modal.querySelector(FOCUSABLE);
      if (first) first.focus();
    }

    function closeModal() {
      backdrop.classList.remove('is-open');
      backdrop.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      trigger.focus();
    }

    // Focus trap
    modal.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeModal(); return; }
      if (e.key !== 'Tab') return;

      const focusable = [...modal.querySelectorAll(FOCUSABLE)];
      const first = focusable[0];
      const last = focusable[focusable.length - 1];

      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });

    trigger.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);

    // Close on backdrop click
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });
  </script>

</body>
</html>
