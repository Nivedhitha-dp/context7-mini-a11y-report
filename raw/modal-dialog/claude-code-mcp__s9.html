<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-primary: #1a56db;
      --color-primary-hover: #1345b8;
      --color-text: #111827;
      --color-text-muted: #4b5563;
      --color-border: #d1d5db;
      --color-overlay: rgba(0, 0, 0, 0.55);
      --color-focus-ring: #1a56db;
      --radius: 0.5rem;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Skip link — visually hidden until focused */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--color-primary);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      z-index: 9999;
      transition: top 0.1s;
    }
    .skip-link:focus { top: 1rem; }

    /* Focus styles — never remove, always visible */
    :focus-visible {
      outline: 3px solid var(--color-focus-ring);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* Trigger button */
    .trigger {
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }
    .trigger:hover { background: var(--color-primary-hover); }
    .trigger:focus-visible { outline-color: var(--color-primary); }

    /* Overlay — covers the page behind the modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 1000;
      /* Hidden by default */
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .modal-overlay.is-open {
      visibility: visible;
      opacity: 1;
    }

    /* Modal dialog */
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 28rem;
      padding: 2rem;
      position: relative;
      /* Animate in */
      transform: translateY(1rem);
      transition: transform 0.2s;
    }
    .modal-overlay.is-open .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.3;
    }

    /* Close button in the corner */
    .modal-close {
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      width: 2.25rem;
      height: 2.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--color-text-muted);
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover {
      background: #f3f4f6;
      color: var(--color-text);
    }
    .modal-close svg { pointer-events: none; }

    .modal-body {
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn {
      padding: 0.625rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-secondary {
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover { background: #f3f4f6; }
    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      border: 1px solid transparent;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }

    /* Reduced motion — remove transitions for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      .modal-overlay, .modal { transition: none; }
    }
  </style>
</head>
<body>

  <!-- skip-link: lets keyboard users bypass repeated content -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <main id="main">
    <!-- trigger class required per spec -->
    <button class="trigger" id="modal-trigger" aria-haspopup="dialog">
      Open Dialog
    </button>
  </main>

  <!--
    role="dialog" + aria-modal="true": tells screen readers this is a modal dialog
    and that content behind it is inert.
    aria-labelledby points to the visible title so the dialog has an accessible name.
    aria-describedby points to the body text for additional context on open.
  -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    role="presentation"
  >
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      class="modal"
      id="modal"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <!-- aria-label gives the icon-only button an accessible name -->
        <button class="modal-close" id="modal-close" aria-label="Close dialog">
          <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to continue? This action cannot be undone. Review the details before confirming.</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const trigger   = document.getElementById('modal-trigger');
      const overlay   = document.getElementById('modal-overlay');
      const modal     = document.getElementById('modal');
      const closeBtn  = document.getElementById('modal-close');
      const cancelBtn = document.getElementById('modal-cancel');
      const confirmBtn = document.getElementById('modal-confirm');

      // All focusable element types we want to trap focus within
      const FOCUSABLE = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(', ');

      function getFocusable() {
        return Array.from(modal.querySelectorAll(FOCUSABLE));
      }

      function openModal() {
        overlay.classList.add('is-open');
        // inert on body siblings so screen readers can't escape the dialog
        document.querySelectorAll('body > *:not([id="modal-overlay"])').forEach(el => {
          el.setAttribute('inert', '');
          el.setAttribute('aria-hidden', 'true');
        });
        // Move focus into the dialog itself (the container, which has tabindex=-1)
        modal.focus();
      }

      function closeModal() {
        overlay.classList.remove('is-open');
        // Restore interactivity to the rest of the page
        document.querySelectorAll('body > *:not([id="modal-overlay"])').forEach(el => {
          el.removeAttribute('inert');
          el.removeAttribute('aria-hidden');
        });
        // Return focus to the element that opened the dialog
        trigger.focus();
      }

      // Trap Tab / Shift+Tab focus within the modal
      function trapFocus(e) {
        if (e.key !== 'Tab') return;
        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];

        if (e.shiftKey) {
          // Shift+Tab: if focus is on first element, wrap to last
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          // Tab: if focus is on last element, wrap to first
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      // Escape key closes the modal
      function handleKeydown(e) {
        if (e.key === 'Escape') closeModal();
        trapFocus(e);
      }

      // Open
      trigger.addEventListener('click', openModal);

      // Close via X button, Cancel, or Confirm
      closeBtn.addEventListener('click', closeModal);
      cancelBtn.addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', closeModal);

      // Close when clicking the overlay backdrop (but not the dialog itself)
      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) closeModal();
      });

      // Keyboard handling scoped to overlay so it cleans up naturally
      overlay.addEventListener('keydown', handleKeydown);
    })();
  </script>

</body>
</html>
