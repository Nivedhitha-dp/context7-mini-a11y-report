<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* skip link: lets keyboard users bypass repeated nav */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 0;
      padding: 0.5rem 1rem;
      background: #1a56db;
      color: #fff;
      font-weight: 600;
      z-index: 9999;
      text-decoration: none;
      border-radius: 0 0 4px 0;
    }
    .skip-link:focus {
      top: 0;
    }

    /* trigger button */
    .trigger {
      padding: 0.75rem 1.5rem;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .trigger:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 3px;
      box-shadow: 0 0 0 5px rgba(26, 86, 219, 0.3);
    }
    .trigger:hover {
      background: #1648c0;
    }

    /* backdrop overlay */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.is-open {
      display: flex;
    }

    /* dialog */
    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      max-width: 480px;
      width: calc(100% - 2rem);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
      color: #555;
      font-size: 1.5rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
    }
    .modal-close:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
    }
    .modal-close:hover {
      background: #f0f0f0;
      color: #111;
    }

    .modal-body {
      color: #444;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      padding: 0.6rem 1.25rem;
      background: transparent;
      border: 2px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: #333;
    }
    .btn-secondary:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
    }
    .btn-secondary:hover {
      border-color: #999;
    }

    .btn-primary {
      padding: 0.6rem 1.25rem;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 3px;
      box-shadow: 0 0 0 5px rgba(26, 86, 219, 0.3);
    }
    .btn-primary:hover {
      background: #1648c0;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <!-- skip link: lets keyboard users bypass repeated nav -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <!-- trigger button opens the modal -->
    <button class="trigger" aria-haspopup="dialog" aria-controls="example-modal" id="modal-trigger">
      Open Dialog
    </button>
  </main>

  <!-- backdrop: clicking outside the dialog closes it -->
  <div class="modal-backdrop" id="modal-backdrop" role="presentation">
    <!--
      role="dialog": identifies this as a dialog widget
      aria-modal="true": tells screen readers to ignore content behind the dialog
      aria-labelledby: associates dialog with its visible title (required for accessible name)
    -->
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      class="modal"
      id="example-modal"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <!-- Close button: aria-label provides accessible name for the icon-only button -->
        <button class="modal-close" id="modal-close" aria-label="Close dialog">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to proceed? This action will save your changes and cannot be undone.</p>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.getElementById('modal-trigger');
    const backdrop = document.getElementById('modal-backdrop');
    const modal = document.getElementById('example-modal');
    const closeBtn = document.getElementById('modal-close');
    const cancelBtn = document.getElementById('modal-cancel');
    const confirmBtn = document.getElementById('modal-confirm');

    // all focusable elements inside the dialog for focus trapping
    const focusableSelectors = [
      'a[href]', 'button:not([disabled])', 'input:not([disabled])',
      'select:not([disabled])', 'textarea:not([disabled])',
      '[tabindex]:not([tabindex="-1"])'
    ].join(',');

    function getFocusable() {
      return Array.from(modal.querySelectorAll(focusableSelectors));
    }

    function openModal() {
      backdrop.classList.add('is-open');
      // move focus to the first focusable element inside the dialog
      const focusable = getFocusable();
      if (focusable.length) focusable[0].focus();
      // prevent background scroll
      document.body.style.overflow = 'hidden';
      trigger.setAttribute('aria-expanded', 'true');
    }

    function closeModal() {
      backdrop.classList.remove('is-open');
      document.body.style.overflow = '';
      trigger.setAttribute('aria-expanded', 'false');
      // restore focus to the element that triggered the dialog
      trigger.focus();
    }

    // trap focus inside modal: cycle through focusable elements only
    modal.addEventListener('keydown', function (e) {
      const focusable = getFocusable();
      const first = focusable[0];
      const last = focusable[focusable.length - 1];

      if (e.key === 'Tab') {
        if (e.shiftKey) {
          // shift+tab from first element wraps to last
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          // tab from last element wraps to first
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      // ESC closes the modal and returns focus to trigger
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // close when clicking the backdrop (outside the dialog box)
    backdrop.addEventListener('click', function (e) {
      if (e.target === backdrop) closeModal();
    });

    trigger.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);
  </script>
</body>
</html>
