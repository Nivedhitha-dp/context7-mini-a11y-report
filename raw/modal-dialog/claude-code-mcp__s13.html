<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Skip link for keyboard users */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: #2563eb;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 0 0 0.375rem 0.375rem;
      text-decoration: none;
      font-weight: 600;
      z-index: 9999;
    }
    .skip-link:focus { top: 0; }

    /* Trigger button */
    .trigger {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .trigger:hover { background: #1d4ed8; }
    .trigger:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 3px;
    }

    /* Backdrop */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.is-open { display: flex; }

    /* Dialog */
    [role="dialog"] {
      background: #fff;
      border-radius: 0.75rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: min(90vw, 480px);
      padding: 2rem;
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #18181b;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #71717a;
      padding: 0.25rem;
      border-radius: 0.375rem;
      line-height: 1;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    .modal-close:hover { color: #18181b; background: #f4f4f5; }
    .modal-close:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .modal-body {
      color: #52525b;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: #f4f4f5;
      color: #18181b;
      border: 1px solid #d4d4d8;
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #e4e4e7; }
    .btn-secondary:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 3px;
    }

    /* Reduce motion for users who prefer it */
    @media (prefers-reduced-motion: no-preference) {
      [role="dialog"] {
        animation: modal-in 0.2s ease;
      }
      @keyframes modal-in {
        from { opacity: 0; transform: translateY(-12px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
    }
  </style>
</head>
<body>

  <!-- Skip link: lets keyboard users bypass page chrome -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <button class="trigger" aria-haspopup="dialog" aria-controls="example-modal">
      Open Modal
    </button>
  </main>

  <!-- Backdrop — click outside closes the dialog -->
  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <!--
      role="dialog" + aria-modal="true" tells screen readers this is a modal
      and they should not read content behind it.
      aria-labelledby wires the dialog's accessible name to its visible title.
    -->
    <div
      role="dialog"
      id="example-modal"
      aria-modal="true"
      aria-labelledby="modal-title"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <!-- aria-label overrides the button's text content for screen readers -->
        <button class="modal-close" aria-label="Close dialog">&#x2715;</button>
      </div>

      <div class="modal-body">
        <p>Are you sure you want to proceed? This action cannot be undone. Please review your selection before confirming.</p>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" data-modal-cancel>Cancel</button>
        <button class="btn-primary" data-modal-confirm>Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const backdrop  = document.getElementById('modal-backdrop');
      const dialog    = document.getElementById('example-modal');
      const trigger   = document.querySelector('.trigger');
      const closeBtn  = dialog.querySelector('.modal-close');
      const cancelBtn = dialog.querySelector('[data-modal-cancel]');
      const confirmBtn = dialog.querySelector('[data-modal-confirm]');

      // All focusable elements inside the dialog (for focus trapping)
      const FOCUSABLE = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

      function getFocusable() {
        return [...dialog.querySelectorAll(FOCUSABLE)].filter(
          el => !el.hasAttribute('disabled') && !el.closest('[hidden]')
        );
      }

      function openModal() {
        backdrop.classList.add('is-open');
        backdrop.removeAttribute('aria-hidden');
        // Move focus into the dialog so screen readers enter it
        dialog.focus();
        document.body.style.overflow = 'hidden'; // prevent background scroll
      }

      function closeModal() {
        backdrop.classList.remove('is-open');
        backdrop.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        // Return focus to the element that opened the dialog
        trigger.focus();
      }

      // Trap Tab and Shift+Tab focus inside the open dialog
      function trapFocus(e) {
        if (!backdrop.classList.contains('is-open')) return;

        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];

        if (e.key === 'Tab') {
          if (e.shiftKey) {
            // Shift+Tab: if on first element, wrap to last
            if (document.activeElement === first) {
              e.preventDefault();
              last.focus();
            }
          } else {
            // Tab: if on last element, wrap to first
            if (document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          }
        }

        // Escape closes the dialog
        if (e.key === 'Escape') {
          closeModal();
        }
      }

      // Close when clicking the dark backdrop (outside the dialog box)
      backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) closeModal();
      });

      trigger.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      cancelBtn.addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', closeModal);
      document.addEventListener('keydown', trapFocus);
    })();
  </script>

</body>
</html>
