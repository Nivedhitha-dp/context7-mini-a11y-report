<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    button {
      cursor: pointer;
      font: inherit;
    }

    button:focus-visible {
      outline: 3px solid #0057b8;
      outline-offset: 2px;
    }

    .trigger {
      background: #0057b8;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
    }

    .trigger:hover {
      background: #004494;
    }

    /* Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    /* Dialog */
    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      width: min(480px, calc(100vw - 2rem));
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111;
    }

    .modal-close {
      background: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 1.4rem;
      line-height: 1;
    }

    .modal-close:hover {
      background: #f0f0f0;
      color: #111;
    }

    .modal-body {
      color: #333;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: #fff;
      color: #333;
      border: 1px solid #bbb;
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .btn-secondary:hover {
      background: #f0f0f0;
    }

    .btn-primary {
      background: #0057b8;
      color: #fff;
      border: none;
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #004494;
    }
  </style>
</head>
<body>

  <button class="trigger" aria-haspopup="dialog" aria-controls="example-modal">
    Open Modal
  </button>

  <div
    class="modal-overlay"
    id="modal-overlay"
    role="presentation"
  >
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      id="example-modal"
      class="modal"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <button
          class="modal-close"
          aria-label="Close dialog"
          data-modal-close
        >
          &#x2715;
        </button>
      </div>

      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to proceed? This action cannot be undone. Please review the details before confirming.</p>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" data-modal-close>Cancel</button>
        <button class="btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const overlay = document.getElementById('modal-overlay');
      const modal = document.getElementById('example-modal');
      const trigger = document.querySelector('.trigger');

      const FOCUSABLE = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(',');

      function getFocusable() {
        return Array.from(modal.querySelectorAll(FOCUSABLE));
      }

      function openModal() {
        overlay.classList.add('is-open');
        document.body.style.overflow = 'hidden';
        const first = getFocusable()[0];
        if (first) first.focus();
        overlay.addEventListener('keydown', trapFocus);
        overlay.addEventListener('keydown', handleEsc);
        overlay.addEventListener('click', handleOverlayClick);
      }

      function closeModal() {
        overlay.classList.remove('is-open');
        document.body.style.overflow = '';
        overlay.removeEventListener('keydown', trapFocus);
        overlay.removeEventListener('keydown', handleEsc);
        overlay.removeEventListener('click', handleOverlayClick);
        trigger.focus();
      }

      function trapFocus(e) {
        if (e.key !== 'Tab') return;
        const focusable = getFocusable();
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      function handleEsc(e) {
        if (e.key === 'Escape') closeModal();
      }

      function handleOverlayClick(e) {
        if (e.target === overlay) closeModal();
      }

      trigger.addEventListener('click', openModal);

      document.querySelectorAll('[data-modal-close]').forEach(function (btn) {
        btn.addEventListener('click', closeModal);
      });
    })();
  </script>

</body>
</html>
