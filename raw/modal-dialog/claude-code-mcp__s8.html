<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f4f5;
      color: #18181b;
    }

    .trigger {
      padding: 0.625rem 1.25rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      line-height: 1.5;
    }
    .trigger:hover { background: #1d4ed8; }
    .trigger:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 3px;
    }

    /* Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }
    .modal-overlay[hidden] { display: none; }

    /* Dialog */
    .modal {
      background: #fff;
      border-radius: 0.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 28rem;
      padding: 1.5rem;
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #18181b;
    }

    .modal-close {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 0.25rem;
      background: transparent;
      cursor: pointer;
      color: #71717a;
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { background: #f4f4f5; color: #18181b; }
    .modal-close:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .modal-body {
      color: #3f3f46;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      padding: 0.5rem 1rem;
      border: 1px solid #d4d4d8;
      background: #fff;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      color: #3f3f46;
    }
    .btn-secondary:hover { background: #f4f4f5; }
    .btn-secondary:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .btn-primary {
      padding: 0.5rem 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <button class="trigger" aria-haspopup="dialog" type="button">
    Open Modal
  </button>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      class="modal"
      id="modal"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <button
          type="button"
          class="modal-close"
          aria-label="Close dialog"
          id="modal-close"
        >&#x2715;</button>
      </div>

      <div class="modal-body" id="modal-desc">
        <p>Are you sure you want to proceed? This action cannot be undone. Please review your selection before confirming.</p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="modal-cancel">Cancel</button>
        <button type="button" class="btn-primary" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const overlay   = document.getElementById('modal-overlay');
      const modal     = document.getElementById('modal');
      const trigger   = document.querySelector('.trigger');
      const closeBtn  = document.getElementById('modal-close');
      const cancelBtn = document.getElementById('modal-cancel');
      const confirmBtn = document.getElementById('modal-confirm');

      const FOCUSABLE = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(',');

      function getFocusable() {
        return Array.from(modal.querySelectorAll(FOCUSABLE));
      }

      function trapFocus(e) {
        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];
        if (e.key === 'Tab') {
          if (e.shiftKey) {
            if (document.activeElement === first) {
              e.preventDefault();
              last.focus();
            }
          } else {
            if (document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          }
        }
        if (e.key === 'Escape') {
          closeModal();
        }
      }

      function openModal() {
        overlay.hidden = false;
        document.body.style.overflow = 'hidden';
        modal.addEventListener('keydown', trapFocus);
        // Move focus into dialog on next frame so display is resolved
        requestAnimationFrame(() => {
          const firstFocusable = getFocusable()[0];
          (firstFocusable || modal).focus();
        });
      }

      function closeModal() {
        overlay.hidden = true;
        document.body.style.overflow = '';
        modal.removeEventListener('keydown', trapFocus);
        trigger.focus();
      }

      trigger.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      cancelBtn.addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', closeModal);

      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) closeModal();
      });
    })();
  </script>

</body>
</html>
