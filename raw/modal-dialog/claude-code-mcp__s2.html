<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .trigger {
      padding: 0.75rem 1.5rem;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    .trigger:hover { background: #1344b8; }
    .trigger:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 3px;
    }

    /* Backdrop */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.is-open {
      display: flex;
    }

    /* Dialog */
    [role="dialog"] {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      width: min(480px, calc(100vw - 2rem));
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .modal-close {
      width: 2.25rem;
      height: 2.25rem;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 1.25rem;
      line-height: 1;
    }
    .modal-close:hover { background: #f0f0f0; color: #1a1a1a; }
    .modal-close:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
    }

    .modal-body {
      margin-bottom: 1.5rem;
      line-height: 1.6;
      color: #333;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 0.625rem 1.25rem;
      border: 2px solid #888;
      background: transparent;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      color: #1a1a1a;
      font-weight: 600;
    }
    .btn-cancel:hover { background: #f0f0f0; }
    .btn-cancel:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
    }

    .btn-confirm {
      padding: 0.625rem 1.25rem;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-confirm:hover { background: #1344b8; }
    .btn-confirm:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <button class="trigger" type="button" aria-haspopup="dialog">
    Open Modal
  </button>

  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div
      role="dialog"
      id="modal"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>
        <button
          class="modal-close"
          type="button"
          aria-label="Close dialog"
          id="modal-close-btn"
        >&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-desc">
        Are you sure you want to proceed? This action cannot be undone. Please review your selection before confirming.
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" type="button" id="modal-cancel">Cancel</button>
        <button class="btn-confirm" type="button" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.querySelector('.trigger');
    const backdrop = document.getElementById('modal-backdrop');
    const dialog = document.getElementById('modal');
    const closeBtn = document.getElementById('modal-close-btn');
    const cancelBtn = document.getElementById('modal-cancel');
    const confirmBtn = document.getElementById('modal-confirm');

    const FOCUSABLE = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

    function getFocusableEls() {
      return Array.from(dialog.querySelectorAll(FOCUSABLE)).filter(
        el => !el.disabled && !el.closest('[hidden]')
      );
    }

    function openModal() {
      backdrop.classList.add('is-open');
      backdrop.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
      dialog.focus();
    }

    function closeModal() {
      backdrop.classList.remove('is-open');
      backdrop.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      trigger.focus();
    }

    function trapFocus(e) {
      if (!backdrop.classList.contains('is-open')) return;
      const focusable = getFocusableEls();
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.key === 'Tab') {
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      }
      if (e.key === 'Escape') { closeModal(); }
    }

    trigger.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);

    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) closeModal();
    });

    document.addEventListener('keydown', trapFocus);
  </script>

</body>
</html>
