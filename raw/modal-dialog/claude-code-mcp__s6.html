<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-text: #1a1a1a;
      --color-text-muted: #4b5563;
      --color-border: #d1d5db;
      --color-overlay: rgba(0, 0, 0, 0.55);
      --focus-ring: 0 0 0 3px #93c5fd;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* skip-link: lets keyboard users bypass repeated nav */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 1rem;
      background: var(--color-primary);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 1rem;
      outline: none;
      box-shadow: var(--focus-ring);
    }

    /* Visible focus styles for all interactive elements */
    :focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    button {
      cursor: pointer;
      font: inherit;
      border: none;
    }

    .trigger {
      background: var(--color-primary);
      color: #ffffff;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .trigger:hover { background: var(--color-primary-hover); }
    .trigger:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    /* Overlay — hidden by default */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Open state — toggled via JS */
    .modal-overlay.is-open {
      display: flex;
    }

    /* Dialog container */
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 480px;
      padding: 2rem;
      position: relative;
      /* Prevent scroll-chain leaking to page */
      overflow-y: auto;
      max-height: calc(100vh - 2rem);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.3;
    }

    /* Close button — top-right corner */
    .modal-close {
      background: transparent;
      color: var(--color-text-muted);
      border-radius: 4px;
      padding: 0.25rem;
      line-height: 0;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--color-text); }
    .modal-close:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    .modal-description {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-text);
      border: 1.5px solid var(--color-border);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 500;
      transition: border-color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--color-text-muted); }
    .btn-secondary:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    /* Prevent body scroll while modal is open */
    body.modal-open { overflow: hidden; }

    /* Respect reduced-motion preference */
    @media (prefers-reduced-motion: no-preference) {
      .modal-overlay.is-open { animation: fade-in 0.15s ease; }
      .modal-overlay.is-open .modal { animation: slide-up 0.2s ease; }
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-up { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>

  <!-- skip-link: keyboard shortcut to bypass header/nav to reach main content -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <main id="main">
    <button
      class="trigger"
      aria-haspopup="dialog"
      aria-controls="confirm-modal"
      id="open-modal-btn"
    >
      Open Dialog
    </button>
  </main>

  <!--
    role="dialog": identifies this as a dialog widget
    aria-modal="true": tells screen readers the page behind is inert
    aria-labelledby: links title so the dialog name is announced on open
    aria-describedby: links description so context is announced on open
  -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    role="presentation"
  >
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      id="confirm-modal"
      class="modal"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Action</h2>

        <!-- aria-label gives the icon-only close button an accessible name -->
        <button
          class="modal-close"
          id="modal-close-btn"
          aria-label="Close dialog"
        >
          <svg aria-hidden="true" focusable="false" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="4" x2="16" y2="16"/>
            <line x1="16" y1="4" x2="4" y2="16"/>
          </svg>
        </button>
      </div>

      <p class="modal-description" id="modal-desc">
        Are you sure you want to continue? This action cannot be undone. Review your changes before proceeding.
      </p>

      <div class="modal-actions">
        <!-- Cancel is first in DOM but last visually via flex-row-reverse would be an option;
             keeping natural order so reading and tab order match -->
        <button class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button class="btn-primary" id="modal-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const overlay   = document.getElementById('modal-overlay');
    const modal     = document.getElementById('confirm-modal');
    const openBtn   = document.getElementById('open-modal-btn');
    const closeBtn  = document.getElementById('modal-close-btn');
    const cancelBtn = document.getElementById('modal-cancel-btn');
    const confirmBtn = document.getElementById('modal-confirm-btn');

    // All focusable element types that should be trapped inside the modal
    const FOCUSABLE = [
      'a[href]',
      'button:not([disabled])',
      'input:not([disabled])',
      'select:not([disabled])',
      'textarea:not([disabled])',
      '[tabindex]:not([tabindex="-1"])',
    ].join(',');

    function getFocusable() {
      return [...modal.querySelectorAll(FOCUSABLE)];
    }

    function openModal() {
      overlay.classList.add('is-open');
      document.body.classList.add('modal-open');

      // Move focus into the dialog so screen readers announce it immediately
      modal.focus();
    }

    function closeModal() {
      overlay.classList.remove('is-open');
      document.body.classList.remove('modal-open');

      // Return focus to the element that triggered the dialog
      openBtn.focus();
    }

    // Focus trap: keep Tab and Shift+Tab cycling within the modal
    function trapFocus(e) {
      if (e.key !== 'Tab') return;

      const focusable = getFocusable();
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];

      if (e.shiftKey) {
        // Shift+Tab: if focus is on first element, wrap to last
        if (document.activeElement === first) {
          e.preventDefault();
          last.focus();
        }
      } else {
        // Tab: if focus is on last element, wrap to first
        if (document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function handleKeyDown(e) {
      // Escape key closes the modal per ARIA APG dialog pattern
      if (e.key === 'Escape') {
        closeModal();
        return;
      }
      trapFocus(e);
    }

    // Click outside the modal panel (on the overlay) closes it
    function handleOverlayClick(e) {
      if (e.target === overlay) closeModal();
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', handleOverlayClick);
    overlay.addEventListener('keydown', handleKeyDown);
  </script>

</body>
</html>
