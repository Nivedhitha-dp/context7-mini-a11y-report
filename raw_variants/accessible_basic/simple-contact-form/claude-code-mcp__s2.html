<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      color: #1a1a1a;
    }

    .required-note {
      font-size: 0.875rem;
      color: #595959;
      margin-bottom: 1.75rem;
    }

    .required-note abbr {
      text-decoration: none;
      color: #c00;
      font-weight: 700;
    }

    form { display: flex; flex-direction: column; gap: 1.5rem; }

    .form-field { display: flex; flex-direction: column; gap: 0.375rem; }

    label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .required-marker {
      color: #c00;
      font-weight: 700;
      margin-left: 0.2em;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      font-size: 1rem;
      font-family: inherit;
      padding: 0.625rem 0.75rem;
      border: 2px solid #767676;
      border-radius: 4px;
      color: #1a1a1a;
      background: #fff;
      width: 100%;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 3px solid #005fcc;
      outline-offset: 2px;
      border-color: #005fcc;
    }

    input[type="text"]:invalid:not(:placeholder-shown),
    input[type="email"]:invalid:not(:placeholder-shown) {
      border-color: #c00;
    }

    .helper-text {
      font-size: 0.8125rem;
      color: #595959;
      line-height: 1.4;
    }

    button[type="submit"] {
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      background: #005fcc;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #004eaa; }

    button[type="submit"]:focus {
      outline: 3px solid #005fcc;
      outline-offset: 3px;
      background: #004eaa;
    }

    button[type="submit"]:active { background: #003d88; }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-note">Fields marked <abbr title="required">*</abbr> are required.</p>

    <form novalidate>

      <div class="form-field">
        <label for="full-name">
          Full Name
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          required
          aria-required="true"
          autocomplete="name"
          spellcheck="false"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          autocomplete="email"
          spellcheck="false"
        >
        <p id="email-hint" class="helper-text">
          Enter your email in the format: name@example.com
        </p>
      </div>

      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          aria-describedby="phone-hint"
          autocomplete="tel"
        >
        <p id="phone-hint" class="helper-text">
          Optional. Preferred format: (123) 456-7890
        </p>
      </div>

      <button type="submit">Submit</button>

    </form>
  </main>
</body>
</html>
