<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    main {
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .required-note {
      font-size: 0.875rem;
      color: #595959;
      margin-bottom: 1.5rem;
    }

    .required-note abbr {
      text-decoration: none;
      color: #c0392b;
      font-weight: bold;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    label .required-marker {
      color: #c0392b;
      margin-left: 0.2em;
      font-weight: bold;
    }

    input {
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #767676;
      border-radius: 4px;
      color: #1a1a1a;
      background: #fff;
      transition: border-color 0.15s, outline 0.15s;
    }

    input:focus {
      outline: 3px solid #005fcc;
      outline-offset: 2px;
      border-color: #005fcc;
    }

    /* High-contrast focus for Windows HC mode */
    @media (forced-colors: active) {
      input:focus { outline: 3px solid ButtonText; }
    }

    .helper-text {
      font-size: 0.8125rem;
      color: #595959;
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      color: #fff;
      background: #005fcc;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #004aaa;
    }

    button[type="submit"]:focus {
      outline: 3px solid #005fcc;
      outline-offset: 3px;
      background: #004aaa;
    }

    @media (forced-colors: active) {
      button[type="submit"]:focus { outline: 3px solid ButtonText; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-note">Fields marked <abbr title="required">*</abbr> are required.</p>

    <form novalidate>
      <div class="form-field">
        <label for="full-name">
          Full Name
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          spellcheck="false"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          inputmode="email"
        >
        <p id="email-hint" class="helper-text">Use the format: name@example.com</p>
      </div>

      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
          inputmode="tel"
        >
        <p id="phone-hint" class="helper-text">Optional. Preferred format: (555) 555-5555</p>
      </div>

      <button type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
