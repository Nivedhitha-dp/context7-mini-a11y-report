<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f0f2f5;
      margin: 0;
      padding: 2rem 1rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .required-note {
      font-size: 0.875rem;
      color: #4a4a4a;
      margin: 0 0 1.75rem;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 1.375rem;
    }

    label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .required-mark {
      color: #b91c1c;
      margin-left: 0.15em;
    }

    input {
      font-size: 1rem;
      font-family: inherit;
      padding: 0.5625rem 0.75rem;
      border: 2px solid #6b7280;
      border-radius: 4px;
      color: #1a1a1a;
      background: #ffffff;
      width: 100%;
    }

    input:focus {
      outline: 3px solid #1d4ed8;
      outline-offset: 2px;
      border-color: #1d4ed8;
    }

    .helper-text {
      font-size: 0.8125rem;
      color: #4a4a4a;
    }

    .actions {
      margin-top: 0.5rem;
    }

    button[type="submit"] {
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      padding: 0.625rem 1.75rem;
      color: #ffffff;
      background: #1d4ed8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #1e40af;
    }

    button[type="submit"]:focus {
      outline: 3px solid #1d4ed8;
      outline-offset: 3px;
      background: #1e40af;
    }

    button[type="submit"]:active {
      background: #1e3a8a;
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-note">
      Fields marked with <span class="required-mark" aria-hidden="true">*</span><span class="sr-only">an asterisk</span> are required.
    </p>
    <form novalidate>
      <div class="form-field">
        <label for="full-name">
          Full Name<span class="required-mark" aria-hidden="true"> *</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address<span class="required-mark" aria-hidden="true"> *</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
        >
        <span id="email-hint" class="helper-text">Enter your email in the format: name@example.com</span>
      </div>

      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
        >
        <span id="phone-hint" class="helper-text">Optional. Preferred format: (555) 555-5555</span>
      </div>

      <div class="actions">
        <button type="submit">Submit</button>
      </div>
    </form>
  </main>
</body>
</html>
