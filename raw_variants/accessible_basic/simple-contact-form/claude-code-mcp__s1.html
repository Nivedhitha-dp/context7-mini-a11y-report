<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    /* CSS custom properties for easy theming and high-contrast overrides */
    :root {
      --color-bg: #ffffff;
      --color-surface: #f8f9fa;
      --color-border: #6b7280;
      --color-border-focus: #1d4ed8;
      --color-text: #111827;
      --color-text-muted: #4b5563;
      --color-primary: #1d4ed8;
      --color-primary-hover: #1e40af;
      --color-error: #b91c1c;
      --color-helper: #4b5563;
      --radius: 6px;
      --focus-ring: 0 0 0 3px #93c5fd;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      padding: 2rem 1rem;
      /* 4.5:1 contrast: #111827 on #ffffff = 16.9:1 ✓ */
    }

    /* skip-link: lets keyboard users bypass repeated nav and jump to main content */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--color-primary);
      color: #ffffff;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 1rem;
    }

    main {
      max-width: 540px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .form-description {
      color: var(--color-text-muted);
      margin-bottom: 2rem;
      /* #4b5563 on #ffffff = 7.1:1 ✓ */
    }

    /* Each field wrapper: label + input + helper/error */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1.5rem;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* Required indicator: paired with text so color isn't the only signal */
    .required-indicator {
      color: var(--color-error);
      margin-left: 0.2rem;
      aria-hidden: true; /* spoken by aria-required on the input instead */
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--color-text);
      background: var(--color-bg);
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      transition: border-color 0.15s ease;
      /* min touch target height >= 44px via line-height + padding */
      min-height: 44px;
    }

    input:focus,
    input:focus-visible {
      outline: none;
      border-color: var(--color-border-focus);
      /* 3px focus ring: #93c5fd on white = visible and on-brand */
      box-shadow: var(--focus-ring);
    }

    /* Helper text: linked via aria-describedby so screen readers read it after the label */
    .helper-text {
      font-size: 0.85rem;
      color: var(--color-helper);
      /* #4b5563 on #ffffff = 7.1:1 ✓ */
    }

    /* Submit button: minimum 44×44px touch target */
    .btn-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #ffffff;
      background: var(--color-primary);
      border: 2px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s ease;
      /* #ffffff on #1d4ed8 = 7.1:1 ✓ */
    }

    .btn-submit:hover {
      background: var(--color-primary-hover);
    }

    .btn-submit:focus,
    .btn-submit:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    /* Respect user preference to reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
      }
    }

    /* Ensure layout holds at narrow viewports and 200% zoom */
    @media (max-width: 400px) {
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <!-- skip-link: allows keyboard users to bypass page chrome and jump directly to the form -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <h1>Contact Us</h1>
    <p class="form-description">Fill out the form below and we'll get back to you shortly.</p>

    <form action="#" method="post" novalidate>
      <!-- Full Name: required, autocomplete assists users with motor impairments -->
      <div class="form-field">
        <label for="full-name">
          Full Name
          <!-- aria-hidden hides the asterisk from screen readers; aria-required on the input communicates requirement instead -->
          <span class="required-indicator" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          spellcheck="false"
        >
      </div>

      <!-- Email Address: required, helper text linked via aria-describedby so screen readers announce format hint after field label -->
      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-indicator" aria-hidden="true">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          spellcheck="false"
          inputmode="email"
        >
        <!-- helper text: read after the label by screen readers because of aria-describedby -->
        <span id="email-hint" class="helper-text">Format: user@example.com</span>
      </div>

      <!-- Phone Number: optional, helper text linked via aria-describedby for preferred format -->
      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
          inputmode="tel"
        >
        <!-- no aria-required: field is optional; absence of required/aria-required communicates this -->
        <span id="phone-hint" class="helper-text">Optional. Preferred format: (555) 123-4567</span>
      </div>

      <!-- Submit: type="submit" gives native semantics; no need for role="button" -->
      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </main>
</body>
</html>
