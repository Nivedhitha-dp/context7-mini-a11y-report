<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f8f9fa;
      --color-surface: #ffffff;
      --color-primary: #1a56db;
      --color-primary-hover: #1342b0;
      --color-text: #111827;
      --color-text-muted: #4b5563;
      --color-border: #d1d5db;
      --color-danger: #b91c1c;
      --color-danger-hover: #991b1b;
      --focus-outline: 3px solid #1a56db;
      --focus-offset: 3px;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      line-height: 1.5;
    }

    /* Skip link: visually hidden until focused */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 1rem;
      z-index: 9999;
      background: var(--color-primary);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
    }
    .skip-link:focus {
      top: 1rem;
      outline: var(--focus-outline);
      outline-offset: var(--focus-offset);
    }

    /* Visible focus styles for all interactive elements */
    :focus-visible {
      outline: var(--focus-outline);
      outline-offset: var(--focus-offset);
    }

    main {
      text-align: center;
    }

    main h1 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    /* Trigger button */
    .trigger {
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      padding: 0.65rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease;
      min-height: 44px;
      min-width: 44px;
    }
    .trigger:hover {
      background: var(--color-primary-hover);
    }

    /* ── dialog backdrop ── */
    dialog::backdrop {
      background: rgba(0, 0, 0, 0.55);
    }

    /* ── dialog element ── */
    dialog {
      border: none;
      border-radius: var(--radius);
      padding: 0;
      width: min(480px, calc(100vw - 2rem));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      background: var(--color-surface);
      color: var(--color-text);
      /* prevent display:none fighting with [open] */
      display: flex;
      flex-direction: column;
    }
    /* Hide when not open — display:flex is overridden by UA sheet when closed */
    dialog:not([open]) {
      display: none;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem 0;
      gap: 1rem;
    }

    .dialog-title {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
    }

    /* Close (×) button */
    .dialog-close {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .dialog-close:hover {
      background: var(--color-bg);
      color: var(--color-text);
    }

    .dialog-body {
      padding: 1rem 1.5rem;
      color: var(--color-text-muted);
      font-size: 0.9375rem;
    }

    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 0 1.5rem 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.6rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: background 0.15s ease;
    }
    .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover { background: var(--color-bg); }

    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      border: none;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }

    /* Reduced motion: disable all transitions */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Skip link: lets keyboard users bypass repeated navigation -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <h1>Modal Dialog Demo</h1>
    <!-- trigger class required; aria-haspopup+aria-controls announce relationship to AT -->
    <button
      class="trigger"
      aria-haspopup="dialog"
      aria-controls="example-dialog"
    >
      Open Dialog
    </button>
  </main>

  <!--
    <dialog> provides native role="dialog" semantics.
    aria-modal="true" tells AT to restrict virtual cursor to dialog content.
    aria-labelledby points to the visible heading inside.
  -->
  <dialog
    id="example-dialog"
    aria-modal="true"
    aria-labelledby="dialog-title"
  >
    <div class="dialog-header">
      <h2 class="dialog-title" id="dialog-title">Confirm Action</h2>
      <!-- aria-label provides an accessible name distinct from the heading text -->
      <button class="dialog-close" aria-label="Close dialog">&times;</button>
    </div>

    <div class="dialog-body" id="dialog-desc">
      <p>Are you sure you want to continue? This action will update your preferences and cannot be undone automatically.</p>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-secondary" data-dialog-cancel>Cancel</button>
      <button class="btn btn-primary" data-dialog-confirm>Confirm</button>
    </div>
  </dialog>

  <script>
    (() => {
      const dialog   = document.getElementById('example-dialog');
      const trigger  = document.querySelector('.trigger');
      const closeBtn = dialog.querySelector('.dialog-close');
      const cancelBtn = dialog.querySelector('[data-dialog-cancel]');
      const confirmBtn = dialog.querySelector('[data-dialog-confirm]');

      // All focusable elements inside the dialog for the focus trap
      const FOCUSABLE = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

      function getFocusable() {
        return [...dialog.querySelectorAll(FOCUSABLE)].filter(
          el => !el.disabled && el.offsetParent !== null
        );
      }

      function openDialog() {
        dialog.showModal();               // native <dialog> API; adds [open], blocks background scroll
        // Move focus to first focusable element inside the dialog
        const focusable = getFocusable();
        if (focusable.length) focusable[0].focus();
      }

      function closeDialog() {
        dialog.close();                   // native close; removes [open]
        trigger.focus();                  // return focus to the element that opened it
      }

      // Focus trap: keep Tab and Shift+Tab cycling within the dialog
      dialog.addEventListener('keydown', e => {
        if (e.key !== 'Tab') return;

        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];

        if (e.shiftKey) {
          // Shift+Tab: if focus is on first element, wrap to last
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          // Tab: if focus is on last element, wrap to first
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      });

      // Native <dialog> fires 'cancel' on Escape — close and restore focus
      dialog.addEventListener('cancel', e => {
        e.preventDefault();   // prevent default so we control focus return
        closeDialog();
      });

      // Click outside (on backdrop) closes the dialog
      dialog.addEventListener('click', e => {
        // dialog covers only its own box; a click on ::backdrop targets the dialog element itself
        // with clientX/clientY outside the dialog rect
        const rect = dialog.getBoundingClientRect();
        const clickedOutside =
          e.clientX < rect.left  ||
          e.clientX > rect.right ||
          e.clientY < rect.top   ||
          e.clientY > rect.bottom;
        if (clickedOutside) closeDialog();
      });

      trigger.addEventListener('click', openDialog);
      closeBtn.addEventListener('click', closeDialog);
      cancelBtn.addEventListener('click', closeDialog);
      confirmBtn.addEventListener('click', closeDialog);
    })();
  </script>

</body>
</html>
