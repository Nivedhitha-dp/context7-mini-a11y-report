<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Dialog Example</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }

        .trigger {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .trigger:hover {
            background-color: #0052a3;
        }

        .trigger:focus {
            outline: 3px solid #4d94ff;
            outline-offset: 2px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            margin: 0;
            font-size: 1.5rem;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            color: #666;
            line-height: 1;
            transition: background-color 0.2s, color 0.2s;
        }

        .modal-close:hover {
            background-color: #f0f0f0;
            color: #333;
        }

        .modal-close:focus {
            outline: 3px solid #4d94ff;
            outline-offset: 2px;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .button {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #ccc;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .button-primary {
            background-color: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        .button-primary:hover {
            background-color: #0052a3;
            border-color: #0052a3;
        }

        .button-secondary {
            background-color: white;
            color: #333;
        }

        .button-secondary:hover {
            background-color: #f0f0f0;
        }

        .button:focus {
            outline: 3px solid #4d94ff;
            outline-offset: 2px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-input:focus {
            outline: 3px solid #4d94ff;
            outline-offset: 0;
            border-color: #0066cc;
        }
    </style>
</head>
<body>
    <main>
        <h1>Modal Dialog Component Example</h1>
        <p>Click the button below to open the modal dialog.</p>
        <button class="trigger" id="openModal">Open Modal Dialog</button>
    </main>

    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDescription">
        <div class="modal">
            <header class="modal-header">
                <h2 class="modal-title" id="modalTitle">Contact Form</h2>
                <button class="modal-close" id="closeModal" aria-label="Close dialog">×</button>
            </header>
            <div class="modal-body" id="modalDescription">
                <p>Please fill out the form below to get in touch with us.</p>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" id="name" name="name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="message" class="form-label">Message</label>
                        <textarea id="message" name="message" class="form-input" rows="4" required></textarea>
                    </div>
                </form>
            </div>
            <footer class="modal-footer">
                <button type="button" class="button button-secondary" id="cancelButton">Cancel</button>
                <button type="submit" class="button button-primary" id="submitButton">Submit</button>
            </footer>
        </div>
    </div>

    <script>
        const openModalBtn = document.getElementById('openModal');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeModalBtn = document.getElementById('closeModal');
        const cancelBtn = document.getElementById('cancelButton');
        const submitBtn = document.getElementById('submitButton');
        const contactForm = document.getElementById('contactForm');
        let lastFocusedElement = null;

        const focusableSelectors = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

        function getFocusableElements() {
            return modalOverlay.querySelectorAll(focusableSelectors);
        }

        function openModal() {
            lastFocusedElement = document.activeElement;
            modalOverlay.classList.add('active');
            
            const focusableElements = getFocusableElements();
            if (focusableElements.length > 0) {
                focusableElements[0].focus();
            }
            
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            
            if (lastFocusedElement) {
                lastFocusedElement.focus();
            }
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (contactForm.checkValidity()) {
                alert('Form submitted successfully!');
                contactForm.reset();
                closeModal();
            } else {
                contactForm.reportValidity();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!modalOverlay.classList.contains('active')) return;

            if (e.key === 'Escape') {
                closeModal();
            }

            if (e.key === 'Tab') {
                const focusableElements = Array.from(getFocusableElements());
                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];

                if (e.shiftKey) {
                    if (document.activeElement === firstElement) {
                        e.preventDefault();
                        lastElement.focus();
                    }
                } else {
                    if (document.activeElement === lastElement) {
                        e.preventDefault();
                        firstElement.focus();
                    }
                }
            }
        });
    </script>
</body>
</html>
