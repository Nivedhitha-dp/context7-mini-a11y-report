<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .trigger {
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }

    .trigger:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 3px;
    }

    .trigger:hover {
      background: #1648c2;
    }

    dialog {
      border: none;
      border-radius: 10px;
      padding: 2rem;
      max-width: 480px;
      width: calc(100% - 2rem);
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      background: #fff;
      color: #1a1a1a;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.55);
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .dialog-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .dialog-close {
      background: none;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
      color: #444;
      padding: 0.15rem 0.4rem;
    }

    .dialog-close:hover {
      background: #f0f0f0;
      color: #1a1a1a;
    }

    .dialog-close:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
    }

    .dialog-body {
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      margin-bottom: 1.5rem;
    }

    .dialog-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: #fff;
      color: #1a1a1a;
      border: 2px solid #aaa;
      border-radius: 6px;
      padding: 0.6rem 1.25rem;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-secondary:hover {
      background: #f0f0f0;
      border-color: #666;
    }

    .btn-secondary:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
    }

    .btn-primary {
      background: #1a56db;
      color: #fff;
      border: 2px solid #1a56db;
      border-radius: 6px;
      padding: 0.6rem 1.25rem;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #1648c2;
      border-color: #1648c2;
    }

    .btn-primary:focus-visible {
      outline: 3px solid #1a56db;
      outline-offset: 3px;
    }
  </style>
</head>
<body>

  <button type="button" class="trigger" aria-haspopup="dialog">Open Dialog</button>

  <dialog id="example-dialog" aria-labelledby="dialog-title" aria-modal="true">
    <div class="dialog-header">
      <h2 class="dialog-title" id="dialog-title">Confirm Action</h2>
      <button
        type="button"
        class="dialog-close"
        aria-label="Close dialog"
      >&times;</button>
    </div>
    <div class="dialog-body">
      <p>Are you sure you want to proceed? This action cannot be undone. Please review the details before confirming.</p>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn-secondary" data-dialog-cancel>Cancel</button>
      <button type="button" class="btn-primary" data-dialog-confirm>Confirm</button>
    </div>
  </dialog>

  <script>
    (function () {
      const trigger = document.querySelector('.trigger');
      const dialog = document.getElementById('example-dialog');
      const closeBtn = dialog.querySelector('.dialog-close');
      const cancelBtn = dialog.querySelector('[data-dialog-cancel]');
      const confirmBtn = dialog.querySelector('[data-dialog-confirm]');

      function openDialog() {
        dialog.showModal();
        closeBtn.focus();
      }

      function closeDialog() {
        dialog.close();
        trigger.focus();
      }

      trigger.addEventListener('click', openDialog);
      closeBtn.addEventListener('click', closeDialog);
      cancelBtn.addEventListener('click', closeDialog);
      confirmBtn.addEventListener('click', closeDialog);

      // Close on backdrop click
      dialog.addEventListener('click', function (e) {
        if (e.target === dialog) closeDialog();
      });

      // ESC is handled natively by <dialog>; restore focus after native close
      dialog.addEventListener('close', function () {
        trigger.focus();
      });
    })();
  </script>

</body>
</html>
