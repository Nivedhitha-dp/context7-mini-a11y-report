<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    /* Skip link: visually hidden until focused by keyboard */
    .skip-link {
      position: absolute;
      top: -9999px;
      left: -9999px;
      background: #1a56db;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 0 0 4px 4px;
      font-weight: 600;
      text-decoration: none;
      z-index: 100;
    }
    .skip-link:focus {
      top: 0;
      left: 1rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #111827;
    }

    .form-intro {
      font-size: 0.9rem;
      color: #374151;
      margin-bottom: 1.75rem;
    }

    /* Required indicator legend */
    .required-note {
      font-size: 0.85rem;
      color: #374151;
      margin-bottom: 1.5rem;
    }
    .required-note .req-marker {
      color: #b91c1c;
      font-weight: 700;
      margin-right: 0.25rem;
      aria-hidden: true;
    }

    /* Each form field wrapper */
    .form-field {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .form-field label {
      font-size: 0.925rem;
      font-weight: 600;
      color: #111827;
    }

    /* Required star inside label */
    .form-field label .req {
      color: #b91c1c;
      font-weight: 700;
      margin-left: 0.2rem;
    }

    .form-field input {
      padding: 0.625rem 0.75rem;
      border: 1.5px solid #6b7280;
      border-radius: 5px;
      font-size: 1rem;
      color: #111827;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      /* Minimum 44px touch target height */
      min-height: 44px;
    }

    /* Visible, high-contrast focus ring — never remove focus styles */
    .form-field input:focus {
      outline: 3px solid #1a56db;
      outline-offset: 2px;
      border-color: #1a56db;
      box-shadow: none;
    }

    /* Helper / hint text */
    .helper-text {
      font-size: 0.825rem;
      color: #4b5563;
      line-height: 1.4;
    }

    .optional-badge {
      font-size: 0.775rem;
      color: #6b7280;
      font-weight: 400;
      margin-left: 0.3rem;
    }

    button[type="submit"] {
      display: block;
      width: 100%;
      padding: 0.75rem 1.25rem;
      background: #1a56db;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      /* Minimum 44px touch target */
      min-height: 44px;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #1e429f;
    }

    button[type="submit"]:focus {
      outline: 3px solid #1a56db;
      outline-offset: 3px;
      background: #1e429f;
    }

    button[type="submit"]:active {
      background: #1e3a8a;
    }

    /* Reduce/remove animations for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      .form-field input, button[type="submit"] {
        transition: none;
      }
    }

    /* Ensure layout holds at 320px and 200% zoom */
    @media (max-width: 360px) {
      main {
        padding: 1.5rem 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Skip link: first focusable element, lets keyboard users jump past chrome -->
  <a class="skip-link" href="#contact-form">Skip to form</a>

  <main>
    <h1>Contact Us</h1>
    <p class="form-intro">Fill in the form below and we'll get back to you shortly.</p>

    <!-- Required-field convention explained before the form, not after -->
    <p class="required-note">
      <span class="req-marker" aria-hidden="true">*</span>
      Fields marked with an asterisk are required.
    </p>

    <form id="contact-form" novalidate>

      <!-- Full Name -->
      <div class="form-field">
        <!-- label explicitly associated to input via for/id -->
        <label for="full-name">
          Full Name<span class="req" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          spellcheck="false"
        >
      </div>

      <!-- Email Address -->
      <div class="form-field">
        <label for="email">
          Email Address<span class="req" aria-hidden="true">*</span>
        </label>
        <!-- aria-describedby links input to its helper text for screen readers -->
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          inputmode="email"
        >
        <span id="email-hint" class="helper-text">
          Enter your email in the format: name@example.com
        </span>
      </div>

      <!-- Phone Number (optional) -->
      <div class="form-field">
        <label for="phone">
          Phone Number
          <span class="optional-badge">(optional)</span>
        </label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
          inputmode="tel"
        >
        <span id="phone-hint" class="helper-text">
          Preferred format: (555) 555-5555 or +1 555 555 5555
        </span>
      </div>

      <button type="submit">Send Message</button>

    </form>
  </main>
</body>
</html>
