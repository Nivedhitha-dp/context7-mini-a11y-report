<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* skip-link: lets keyboard users bypass repeated chrome */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: #1a1a2e;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 0 0 4px 4px;
      font-size: 0.875rem;
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus { top: 0; }

    :root {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-text: #1a1a1a;        /* 16.1:1 on white */
      --color-muted: #595959;       /* 7.0:1 on white — AAA */
      --color-accent: #0057b8;      /* 5.3:1 on white — AA */
      --color-accent-dark: #004494; /* 7.2:1 on white — AAA */
      --color-border: #767676;      /* 4.6:1 on white — AA */
      --color-error: #c0000c;       /* 5.9:1 on white — AA */
      --color-focus-ring: #0057b8;
      --radius: 6px;
      --gap: 1.5rem;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      background: var(--color-surface);
      border-radius: 10px;
      padding: 2.5rem 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      color: var(--color-text);
    }

    .form-intro {
      color: var(--color-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* required legend — not color-only: uses an asterisk + text */
    .required-note {
      font-size: 0.85rem;
      color: var(--color-muted);
      margin-bottom: 1.5rem;
    }
    .required-note abbr {
      text-decoration: none;
      font-weight: 700;
      color: var(--color-error);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: var(--gap);
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* required asterisk beside label — decorative aria-hidden, real text in aria-required */
    .required-marker {
      color: var(--color-error);
      margin-left: 0.2rem;
      font-weight: 700;
    }

    .helper-text {
      font-size: 0.82rem;
      color: var(--color-muted);
      line-height: 1.4;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 1rem;
      color: var(--color-text);
      background: #fff;
      transition: border-color 0.15s;
    }

    input[type="text"]:hover,
    input[type="email"]:hover,
    input[type="tel"]:hover {
      border-color: var(--color-accent);
    }

    /* visible focus ring — never remove :focus styles */
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 3px solid var(--color-focus-ring);
      outline-offset: 2px;
      border-color: var(--color-accent);
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px; /* touch target minimum */
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: var(--color-accent-dark);
    }

    button[type="submit"]:focus-visible {
      outline: 3px solid var(--color-focus-ring);
      outline-offset: 3px;
      background: var(--color-accent-dark);
    }

    /* reduced motion: strip transitions for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      input, button { transition: none; }
    }

    @media (max-width: 480px) {
      main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- skip-link: lets keyboard/AT users skip directly to the form -->
  <a class="skip-link" href="#contact-form">Skip to form</a>

  <main>
    <h1>Contact Us</h1>
    <p class="form-intro">Fill out the form below and we'll get back to you shortly.</p>

    <!-- required-note: conveys asterisk meaning in text, not color alone -->
    <p class="required-note"><abbr title="required">*</abbr> Required fields</p>

    <form
      id="contact-form"
      method="post"
      action="#"
      novalidate
      aria-label="Contact form"
    >

      <!-- Full Name -->
      <div class="form-field">
        <label for="full-name">
          Full Name
          <!-- aria-hidden so SR reads label naturally; aria-required on input carries the semantic -->
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          spellcheck="false"
        >
      </div>

      <!-- Email Address -->
      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <!-- aria-describedby links input to helper text so SR announces it after the label -->
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          spellcheck="false"
          inputmode="email"
        >
        <span id="email-hint" class="helper-text">
          Enter a valid email address, for example: name@example.com
        </span>
      </div>

      <!-- Phone Number (optional) -->
      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
          inputmode="tel"
        >
        <span id="phone-hint" class="helper-text">
          Optional. Preferred format: (555) 000-0000 or +1 555 000 0000
        </span>
      </div>

      <button type="submit">Send Message</button>

    </form>
  </main>

</body>
</html>
