<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    /* CSS custom properties for easy theming and high-contrast overrides */
    :root {
      --color-bg: #ffffff;
      --color-surface: #f8f9fa;
      --color-border: #6b7280;
      --color-border-focus: #1d4ed8;
      --color-text: #111827;
      --color-text-muted: #4b5563;
      --color-required: #b91c1c;
      --color-btn-bg: #1d4ed8;
      --color-btn-text: #ffffff;
      --color-btn-hover: #1e40af;
      --radius: 6px;
      --space: 1rem;
    }

    /* Skip link: visually hidden until focused, lets keyboard users bypass nav */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 1rem;
      padding: 0.5rem 1rem;
      background: var(--color-btn-bg);
      color: var(--color-btn-text);
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 1rem;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
    }

    main {
      max-width: 560px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
    }

    .form-description {
      color: var(--color-text-muted);
      margin-top: 0;
      margin-bottom: 2rem;
    }

    /* Required legend shown once, before the form, so screen readers announce it */
    .required-note {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      margin-bottom: 1.75rem;
    }
    .required-note .req-marker {
      color: var(--color-required);
      font-weight: 700;
      margin-right: 2px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      margin-bottom: 1.5rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    /* Required asterisk is aria-hidden; requirement is conveyed via aria-required on the input */
    .req-marker {
      color: var(--color-required);
      font-weight: 700;
      margin-left: 2px;
      aria-hidden: true; /* handled below in HTML */
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 1rem;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color 0.15s ease;
    }

    /* Visible focus style — never remove outline; meets 3:1 UI contrast */
    input:focus-visible {
      outline: 3px solid var(--color-border-focus);
      outline-offset: 2px;
      border-color: var(--color-border-focus);
    }

    .helper-text {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      /* Associated to its input via aria-describedby on the input element */
    }

    .optional-badge {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-text-muted);
      margin-left: 0.375rem;
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 2rem;
      background: var(--color-btn-bg);
      color: var(--color-btn-text);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px; /* WCAG 2.5.5 minimum touch target */
      min-width: 44px;
      transition: background 0.15s ease;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      background: var(--color-btn-hover);
    }

    button[type="submit"]:focus-visible {
      outline: 3px solid var(--color-border-focus);
      outline-offset: 3px;
    }

    /* Respect user's motion preference */
    @media (prefers-reduced-motion: reduce) {
      input,
      button {
        transition: none;
      }
    }
  </style>
</head>
<body>

  <!-- Skip link: first focusable element lets keyboard users jump past any repeated content -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <h1>Contact Us</h1>
    <p class="form-description">Fill out the form below and we'll get back to you shortly.</p>

    <!-- Announce required field convention once, before the form -->
    <p class="required-note">
      Fields marked <span aria-hidden="true" class="req-marker">*</span><span class="sr-only">with an asterisk</span> are required.
    </p>

    <form novalidate>

      <!-- Full Name -->
      <div class="form-field">
        <label for="full-name">
          Full Name<span aria-hidden="true" class="req-marker">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          spellcheck="false"
        >
      </div>

      <!-- Email Address -->
      <div class="form-field">
        <label for="email">
          Email Address<span aria-hidden="true" class="req-marker">*</span>
        </label>
        <!-- aria-describedby links the helper text so screen readers read it after the label -->
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          inputmode="email"
          spellcheck="false"
        >
        <span id="email-hint" class="helper-text">
          Enter a valid email address, for example: name@example.com
        </span>
      </div>

      <!-- Phone Number (optional) -->
      <div class="form-field">
        <label for="phone">
          Phone Number<span class="optional-badge">(optional)</span>
        </label>
        <!-- aria-describedby links helper text; no aria-required since field is optional -->
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
          inputmode="tel"
        >
        <span id="phone-hint" class="helper-text">
          Preferred format: +1 (555) 000-0000 (include country code for international numbers)
        </span>
      </div>

      <button type="submit">Send Message</button>

    </form>
  </main>

  <!-- Visually-hidden utility used for sr-only spans above -->
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>

</body>
</html>
