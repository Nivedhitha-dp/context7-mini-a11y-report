<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      margin: 0;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      color: #1a1a1a;
    }

    .required-note {
      font-size: 0.875rem;
      color: #595959;
      margin: 0 0 1.5rem;
    }

    .required-note abbr {
      text-decoration: none;
      color: #b91c1c;
      font-weight: bold;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    label .required-mark {
      color: #b91c1c;
      font-weight: bold;
      margin-left: 0.2em;
      aria-hidden: true;
    }

    .helper-text {
      font-size: 0.8125rem;
      color: #595959;
      margin: 0;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a1a;
      background: #ffffff;
      border: 2px solid #6b6b6b;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      width: 100%;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: none;
      border-color: #1d4ed8;
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.25);
    }

    input[type="text"]:invalid:not(:placeholder-shown),
    input[type="email"]:invalid:not(:placeholder-shown),
    input[type="tel"]:invalid:not(:placeholder-shown) {
      border-color: #b91c1c;
    }

    .optional-label {
      font-size: 0.8125rem;
      font-weight: normal;
      color: #595959;
      margin-left: 0.25em;
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      color: #ffffff;
      background: #1d4ed8;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .submit-btn:hover {
      background: #1e40af;
    }

    .submit-btn:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.4);
    }

    .submit-btn:active {
      background: #1e3a8a;
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <p class="required-note">Fields marked with <abbr title="required">*</abbr> are required.</p>

    <form novalidate>
      <div class="form-field">
        <label for="full-name">
          Full Name<span class="required-mark" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          placeholder="Jane Smith"
        >
      </div>

      <div class="form-field">
        <label for="email">
          Email Address<span class="required-mark" aria-hidden="true">*</span>
        </label>
        <p id="email-hint" class="helper-text">Enter your email in the format: name@example.com</p>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          placeholder="name@example.com"
        >
      </div>

      <div class="form-field">
        <label for="phone">
          Phone Number<span class="optional-label">(optional)</span>
        </label>
        <p id="phone-hint" class="helper-text">Preferred format: (555) 123-4567 or +1-555-123-4567</p>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
          placeholder="(555) 123-4567"
        >
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </main>
</body>
</html>
