<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <style>
    /* CSS custom properties for easy theming and high-contrast override */
    :root {
      --color-bg: #ffffff;
      --color-surface: #f8f9fa;
      --color-border: #6b7280;
      --color-border-focus: #1d4ed8;
      --color-text: #111827;
      --color-text-muted: #4b5563;
      --color-label: #1f2937;
      --color-required: #b91c1c;
      --color-accent: #1d4ed8;
      --color-accent-hover: #1e40af;
      --color-btn-text: #ffffff;
      --radius: 6px;
      --focus-ring: 0 0 0 3px #93c5fd;
    }

    /* skip-link: lets keyboard users bypass the page header */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      z-index: 1000;
      background: var(--color-accent);
      color: var(--color-btn-text);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .skip-link:focus {
      top: 1rem;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.375rem;
    }

    .form-intro {
      font-size: 0.95rem;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }

    /* required legend: grouped note so screen readers hear it once */
    .required-note {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 1.5rem;
    }
    .required-note abbr {
      text-decoration: none;
      color: var(--color-required);
      font-weight: 700;
      cursor: default;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Each field wrapper */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-label);
    }

    /* inline required marker — aria-hidden so AT reads the aria-required instead */
    label .required-marker {
      color: var(--color-required);
      margin-left: 0.2rem;
      font-weight: 700;
      aria-hidden: true;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.625rem 0.875rem;
      font-size: 1rem;
      color: var(--color-text);
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius);
      transition: border-color 0.15s ease;
      /* min 44px touch target height */
      min-height: 44px;
    }

    input:focus {
      outline: none;
      border-color: var(--color-border-focus);
      box-shadow: var(--focus-ring);
    }

    /* helper text: visually distinct from label, linked via aria-describedby */
    .helper-text {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      line-height: 1.4;
    }

    /* submit button: minimum 44px touch target */
    .btn-submit {
      margin-top: 0.5rem;
      padding: 0.75rem 1.75rem;
      min-height: 44px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-btn-text);
      background: var(--color-accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.15s ease;
    }

    .btn-submit:hover {
      background: var(--color-accent-hover);
    }

    /* visible focus for button — 3px ring, 3:1 contrast against white bg */
    .btn-submit:focus-visible {
      outline: 3px solid var(--color-accent);
      outline-offset: 3px;
    }

    /* wrap reduced-motion: remove transition animations for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      input, .btn-submit {
        transition: none;
      }
    }

    /* ensure layout holds at 320px viewport width */
    @media (max-width: 360px) {
      .btn-submit {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- skip-link: first focusable element lets keyboard users jump past header to form -->
  <a href="#contact-form" class="skip-link">Skip to contact form</a>

  <main>
    <h1>Contact Us</h1>
    <p class="form-intro">We'd love to hear from you. Fill out the form below and we'll be in touch.</p>

    <!-- required-note: informs all users that * means required before they enter any field -->
    <p class="required-note">Fields marked <abbr title="required">*</abbr> are required.</p>

    <form id="contact-form" novalidate>

      <!-- Full Name -->
      <div class="form-field">
        <!-- for/id association: the only reliable way to link label to input for all AT -->
        <label for="full-name">
          Full Name
          <!-- aria-hidden: AT already knows the field is required via aria-required; marker is visual only -->
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
        />
      </div>

      <!-- Email Address -->
      <div class="form-field">
        <label for="email">
          Email Address
          <span class="required-marker" aria-hidden="true">*</span>
        </label>
        <!-- aria-describedby: links input to helper text so screen readers announce it after the label -->
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-hint"
          inputmode="email"
        />
        <!-- id matches aria-describedby on the input above -->
        <span id="email-hint" class="helper-text">Enter your email in the format: name@example.com</span>
      </div>

      <!-- Phone Number (optional) -->
      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          aria-describedby="phone-hint"
          inputmode="tel"
        />
        <span id="phone-hint" class="helper-text">Optional. Preferred format: (555) 000-0000</span>
      </div>

      <!-- Submit: type=submit so Enter key in any field triggers submission -->
      <button type="submit" class="btn-submit">Send Message</button>

    </form>
  </main>

</body>
</html>
