<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a2e;
    }

    .trigger {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
    }
    .trigger:hover { background: #4338ca; }
    .trigger:focus-visible {
      outline: 3px solid #fbbf24;
      outline-offset: 3px;
    }

    /* Backdrop */
    [role="dialog"] {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    [role="dialog"].open { display: flex; }

    .dialog-box {
      background: #fff;
      border-radius: 0.75rem;
      padding: 2rem;
      width: min(90vw, 480px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
    }

    .dialog-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #1a1a2e;
    }

    .dialog-body {
      font-size: 1rem;
      line-height: 1.6;
      color: #374151;
      margin-bottom: 1.5rem;
    }

    .dialog-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid #d1d5db;
      color: #374151;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-secondary:focus-visible {
      outline: 3px solid #fbbf24;
      outline-offset: 3px;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:focus-visible {
      outline: 3px solid #fbbf24;
      outline-offset: 3px;
    }

    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      color: #6b7280;
      line-height: 1;
      padding: 0.25rem;
      border-radius: 0.25rem;
      font-size: 1.5rem;
    }
    .close-btn:hover { color: #1a1a2e; background: #f3f4f6; }
    .close-btn:focus-visible {
      outline: 3px solid #fbbf24;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <button class="trigger" aria-haspopup="dialog" id="open-modal">
    Open Modal
  </button>

  <div
    role="dialog"
    id="example-modal"
    aria-modal="true"
    aria-labelledby="modal-title"
    aria-describedby="modal-desc"
  >
    <div class="dialog-box">
      <button class="close-btn" id="close-modal" aria-label="Close dialog">&#x2715;</button>

      <h2 class="dialog-title" id="modal-title">Confirm Action</h2>
      <p class="dialog-desc dialog-body" id="modal-desc">
        Are you sure you want to continue? This action cannot be undone.
        Review the details carefully before proceeding.
      </p>

      <div class="dialog-actions">
        <button class="btn-secondary" id="cancel-btn">Cancel</button>
        <button class="btn-primary" id="confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('example-modal');
    const openBtn = document.getElementById('open-modal');
    const closeBtn = document.getElementById('close-modal');
    const cancelBtn = document.getElementById('cancel-btn');
    const confirmBtn = document.getElementById('confirm-btn');

    const FOCUSABLE = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

    function getFocusable() {
      return [...modal.querySelectorAll(FOCUSABLE)].filter(
        el => !el.disabled && el.offsetParent !== null
      );
    }

    function openModal() {
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      // Move focus to first focusable element inside dialog
      const first = getFocusable()[0];
      if (first) first.focus();
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      openBtn.focus();
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);

    // Close on backdrop click
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // Escape key closes modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });

    // Focus trap
    modal.addEventListener('keydown', (e) => {
      if (e.key !== 'Tab') return;
      const focusable = getFocusable();
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });
  </script>

</body>
</html>
