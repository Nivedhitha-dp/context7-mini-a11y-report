<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Modal Dialog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-text: #1a1a1a;
      --color-text-muted: #4b5563;
      --color-border: #d1d5db;
      --color-overlay: rgba(0, 0, 0, 0.6);
      --color-danger: #dc2626;
      --radius: 0.5rem;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* skip link: lets keyboard users bypass repeated nav */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 0;
      padding: 0.5rem 1rem;
      background: var(--color-primary);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      border-radius: 0 0 var(--radius) 0;
      z-index: 9999;
    }
    .skip-link:focus {
      top: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* visible focus styles — never remove :focus */
    :focus-visible {
      outline: 3px solid var(--color-primary);
      outline-offset: 2px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 1rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-text);
    }

    p {
      color: var(--color-text-muted);
      max-width: 40ch;
      text-align: center;
      line-height: 1.6;
    }

    /* trigger button to open the modal */
    .trigger {
      padding: 0.75rem 1.75rem;
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px; /* touch target minimum */
      min-width: 44px;
      transition: background 0.15s ease;
    }
    .trigger:hover {
      background: var(--color-primary-hover);
    }

    /* overlay: covers page when modal is open */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 100;
      /* hidden by default */
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    .modal-overlay.is-open {
      visibility: visible;
      opacity: 1;
    }

    /* dialog container */
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      padding: 2rem;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      /* slide-in animation */
      transform: translateY(12px);
      transition: transform 0.2s ease;
    }
    .modal-overlay.is-open .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
    }

    /* close button: visible icon with accessible label */
    .modal-close {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      width: 44px; /* touch target */
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--color-text-muted);
      transition: background 0.15s ease, color 0.15s ease;
    }
    .modal-close:hover {
      background: var(--color-bg);
      color: var(--color-text);
    }

    .modal-body {
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn-secondary {
      padding: 0.65rem 1.25rem;
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s ease;
    }
    .btn-secondary:hover {
      background: var(--color-bg);
    }

    .btn-primary {
      padding: 0.65rem 1.25rem;
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s ease;
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
    }

    /* prevent body scroll when modal is open */
    body.modal-open {
      overflow: hidden;
    }

    /* reduce motion for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      .modal-overlay,
      .modal {
        transition: none;
      }
    }
  </style>
</head>
<body>

  <!-- skip link: lets keyboard users jump past nav to main content -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content">
    <h1>Modal Dialog Example</h1>
    <p>Press the button below to open an accessible modal dialog.</p>

    <!--
      trigger class as required.
      aria-haspopup="dialog" tells screen readers this opens a dialog.
      aria-controls links the button to the dialog element.
    -->
    <button
      class="trigger"
      aria-haspopup="dialog"
      aria-controls="example-modal"
    >
      Open Dialog
    </button>
  </main>

  <!--
    Overlay acts as the backdrop.
    Clicking it closes the modal (common UX pattern).
    aria-hidden is toggled by JS so screen readers ignore overlay when closed.
  -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    aria-hidden="true"
  >
    <!--
      role="dialog": identifies this as a dialog to assistive tech.
      aria-modal="true": tells screen readers to restrict browsing to this element.
      aria-labelledby: links the dialog to its visible title for screen reader announcement.
      aria-describedby: provides additional context read after the title.
    -->
    <div
      role="dialog"
      id="example-modal"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      class="modal"
      tabindex="-1"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm Your Action</h2>

        <!--
          Close button inside the dialog.
          aria-label provides screen reader text since the button contains only an icon.
        -->
        <button
          class="modal-close"
          aria-label="Close dialog"
          id="modal-close-btn"
        >
          <!-- decorative SVG: aria-hidden prevents double-announcement -->
          <svg aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <p id="modal-desc">
          Are you sure you want to proceed? This action will save your current settings
          and cannot be undone without returning to this dialog.
        </p>
      </div>

      <div class="modal-footer">
        <!-- cancel button: closes without acting -->
        <button class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <!-- confirm button: the primary action -->
        <button class="btn-primary" id="modal-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const overlay    = document.getElementById('modal-overlay');
      const modal      = overlay.querySelector('[role="dialog"]');
      const openBtn    = document.querySelector('.trigger');
      const closeBtn   = document.getElementById('modal-close-btn');
      const cancelBtn  = document.getElementById('modal-cancel-btn');
      const confirmBtn = document.getElementById('modal-confirm-btn');

      // all focusable elements inside the dialog for focus trapping
      const FOCUSABLE = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

      function getFocusable() {
        return [...modal.querySelectorAll(FOCUSABLE)].filter(
          el => !el.hasAttribute('disabled') && !el.closest('[hidden]')
        );
      }

      function openModal() {
        overlay.classList.add('is-open');
        // aria-hidden: false so screen readers enter the dialog
        overlay.setAttribute('aria-hidden', 'false');
        document.body.classList.add('modal-open');

        // move focus into the dialog — screen readers announce role + label
        modal.focus();
      }

      function closeModal() {
        overlay.classList.remove('is-open');
        // aria-hidden: true so screen readers ignore the hidden overlay
        overlay.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('modal-open');

        // return focus to the trigger that opened the dialog
        openBtn.focus();
      }

      // trap Tab and Shift+Tab inside the modal, and close on Escape
      function trapFocus(e) {
        if (e.key === 'Escape') {
          closeModal();
          return;
        }

        if (e.key !== 'Tab') return;

        const focusable = getFocusable();
        const first = focusable[0];
        const last  = focusable[focusable.length - 1];

        if (e.shiftKey) {
          // shift+tab from first element → wrap to last
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          // tab from last element → wrap to first
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      // open on trigger click
      openBtn.addEventListener('click', openModal);

      // close on close/cancel buttons
      closeBtn.addEventListener('click', closeModal);
      cancelBtn.addEventListener('click', closeModal);

      // confirm: in a real app this would submit; here it just closes
      confirmBtn.addEventListener('click', () => {
        closeModal();
      });

      // close when clicking the overlay backdrop (outside the dialog)
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
      });

      // attach keydown trap only while modal is open
      overlay.addEventListener('keydown', trapFocus);
    })();
  </script>

</body>
</html>
