<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form - Contact Us</title>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --color-muted-text: #595959;
      --color-border: #737373;
      --color-focus: #0066cc;
      --color-danger: #c62828;
      --color-link: #0066cc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.5;
      margin: 0;
      padding: 0;
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    .sr-only:not(:focus):not(:active) {
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      height: 1px;
      overflow: hidden;
      position: absolute;
      white-space: nowrap;
      width: 1px;
    }

    header {
      background-color: #f5f5f5;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    main {
      padding: 2rem 1.5rem;
      max-width: 600px;
      margin: 0 auto;
    }

    main:focus {
      outline: none;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 1.5rem 0;
    }

    .form-field {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    label {
      font-weight: 600;
      margin-bottom: 0.375rem;
      display: block;
    }

    .required-indicator {
      color: var(--color-danger);
      font-weight: 700;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.5;
      border: 2px solid var(--color-border);
      border-radius: 4px;
      background-color: var(--color-bg);
      color: var(--color-text);
      min-width: 0;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 2px solid var(--color-focus);
      outline-offset: 2px;
      border-color: var(--color-focus);
    }

    input[aria-invalid="true"] {
      border-color: var(--color-danger);
    }

    input[aria-invalid="true"]:focus {
      outline-color: var(--color-danger);
      border-color: var(--color-danger);
    }

    .helper-text {
      font-size: 0.875rem;
      color: var(--color-muted-text);
      margin-top: 0.375rem;
    }

    .error-message {
      font-size: 0.875rem;
      color: var(--color-danger);
      margin-top: 0.375rem;
      font-weight: 600;
    }

    button[type="submit"] {
      background-color: var(--color-focus);
      color: #ffffff;
      border: 2px solid var(--color-focus);
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 4px;
      cursor: pointer;
      min-width: 0;
    }

    button[type="submit"]:hover {
      background-color: #0052a3;
      border-color: #0052a3;
    }

    button[type="submit"]:active {
      background-color: #003d7a;
      border-color: #003d7a;
    }

    button[type="submit"]:focus {
      outline: 2px solid var(--color-focus);
      outline-offset: 2px;
    }

    @media (forced-colors: active) {
      button[type="submit"]:focus {
        outline: 2px solid ButtonBorder;
      }

      input:focus {
        outline: 2px solid ButtonBorder;
      }
    }

    @media (max-width: 320px) {
      main {
        padding: 1rem;
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"] {
        font-size: 16px;
      }

      button[type="submit"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="#maincontent" class="sr-only">Skip to main content</a>
  </header>
  
  <main id="maincontent" tabindex="-1">
    <h1>Contact Us</h1>
    
    <form id="contact-form" novalidate>
      <div class="form-field">
        <label for="fullname">
          Full Name <span class="required-indicator" aria-label="required">*</span>
        </label>
        <input 
          type="text" 
          id="fullname" 
          name="fullname" 
          aria-required="true"
          aria-describedby="fullname-error"
        />
        <div id="fullname-error" class="error-message" role="alert" style="display: none;"></div>
      </div>

      <div class="form-field">
        <label for="email">
          Email Address <span class="required-indicator" aria-label="required">*</span>
        </label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          aria-required="true"
          aria-describedby="email-helper email-error"
        />
        <div id="email-helper" class="helper-text">Please enter a valid email address (e.g., name@example.com)</div>
        <div id="email-error" class="error-message" role="alert" style="display: none;"></div>
      </div>

      <div class="form-field">
        <label for="phone">Phone Number</label>
        <input 
          type="tel" 
          id="phone" 
          name="phone"
          aria-describedby="phone-helper"
        />
        <div id="phone-helper" class="helper-text">Preferred format: (123) 456-7890</div>
      </div>

      <button type="submit">Submit</button>
    </form>
  </main>

  <script>
    (function() {
      const form = document.getElementById('contact-form');
      const fullnameInput = document.getElementById('fullname');
      const emailInput = document.getElementById('email');
      const fullnameError = document.getElementById('fullname-error');
      const emailError = document.getElementById('email-error');

      function validateFullName() {
        const value = fullnameInput.value.trim();
        if (!value) {
          fullnameInput.setAttribute('aria-invalid', 'true');
          fullnameError.textContent = 'Full Name is required.';
          fullnameError.style.display = 'block';
          return false;
        } else {
          fullnameInput.removeAttribute('aria-invalid');
          fullnameError.textContent = '';
          fullnameError.style.display = 'none';
          return true;
        }
      }

      function validateEmail() {
        const value = emailInput.value.trim();
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if (!value) {
          emailInput.setAttribute('aria-invalid', 'true');
          emailError.textContent = 'Email Address is required.';
          emailError.style.display = 'block';
          return false;
        } else if (!emailPattern.test(value)) {
          emailInput.setAttribute('aria-invalid', 'true');
          emailError.textContent = 'Please enter a valid email address (e.g., name@example.com).';
          emailError.style.display = 'block';
          return false;
        } else {
          emailInput.removeAttribute('aria-invalid');
          emailError.textContent = '';
          emailError.style.display = 'none';
          return true;
        }
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const isFullNameValid = validateFullName();
        const isEmailValid = validateEmail();
        
        if (!isFullNameValid || !isEmailValid) {
          if (!isFullNameValid) {
            fullnameInput.focus();
          } else if (!isEmailValid) {
            emailInput.focus();
          }
        } else {
          alert('Form submitted successfully!');
          form.reset();
        }
      });

      fullnameInput.addEventListener('blur', validateFullName);
      emailInput.addEventListener('blur', validateEmail);
    })();
  </script>
</body>
</html>
