<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form - Get in Touch</title>
<style>
:root {
  --color-bg: #ffffff;
  --color-text: #1a1a1a;
  --color-muted-text: #4a4a4a;
  --color-link: #0066cc;
  --color-border: #767676;
  --color-focus: #0066cc;
  --color-danger: #c41e3a;
  --color-success: #2d7a3e;
}

* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  line-height: 1.5;
  margin: 0;
  padding: 0;
  background-color: var(--color-bg);
  color: var(--color-text);
}

.sr-only:not(:focus):not(:active) {
  clip: rect(0 0 0 0);
  clip-path: inset(50%);
  height: 1px;
  overflow: hidden;
  position: absolute;
  white-space: nowrap;
  width: 1px;
}

header {
  background-color: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
  padding: 1rem 1.5rem;
}

main {
  padding: 2rem 1.5rem;
  max-width: 600px;
  margin: 0 auto;
}

h1 {
  font-size: 1.75rem;
  margin: 0 0 1.5rem 0;
  color: var(--color-text);
}

.form-field {
  margin-bottom: 1.5rem;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

label {
  font-weight: 600;
  margin-bottom: 0.25rem;
  color: var(--color-text);
  display: block;
}

.required-indicator {
  color: var(--color-danger);
  font-weight: 600;
}

input[type="text"],
input[type="email"],
input[type="tel"] {
  padding: 0.5rem 0.75rem;
  font-size: 1rem;
  border: 2px solid var(--color-border);
  border-radius: 4px;
  background-color: var(--color-bg);
  color: var(--color-text);
  font-family: inherit;
  line-height: 1.5;
  min-width: 0;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus {
  outline: 2px solid var(--color-focus);
  outline-offset: 2px;
  border-color: var(--color-focus);
}

input[type="text"][aria-invalid="true"],
input[type="email"][aria-invalid="true"],
input[type="tel"][aria-invalid="true"] {
  border-color: var(--color-danger);
}

.helper-text {
  font-size: 0.875rem;
  color: var(--color-muted-text);
  margin-top: 0.25rem;
}

.error-message {
  font-size: 0.875rem;
  color: var(--color-danger);
  margin-top: 0.25rem;
  font-weight: 600;
  display: none;
}

.error-message.visible {
  display: block;
}

button[type="submit"] {
  background-color: var(--color-link);
  color: var(--color-bg);
  border: 2px solid var(--color-link);
  padding: 0.75rem 2rem;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  margin-top: 0.5rem;
}

button[type="submit"]:hover {
  background-color: #0052a3;
  border-color: #0052a3;
}

button[type="submit"]:focus {
  outline: 2px solid var(--color-focus);
  outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.2);
}

button[type="submit"]:active {
  background-color: #003d7a;
  border-color: #003d7a;
}

@media (forced-colors: active) {
  button[type="submit"] {
    border: 2px solid ButtonBorder;
  }
  
  button[type="submit"]:focus {
    outline: 2px solid ButtonText;
  }
  
  input[type="text"],
  input[type="email"],
  input[type="tel"] {
    border: 2px solid ButtonBorder;
  }
  
  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus {
    outline: 2px solid Highlight;
  }
}

@media (max-width: 320px) {
  main {
    padding: 1rem;
  }
  
  input[type="text"],
  input[type="email"],
  input[type="tel"] {
    max-width: 100%;
  }
  
  button[type="submit"] {
    width: 100%;
  }
}
</style>
</head>
<body>
<header>
  <a href="#maincontent" class="sr-only">Skip to main content</a>
</header>

<main id="maincontent" tabindex="-1">
  <h1>Contact Form</h1>
  
  <form id="contactForm" novalidate>
    <div class="form-field">
      <label for="fullName">
        Full Name <span class="required-indicator" aria-hidden="true">*</span>
      </label>
      <input 
        type="text" 
        id="fullName" 
        name="fullName" 
        aria-required="true"
        aria-describedby="fullNameError"
      >
      <div id="fullNameError" class="error-message" role="alert">
        Please enter your full name.
      </div>
    </div>

    <div class="form-field">
      <label for="email">
        Email Address <span class="required-indicator" aria-hidden="true">*</span>
      </label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        aria-required="true"
        aria-describedby="emailHelper emailError"
      >
      <div id="emailHelper" class="helper-text">
        Please enter a valid email address (e.g., name@example.com).
      </div>
      <div id="emailError" class="error-message" role="alert">
        Please enter a valid email address.
      </div>
    </div>

    <div class="form-field">
      <label for="phone">
        Phone Number
      </label>
      <input 
        type="tel" 
        id="phone" 
        name="phone" 
        aria-describedby="phoneHelper"
      >
      <div id="phoneHelper" class="helper-text">
        Preferred format: (555) 123-4567
      </div>
    </div>

    <button type="submit">Submit</button>
  </form>
</main>

<script>
(function() {
  const form = document.getElementById('contactForm');
  const fullNameInput = document.getElementById('fullName');
  const emailInput = document.getElementById('email');
  const fullNameError = document.getElementById('fullNameError');
  const emailError = document.getElementById('emailError');

  function validateFullName() {
    const value = fullNameInput.value.trim();
    if (value === '') {
      fullNameInput.setAttribute('aria-invalid', 'true');
      fullNameError.classList.add('visible');
      return false;
    } else {
      fullNameInput.removeAttribute('aria-invalid');
      fullNameError.classList.remove('visible');
      return true;
    }
  }

  function validateEmail() {
    const value = emailInput.value.trim();
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (value === '' || !emailPattern.test(value)) {
      emailInput.setAttribute('aria-invalid', 'true');
      emailError.classList.add('visible');
      return false;
    } else {
      emailInput.removeAttribute('aria-invalid');
      emailError.classList.remove('visible');
      return true;
    }
  }

  fullNameInput.addEventListener('blur', validateFullName);
  emailInput.addEventListener('blur', validateEmail);

  fullNameInput.addEventListener('input', function() {
    if (fullNameInput.getAttribute('aria-invalid') === 'true') {
      validateFullName();
    }
  });

  emailInput.addEventListener('input', function() {
    if (emailInput.getAttribute('aria-invalid') === 'true') {
      validateEmail();
    }
  });

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const isFullNameValid = validateFullName();
    const isEmailValid = validateEmail();

    if (!isFullNameValid || !isEmailValid) {
      const firstInvalid = form.querySelector('[aria-invalid="true"]');
      if (firstInvalid) {
        firstInvalid.focus();
      }
    } else {
      alert('Form submitted successfully!');
      form.reset();
      fullNameInput.removeAttribute('aria-invalid');
      emailInput.removeAttribute('aria-invalid');
      fullNameError.classList.remove('visible');
      emailError.classList.remove('visible');
    }
  });
})();
</script>
</body>
</html>
