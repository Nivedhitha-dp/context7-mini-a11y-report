<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form - Get in Touch</title>
<style>
:root {
  --color-bg: #ffffff;
  --color-text: #1a1a1a;
  --color-muted-text: #4a4a4a;
  --color-border: #767676;
  --color-focus: #0066cc;
  --color-danger: #c70000;
  --color-link: #0066cc;
  --color-button-bg: #0066cc;
  --color-button-text: #ffffff;
  --color-button-hover-bg: #0052a3;
}

* {
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  line-height: 1.5;
  margin: 0;
  padding: 0;
  background-color: var(--color-bg);
  color: var(--color-text);
}

.sr-only:not(:focus):not(:active) {
  clip: rect(0 0 0 0);
  clip-path: inset(50%);
  height: 1px;
  overflow: hidden;
  position: absolute;
  white-space: nowrap;
  width: 1px;
}

header {
  background-color: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
  padding: 1rem;
}

main {
  max-width: 600px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

h1 {
  font-size: 2rem;
  margin: 0 0 0.5rem 0;
  line-height: 1.2;
}

.intro-text {
  color: var(--color-muted-text);
  margin: 0 0 2rem 0;
}

form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

label {
  font-weight: 600;
  display: block;
}

.required-indicator {
  color: var(--color-danger);
  font-weight: 600;
}

input[type="text"],
input[type="email"],
input[type="tel"] {
  font-family: inherit;
  font-size: 1rem;
  padding: 0.625rem;
  border: 2px solid var(--color-border);
  border-radius: 4px;
  background-color: var(--color-bg);
  color: var(--color-text);
  width: 100%;
  min-width: 0;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus {
  outline: 2px solid var(--color-focus);
  outline-offset: 2px;
  border-color: var(--color-focus);
}

input[aria-invalid="true"] {
  border-color: var(--color-danger);
}

.help-text {
  font-size: 0.875rem;
  color: var(--color-muted-text);
  margin: 0;
}

.error-message {
  font-size: 0.875rem;
  color: var(--color-danger);
  margin: 0;
  font-weight: 600;
}

.error-message:empty {
  display: none;
}

button[type="submit"] {
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 0.75rem 2rem;
  background-color: var(--color-button-bg);
  color: var(--color-button-text);
  border: 2px solid var(--color-button-bg);
  border-radius: 4px;
  cursor: pointer;
  align-self: flex-start;
}

button[type="submit"]:hover {
  background-color: var(--color-button-hover-bg);
  border-color: var(--color-button-hover-bg);
}

button[type="submit"]:focus {
  outline: 2px solid var(--color-focus);
  outline-offset: 2px;
}

button[type="submit"]:active {
  transform: translateY(1px);
}

@media (forced-colors: active) {
  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus {
    outline: 2px solid ButtonBorder;
  }

  button[type="submit"] {
    border: 2px solid ButtonBorder;
  }

  button[type="submit"]:focus {
    outline: 2px solid ButtonBorder;
  }
}

@media (max-width: 640px) {
  main {
    padding: 1.5rem 1rem;
  }

  h1 {
    font-size: 1.75rem;
  }

  button[type="submit"] {
    width: 100%;
  }
}
</style>
</head>
<body>
<header>
  <a href="#main-content" class="sr-only">Skip to main content</a>
</header>

<main id="main-content" tabindex="-1">
  <h1>Contact Form</h1>
  <p class="intro-text">Fill out the form below to get in touch with us. We'll respond as soon as possible.</p>

  <form id="contact-form" novalidate>
    <div class="form-field">
      <label for="full-name">
        Full Name
        <span class="required-indicator" aria-label="required">*</span>
      </label>
      <input
        type="text"
        id="full-name"
        name="full-name"
        aria-required="true"
        aria-invalid="false"
        aria-describedby="full-name-error"
      >
      <p id="full-name-error" class="error-message" role="alert"></p>
    </div>

    <div class="form-field">
      <label for="email">
        Email Address
        <span class="required-indicator" aria-label="required">*</span>
      </label>
      <input
        type="email"
        id="email"
        name="email"
        aria-required="true"
        aria-invalid="false"
        aria-describedby="email-help email-error"
        autocomplete="email"
      >
      <p id="email-help" class="help-text">Please enter a valid email address (e.g., name@example.com)</p>
      <p id="email-error" class="error-message" role="alert"></p>
    </div>

    <div class="form-field">
      <label for="phone">Phone Number</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        aria-describedby="phone-help"
        autocomplete="tel"
      >
      <p id="phone-help" class="help-text">Preferred format: (123) 456-7890</p>
    </div>

    <button type="submit">Submit</button>
  </form>
</main>

<script>
(function() {
  const form = document.getElementById('contact-form');
  const fullNameInput = document.getElementById('full-name');
  const emailInput = document.getElementById('email');
  const fullNameError = document.getElementById('full-name-error');
  const emailError = document.getElementById('email-error');

  function validateFullName() {
    const value = fullNameInput.value.trim();
    if (!value) {
      fullNameInput.setAttribute('aria-invalid', 'true');
      fullNameError.textContent = 'Full name is required.';
      return false;
    }
    fullNameInput.setAttribute('aria-invalid', 'false');
    fullNameError.textContent = '';
    return true;
  }

  function validateEmail() {
    const value = emailInput.value.trim();
    if (!value) {
      emailInput.setAttribute('aria-invalid', 'true');
      emailError.textContent = 'Email address is required.';
      return false;
    }
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(value)) {
      emailInput.setAttribute('aria-invalid', 'true');
      emailError.textContent = 'Please enter a valid email address.';
      return false;
    }
    emailInput.setAttribute('aria-invalid', 'false');
    emailError.textContent = '';
    return true;
  }

  fullNameInput.addEventListener('blur', validateFullName);
  emailInput.addEventListener('blur', validateEmail);

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const isFullNameValid = validateFullName();
    const isEmailValid = validateEmail();

    if (!isFullNameValid) {
      fullNameInput.focus();
      return;
    }

    if (!isEmailValid) {
      emailInput.focus();
      return;
    }

    alert('Form submitted successfully! (This is a demo - no data was actually sent)');
    form.reset();
    fullNameInput.setAttribute('aria-invalid', 'false');
    emailInput.setAttribute('aria-invalid', 'false');
    fullNameError.textContent = '';
    emailError.textContent = '';
  });
})();
</script>
</body>
</html>
