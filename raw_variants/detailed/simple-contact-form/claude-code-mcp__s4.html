<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form - My Site</title>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --color-muted: #595959;
      --color-border: #767676;
      --color-focus: #0057b8;
      --color-focus-ring: #ffbf47;
      --color-danger: #b91c1c;
      --color-danger-bg: #fff5f5;
      --color-success: #14532d;
      --color-success-bg: #f0fdf4;
      --color-success-border: #15803d;
      --color-btn-bg: #0057b8;
      --color-btn-text: #ffffff;
      --color-btn-hover: #003f8a;
      --color-btn-active: #002d63;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      background-color: var(--color-bg);
      color: var(--color-text);
      margin: 0;
    }

    .skip-link {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      padding: 0.5rem 1rem;
      background-color: var(--color-focus);
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      z-index: 100;
    }

    .skip-link:not(:focus):not(:active) {
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      height: 1px;
      overflow: hidden;
      position: absolute;
      white-space: nowrap;
      width: 1px;
    }

    .skip-link:focus {
      outline: 3px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e5e7eb;
    }

    .site-name {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 700;
    }

    main {
      max-width: 560px;
      margin: 2rem auto;
      padding: 0 1.5rem 3rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
    }

    .form-intro {
      color: var(--color-muted);
      margin: 0 0 2rem;
    }

    .form-field {
      margin-bottom: 1.5rem;
    }

    .field-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .required-star {
      color: var(--color-danger);
      margin-left: 0.15em;
    }

    .optional-note {
      font-weight: 400;
      color: var(--color-muted);
      font-size: 0.875rem;
      margin-left: 0.3em;
    }

    .helper-text {
      display: block;
      font-size: 0.875rem;
      color: var(--color-muted);
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      display: block;
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.5;
      color: var(--color-text);
      background-color: var(--color-bg);
      border: 2px solid var(--color-border);
      border-radius: 4px;
      min-width: 0;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: 3px solid var(--color-focus);
      outline-offset: 2px;
      border-color: var(--color-focus);
    }

    input[aria-invalid="true"] {
      border-color: var(--color-danger);
      background-color: var(--color-danger-bg);
    }

    input[aria-invalid="true"]:focus {
      border-color: var(--color-danger);
    }

    .error-message {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-danger);
      margin-top: 0.375rem;
    }

    button[type="submit"] {
      display: inline-block;
      padding: 0.625rem 1.75rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      line-height: 1.5;
      color: var(--color-btn-text);
      background-color: var(--color-btn-bg);
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.15s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      background-color: var(--color-btn-hover);
    }

    button[type="submit"]:active {
      background-color: var(--color-btn-active);
    }

    button[type="submit"]:focus {
      outline: 3px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    #success-message {
      padding: 1rem 1.25rem;
      border: 2px solid var(--color-success-border);
      border-radius: 4px;
      background-color: var(--color-success-bg);
      color: var(--color-success);
      font-weight: 600;
    }

    @media (forced-colors: active) {
      input[type="text"],
      input[type="email"],
      input[type="tel"] {
        border: 2px solid ButtonBorder;
      }

      input:focus {
        outline: 3px solid Highlight;
        outline-offset: 2px;
      }

      button[type="submit"] {
        border: 2px solid ButtonBorder;
      }

      button[type="submit"]:focus {
        outline: 3px solid Highlight;
      }

      #success-message {
        border: 2px solid CanvasText;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#maincontent">Skip to main content</a>

  <header>
    <p class="site-name">My Site</p>
  </header>

  <main id="maincontent" tabindex="-1">
    <h1>Contact Us</h1>
    <p class="form-intro">
      Complete the form below and we will get back to you.
      Required fields are marked with an asterisk (<span aria-hidden="true">*</span>).
    </p>

    <form id="contact-form" novalidate>

      <div class="form-field">
        <label class="field-label" for="full-name">
          Full Name<span class="required-star" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-required="true"
          aria-describedby="full-name-error"
        >
        <span id="full-name-error" class="error-message" aria-live="assertive"></span>
      </div>

      <div class="form-field">
        <label class="field-label" for="email">
          Email Address<span class="required-star" aria-hidden="true">*</span>
        </label>
        <span id="email-helper" class="helper-text">Enter your address in the format: name@example.com</span>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          inputmode="email"
          required
          aria-required="true"
          aria-describedby="email-helper email-error"
        >
        <span id="email-error" class="error-message" aria-live="assertive"></span>
      </div>

      <div class="form-field">
        <label class="field-label" for="phone">
          Phone Number<span class="optional-note">(optional)</span>
        </label>
        <span id="phone-helper" class="helper-text">Preferred format: (555) 555-5555</span>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          inputmode="tel"
          aria-describedby="phone-helper"
        >
      </div>

      <button type="submit">Submit</button>
    </form>

    <div
      id="success-message"
      hidden
      role="status"
      aria-live="polite"
      tabindex="-1"
    >
      Thank you! Your message has been sent. We will be in touch soon.
    </div>
  </main>

  <script>
    const form = document.getElementById('contact-form');
    const successMsg = document.getElementById('success-message');

    function markInvalid(inputId, errorId, message) {
      const input = document.getElementById(inputId);
      input.setAttribute('aria-invalid', 'true');
      document.getElementById(errorId).textContent = message;
    }

    function clearInvalid(inputId, errorId) {
      const input = document.getElementById(inputId);
      input.removeAttribute('aria-invalid');
      document.getElementById(errorId).textContent = '';
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const nameEl = document.getElementById('full-name');
      const emailEl = document.getElementById('email');

      let firstInvalid = null;
      let isValid = true;

      if (!nameEl.value.trim()) {
        markInvalid('full-name', 'full-name-error', 'Full Name is required.');
        if (!firstInvalid) firstInvalid = nameEl;
        isValid = false;
      } else {
        clearInvalid('full-name', 'full-name-error');
      }

      if (!emailEl.value.trim()) {
        markInvalid('email', 'email-error', 'Email Address is required.');
        if (!firstInvalid) firstInvalid = emailEl;
        isValid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim())) {
        markInvalid('email', 'email-error', 'Enter a valid email address, for example: name@example.com');
        if (!firstInvalid) firstInvalid = emailEl;
        isValid = false;
      } else {
        clearInvalid('email', 'email-error');
      }

      if (!isValid) {
        firstInvalid.focus();
        return;
      }

      form.hidden = true;
      successMsg.removeAttribute('hidden');
      successMsg.focus();
    });
  </script>
</body>
</html>
