<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog - Component Example</title>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --color-muted-text: #4a4a4a;
      --color-border: #767676;
      --color-focus: #0055cc;
      --color-primary: #0055cc;
      --color-primary-text: #ffffff;
      --color-primary-hover: #003d99;
      --color-secondary-bg: #f5f5f5;
      --color-secondary-hover: #e8e8e8;
      --color-overlay: rgba(0, 0, 0, 0.55);
      --focus-outline: 3px solid var(--color-focus);
      --focus-offset: 2px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    .sr-only {
      position: absolute;
    }

    .sr-only:not(:focus):not(:active) {
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      height: 1px;
      overflow: hidden;
      white-space: nowrap;
      width: 1px;
    }

    .sr-only:focus,
    .sr-only:active {
      background-color: var(--color-primary);
      color: var(--color-primary-text);
      padding: 0.5rem 1rem;
      text-decoration: none;
      z-index: 9999;
      top: 0.5rem;
      left: 0.5rem;
      border-radius: 4px;
    }

    header {
      background-color: var(--color-secondary-bg);
      border-bottom: 1px solid var(--color-border);
      padding: 0.875rem 1.5rem;
    }

    .site-name {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text);
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      margin-top: 0;
      margin-bottom: 0.5rem;
    }

    p {
      margin-top: 0;
      margin-bottom: 1.25rem;
      color: var(--color-muted-text);
    }

    /* Buttons */
    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      border-radius: 4px;
      padding: 0.5rem 1.25rem;
      line-height: 1.5;
      transition: background-color 0.1s, border-color 0.1s;
    }

    button:focus-visible {
      outline: var(--focus-outline);
      outline-offset: var(--focus-offset);
    }

    .trigger {
      background-color: var(--color-primary);
      color: var(--color-primary-text);
      border: 2px solid var(--color-primary);
    }

    .trigger:hover {
      background-color: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }

    .btn-secondary {
      background-color: var(--color-bg);
      color: var(--color-text);
      border: 2px solid var(--color-border);
    }

    .btn-secondary:hover {
      background-color: var(--color-secondary-hover);
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background-color: var(--color-overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay[data-open="true"] {
      display: flex;
    }

    /* Dialog */
    .modal-dialog {
      background-color: var(--color-bg);
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      outline: 2px solid transparent; /* visible in forced-colors */
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      margin: 0;
      color: var(--color-text);
    }

    .modal-close-btn {
      background: none;
      border: 2px solid transparent;
      border-radius: 4px;
      padding: 0.125rem 0.5rem;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--color-muted-text);
      flex-shrink: 0;
    }

    .modal-close-btn:hover {
      color: var(--color-text);
      border-color: var(--color-border);
      background-color: var(--color-secondary-bg);
    }

    .modal-body {
      margin-bottom: 1.5rem;
      color: var(--color-muted-text);
    }

    .modal-body p {
      margin-bottom: 0;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    /* Forced colors */
    @media (forced-colors: active) {
      .modal-dialog {
        border: 2px solid ButtonBorder;
        box-shadow: none;
      }

      .modal-overlay[data-open="true"] {
        background-color: Canvas;
        border: 4px solid ButtonBorder;
      }

      .trigger {
        forced-color-adjust: auto;
      }
    }

    /* Reflow at 320px */
    @media (max-width: 400px) {
      main {
        padding: 1.25rem 1rem;
      }

      .modal-footer {
        flex-direction: column-reverse;
      }

      .modal-footer button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="#maincontent" class="sr-only">Skip to main content</a>
    <p class="site-name">Component Library</p>
  </header>

  <main id="maincontent" tabindex="-1">
    <h1>Modal Dialog</h1>
    <p>Select the button below to open the modal dialog.</p>
    <button type="button" class="trigger" id="open-modal-btn" aria-haspopup="dialog">
      Open dialog
    </button>
  </main>

  <footer>
  </footer>

  <!-- Modal -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    data-open="false"
    aria-hidden="true"
  >
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-desc"
      id="modal-dialog"
      class="modal-dialog"
    >
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Confirm your action</h2>
        <button
          type="button"
          class="modal-close-btn"
          id="modal-close-btn"
          aria-label="Close dialog"
        >
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <p id="modal-desc">
          Are you sure you want to proceed? This action will save your changes and cannot be undone.
        </p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button type="button" class="trigger" id="modal-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var overlay   = document.getElementById('modal-overlay');
      var dialog    = document.getElementById('modal-dialog');
      var openBtn   = document.getElementById('open-modal-btn');
      var closeBtn  = document.getElementById('modal-close-btn');
      var cancelBtn = document.getElementById('modal-cancel-btn');
      var confirmBtn = document.getElementById('modal-confirm-btn');

      var FOCUSABLE_SELECTOR = [
        'a[href]',
        'button:not([disabled])',
        'input:not([disabled])',
        'select:not([disabled])',
        'textarea:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(', ');

      function getFocusableElements() {
        return Array.from(dialog.querySelectorAll(FOCUSABLE_SELECTOR)).filter(function (el) {
          return !el.closest('[hidden]') && !el.closest('[aria-hidden="true"]');
        });
      }

      function openModal() {
        overlay.setAttribute('data-open', 'true');
        overlay.removeAttribute('aria-hidden');

        document.addEventListener('keydown', onKeyDown);
        overlay.addEventListener('mousedown', onOverlayMouseDown);

        closeBtn.focus();
      }

      function closeModal() {
        overlay.setAttribute('data-open', 'false');
        overlay.setAttribute('aria-hidden', 'true');

        document.removeEventListener('keydown', onKeyDown);
        overlay.removeEventListener('mousedown', onOverlayMouseDown);

        openBtn.focus();
      }

      function trapFocus(e) {
        var focusable = getFocusableElements();
        if (!focusable.length) return;

        var first = focusable[0];
        var last  = focusable[focusable.length - 1];

        if (e.shiftKey) {
          if (document.activeElement === first) {
            e.preventDefault();
            last.focus();
          }
        } else {
          if (document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      }

      function onKeyDown(e) {
        if (e.key === 'Escape') {
          e.preventDefault();
          closeModal();
        } else if (e.key === 'Tab') {
          trapFocus(e);
        }
      }

      function onOverlayMouseDown(e) {
        if (e.target === overlay) {
          closeModal();
        }
      }

      openBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      cancelBtn.addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', function () {
        closeModal();
      });
    })();
  </script>

</body>
</html>
