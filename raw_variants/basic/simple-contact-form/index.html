<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — ShopCo</title>
  <style>
    /* ── Reset / tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /*
     * Contrast tokens — verified against WCAG SC 1.4.3 (4.5:1 text) and
     * SC 1.4.11 (3:1 UI components). Source: context7-mini-live contrast docs.
     */
    :root {
      --accent:      #005fcc;   /* on white 7.03:1 ✓ SC 1.4.3 */
      --accent-dark: #004ab8;   /* on white 9.10:1 ✓ */
      --text:        #111827;   /* on white 18.7:1 ✓ */
      --text-muted:  #4b5563;   /* on white  7.12:1 ✓ */
      --brand:       #1e3a5f;   /* on white 13.5:1 ✓ */
      --border:      #6b7280;   /* on white  4.59:1 ✓ SC 1.4.11 */
      --border-light:#d1d5db;
      --error:       #b91c1c;   /* on white  6.47:1 ✓ SC 1.4.3 */
      --success:     #14532d;   /* on white  9.92:1 ✓ */
      --radius:      0.375rem;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1.5rem;
    }

    /* ── Visually hidden ─────────────────────────────────────────────── */
    /*
     * Clip technique — keeps content in the accessibility tree.
     * DO NOT use display:none or visibility:hidden (removes from AT tree).
     * white-space:nowrap prevents text wrapping visible at high zoom.
     */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Focus styles — SC 2.4.7 + SC 2.4.11 (WCAG 2.2) ───────────── */
    /*
     * context7-mini-live: buttons need visible focus indicator.
     * 3px solid #005fcc on white = 7.03:1 ✓ SC 1.4.11, SC 2.4.11.
     * :focus-visible fires on keyboard/AT navigation only (not mouse click).
     * NEVER removed by prefers-reduced-motion — it is not animated.
     */
    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Page heading ────────────────────────────────────────────────── */
    /*
     * One <h1> per page — SC 1.3.1, SC 2.4.6.
     * id="page-heading" referenced by aria-labelledby on <form>.
     */
    .page-heading {
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--brand);
      margin-bottom: 0.375rem;
      text-align: center;
    }

    .page-sub {
      font-size: 0.9375rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 440px;
      line-height: 1.55;
      margin-bottom: 2rem;
    }

    /* ── Form card ───────────────────────────────────────────────────── */
    .form-card {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 0.75rem;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    /* ── Form ────────────────────────────────────────────────────────── */
    /*
     * novalidate — disables browser-native validation UI; our custom
     * accessible validation (role="alert" + aria-invalid) is used instead.
     *
     * aria-labelledby="page-heading" — names the form from the visible <h1>
     * so screen readers announce "Contact Us, form" on entry (SC 4.1.2).
     */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.375rem;
    }

    /* ── Field wrapper (class="form-field" as specified) ────────────── */
    /*
     * Each div.form-field contains: <label>, <input>, optional hint <p>,
     * and error <p role="alert">.
     */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    /* ── Labels ──────────────────────────────────────────────────────── */
    /*
     * Explicit <label for="…"> pairing — wider AT support than wrap-only.
     * SC 1.3.1, SC 4.1.2.
     */
    .form-label {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    /*
     * Required asterisk:
     *   • aria-hidden="true" — prevents "asterisk" being read aloud by AT.
     *   • Adjacent visually-hidden "(required)" span provides semantic signal.
     *   SC 1.3.1, SC 3.3.2.
     */
    .req-star {
      color: var(--error);   /* 6.47:1 ✓ SC 1.4.3 */
      margin-left: 0.2em;
      font-weight: 700;
    }

    /* ── Inputs ──────────────────────────────────────────────────────── */
    /*
     * context7-mini-live contrast docs: UI component borders need 3:1.
     * #6b7280 on white = 4.59:1 ✓ SC 1.4.11.
     */
    .form-input {
      padding: 0.5625rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s;
      width: 100%;
    }

    .form-input:hover { border-color: var(--accent); }

    .form-input:focus-visible {
      border-color: var(--accent);
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    /*
     * Error state — NOT colour alone (SC 1.4.1).
     * Multimodal signal: border colour change + border thickness increase
     * (1.5px → 2px) + error text below. Three distinct signals for users
     * with colour vision deficiency.
     */
    .form-input[aria-invalid="true"] {
      border: 2px solid var(--error);
    }

    .form-input[aria-invalid="true"]:focus-visible {
      outline: 3px solid var(--error);
      border-color: var(--error);
    }

    /* ── Hint text ───────────────────────────────────────────────────── */
    /*
     * Always visible — users see format guidance before typing (SC 3.3.2).
     * Referenced by aria-describedby on the input.
     */
    .field-hint {
      font-size: 0.8125rem;
      color: var(--text-muted);   /* 7.12:1 ✓ SC 1.4.3 */
      line-height: 1.5;
    }

    /* ── Error messages ──────────────────────────────────────────────── */
    /*
     * CRITICAL — no `hidden` attribute on these elements.
     *
     * role="alert" must be in the accessibility tree BEFORE text is injected.
     * If the element is hidden when text is injected, NVDA+Firefox,
     * VoiceOver+Safari, and JAWS skip the announcement silently.
     *
     * Correct approach: keep <p role="alert"> in DOM at all times.
     * Empty role="alert" = silent. JS sets textContent to announce,
     * clears textContent to silence. No visibility toggling needed.
     *
     * min-height:0 + empty content = zero visual height when no error.
     */
    .field-error {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--error);   /* 6.47:1 ✓ SC 1.4.3 */
      line-height: 1.5;
      min-height: 0;
    }

    /* ── Submit button ───────────────────────────────────────────────── */
    /*
     * context7-mini-live buttons docs:
     *   • Semantic <button> — implicit role="button", keyboard-operable
     *     (Enter + Space) without JS, receives focus natively.
     *   • type="submit" triggers form submission.
     *   • Accessible name from visible text "Send Message" (SC 4.1.2).
     *   • No aria-label needed — visible text IS the accessible name.
     *   • Contrast: white on #005fcc = 7.03:1 ✓ SC 1.4.3.
     */
    .btn-submit {
      margin-top: 0.5rem;
      padding: 0.6875rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: var(--accent-dark); }

    /* ── Success message ─────────────────────────────────────────────── */
    /*
     * role="status" + aria-live="polite" + aria-atomic="true":
     *   Polite — does not interrupt current speech.
     *   aria-atomic — announces the full message on any change.
     *
     * tabindex="-1" — allows JS .focus() so keyboard users hear the message
     * immediately without waiting for the polite live region timing.
     * Both pathways (focus + live region) fire to cover all AT/browser
     * combinations (SC 2.4.3, SC 4.1.3).
     */
    .success-msg {
      display: none;
      padding: 1rem;
      background: #f0fdf4;
      border: 1.5px solid #16a34a;   /* on white 4.55:1 ✓ SC 1.4.11 */
      border-radius: var(--radius);
      color: var(--success);   /* 9.92:1 ✓ SC 1.4.3 */
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.5;
    }

    .success-msg.is-visible { display: block; }

    /* ── Reduced motion ──────────────────────────────────────────────── */
    /*
     * Suppresses decorative transitions only.
     * :focus-visible outlines are NOT animated — unaffected by this rule.
     */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <!--
    One <h1> per page — SC 1.3.1, SC 2.4.6.
    id="page-heading" referenced by aria-labelledby on <form>.
  -->
  <h1 class="page-heading" id="page-heading">Contact Us</h1>
  <p class="page-sub">
    Fill in the form below and we'll get back to you within one business day.
  </p>

  <div class="form-card">

    <!--
      Success message region — MUST exist in initial HTML (never created by JS).
      role="status" + aria-live="polite" + aria-atomic="true" (SC 4.1.3).
      tabindex="-1" enables .focus() from JS (SC 2.4.3).
      JS reveals it after successful submit via display toggle + rAF pattern.
    -->
    <div
      class="success-msg"
      id="success-msg"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      tabindex="-1"
    ></div>

    <!--
      <form>:
        • novalidate — disables browser validation UI; our accessible
          validation provides role="alert" error announcements instead.
        • aria-labelledby="page-heading" — names the form from the <h1>
          so screen readers announce "Contact Us, form" on entry (SC 4.1.2).
    -->
    <form
      class="contact-form"
      id="contact-form"
      novalidate
      aria-labelledby="page-heading"
    >

      <!-- ── Full Name ─────────────────────────────────────────────── -->
      <!--
        div.form-field — as specified.
        Contains: label, input, error container.
      -->
      <div class="form-field">

        <!--
          Explicit <label for="full-name"> — SC 1.3.1, SC 4.1.2.
          • aria-hidden asterisk — prevents "asterisk" being read aloud.
          • visually-hidden "(required)" — semantic signal for AT.
          • native `required` attribute communicates constraint to AT;
            aria-required is NOT added (redundant with native required).
        -->
        <label class="form-label" for="full-name">
          Full Name
          <span class="req-star" aria-hidden="true">*</span>
          <span class="visually-hidden">(required)</span>
        </label>

        <!--
          • type="text" — correct for a person's name.
          • autocomplete="name" — SC 1.3.5 (Identify Input Purpose, AA).
          • required — native browser constraint.
          • aria-invalid ABSENT on load:
              Default invalid state is false when attribute is absent.
              Setting aria-invalid="false" explicitly causes some screen
              readers (JAWS 2024, older NVDA) to announce "invalid entry"
              before the user has typed anything. JS adds aria-invalid="true"
              on failure; removes the attribute entirely on recovery.
          • aria-describedby="name-error" — associates the error container.
        -->
        <input
          class="form-input"
          type="text"
          id="full-name"
          name="full-name"
          autocomplete="name"
          required
          aria-describedby="name-error"
        />

        <!--
          Error container — always in DOM (NO hidden attribute).
          role="alert" = assertive live region; fires on textContent change.
          Empty = silent. JS injects text to announce; clears to silence.
          SC 3.3.1, SC 4.1.3.
        -->
        <p class="field-error" id="name-error" role="alert"></p>

      </div>

      <!-- ── Email Address ─────────────────────────────────────────── -->
      <div class="form-field">

        <label class="form-label" for="email-address">
          Email Address
          <span class="req-star" aria-hidden="true">*</span>
          <span class="visually-hidden">(required)</span>
        </label>

        <!--
          • type="email" — invokes email keyboard on mobile; browser validates.
          • autocomplete="email" — SC 1.3.5.
          • aria-describedby="email-hint email-error":
              Hint ID FIRST so announcement order is:
              label → type → hint → error (correct cognitive sequence).
              Error ID last — user hears guidance before error detail.
        -->
        <input
          class="form-input"
          type="email"
          id="email-address"
          name="email-address"
          autocomplete="email"
          required
          aria-describedby="email-hint email-error"
        />

        <!--
          Hint text — always visible (SC 3.3.2).
          "Example:" is unambiguous; shortened to avoid repeating "email"
          from the label above.
        -->
        <p class="field-hint" id="email-hint">
          Example: name@example.com
        </p>

        <p class="field-error" id="email-error" role="alert"></p>

      </div>

      <!-- ── Phone Number ──────────────────────────────────────────── -->
      <div class="form-field">

        <!--
          No asterisk or "(required)" — field is optional (SC 3.3.2).
          Label text "Phone Number" alone is unambiguous.
        -->
        <label class="form-label" for="phone-number">
          Phone Number
        </label>

        <!--
          • type="tel" — invokes numeric keyboard on mobile.
          • autocomplete="tel" — SC 1.3.5.
          • No `required` — field is optional; no validation error container needed.
          • aria-describedby="phone-hint" only — hint explains optionality + format.
        -->
        <input
          class="form-input"
          type="tel"
          id="phone-number"
          name="phone-number"
          autocomplete="tel"
          aria-describedby="phone-hint"
        />

        <!--
          Hint clarifies both optionality and format.
          "Use the format" is unambiguous — no confusion about whether
          alternative formats are accepted (SC 3.3.2).
        -->
        <p class="field-hint" id="phone-hint">
          Optional. Use the format (555) 555-5555.
        </p>

      </div>

      <!-- ── Submit ────────────────────────────────────────────────── -->
      <!--
        context7-mini-live buttons docs:
          • Semantic <button> — implicit role="button"; keyboard-operable
            (Enter + Space) natively; receives focus without tabindex.
          • type="submit" triggers form submission.
          • Visible text "Send Message" is the accessible name (SC 2.4.6,
            SC 4.1.2). No aria-label needed.
          • Contrast: white on #005fcc = 7.03:1 ✓ SC 1.4.3.
      -->
      <button class="btn-submit" type="submit">
        Send Message
      </button>

    </form>
  </div>

  <script>
    /*
     * Contact form — accessible validation + success announcement
     * ─────────────────────────────────────────────────────────────────
     *
     * Workflow per accessibility-lead pre-flight:
     *
     * Error path:
     *   1. Inject error text into role="alert" containers (announces to AT).
     *   2. Set aria-invalid="true" on each failing input.
     *   3. Move focus to the first failing input (after text is ready).
     *      This order is mandatory — if focus moves before text is injected,
     *      screen readers read the field without the error description.
     *
     * Error recovery:
     *   • 'input' event on each required field:
     *     clear error text + removeAttribute("aria-invalid").
     *     removeAttribute is used (not setAttribute("false")) to avoid
     *     stale-attribute "invalid" announcements in JAWS / older NVDA.
     *
     * Success path:
     *   • Hide form, reveal success container.
     *   • Clear-then-rAF-then-set: clears textContent first so the live
     *     region fires even on repeat submissions with identical text.
     *   • .focus() on success element covers all AT/browser combos.
     */

    const form       = document.getElementById('contact-form');
    const successMsg = document.getElementById('success-msg');

    // ── Field registry ─────────────────────────────────────────────────
    const fields = {
      name: {
        input: document.getElementById('full-name'),
        error: document.getElementById('name-error'),
        label: 'Full Name',
        validate(val) {
          if (!val.trim()) return `${this.label} is required.`;
          return null;
        }
      },
      email: {
        input: document.getElementById('email-address'),
        error: document.getElementById('email-error'),
        label: 'Email Address',
        validate(val) {
          if (!val.trim()) return `${this.label} is required.`;
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim())) {
            return `${this.label} must be in the format name@example.com.`;
          }
          return null;
        }
      }
      // Phone is optional — no validation entry.
    };

    // ── showError / clearError ─────────────────────────────────────────
    function showError(field, message) {
      field.error.textContent = message;               // 1. inject (role=alert fires)
      field.input.setAttribute('aria-invalid', 'true'); // 2. mark invalid
    }

    function clearError(field) {
      field.error.textContent = '';
      field.input.removeAttribute('aria-invalid');     // remove, never set to "false"
    }

    // ── Live error clearing on input ───────────────────────────────────
    Object.values(fields).forEach(({ input, ...rest }) => {
      input.addEventListener('input', () => {
        if (input.getAttribute('aria-invalid') === 'true') {
          clearError({ input, ...rest });
        }
      });
    });

    // ── Submit handler ─────────────────────────────────────────────────
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const failures = [];
      Object.values(fields).forEach((field) => {
        const message = field.validate(field.input.value);
        if (message) {
          failures.push({ field, message });
        } else {
          clearError(field);
        }
      });

      if (failures.length > 0) {
        // Inject error text + set aria-invalid BEFORE moving focus
        // so the description is ready when screen reader reads the field.
        failures.forEach(({ field, message }) => showError(field, message));
        failures[0].field.input.focus();   // 3. move focus last

      } else {
        // Success — hide form, show + announce success message.
        form.style.display = 'none';
        successMsg.classList.add('is-visible');

        // Clear-then-rAF-then-set: forces DOM mutation detection
        // so the live region fires on every submit, not just the first.
        successMsg.textContent = '';
        requestAnimationFrame(() => {
          successMsg.textContent =
            'Thank you! Your message has been sent. We\u2019ll be in touch within one business day.';
          successMsg.focus();
        });
      }
    });
  </script>

</body>
</html>
