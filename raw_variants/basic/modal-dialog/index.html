<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Dialog — Basic Accessible Component</title>
  <style>
    /* ── Reset / tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #005fcc;   /* trigger bg, focus ring — white text 7.03:1 ✓ SC 1.4.3 */
      --accent-dark: #004ab8;   /* hover                  — white text 9.10:1 ✓ */
      --text:        #111827;   /* body text — on white 18.7:1 ✓ */
      --text-muted:  #4b5563;   /* secondary — on white  7.12:1 ✓ */
      --brand:       #1e3a5f;   /* headings  — on white 13.5:1 ✓ */
      --border:      #d1d5db;
      --danger:      #b91c1c;   /* cancel btn — white text 6.47:1 ✓ */
      --danger-dark: #991b1b;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
    }

    /*
     * Body scroll lock — applied by JS when the dialog opens.
     * Prevents background page from scrolling while the modal is active.
     * Removed inside the single `close` event listener so ALL close paths
     * (X, Cancel, Escape, backdrop click) clean up correctly.
     */
    body.dialog-open { overflow: hidden; }

    /* ── Page content ────────────────────────────────────────────────── */
    /*
     * <h1> — one per page (SC 2.4.6).
     * The dialog heading uses <h2>, not <h1> (SC 1.3.1).
     */
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--brand);
      text-align: center;
    }

    .description {
      font-size: 0.9375rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 400px;
    }

    /* ── Trigger button (class="trigger" as specified) ──────────────── */
    /*
     * aria-haspopup="dialog" — tells screen readers this button opens a
     * dialog. This is the correct value per WAI-ARIA 1.2.
     * NOT aria-expanded — that is for disclosure/accordion widgets only.
     * Accessible name comes from visible text content (SC 4.1.2).
     */
    .trigger {
      padding: 0.75rem 1.75rem;
      background: var(--accent);   /* white text 7.03:1 ✓ */
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .trigger:hover { background: var(--accent-dark); }

    .trigger:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Native <dialog> element ────────────────────────────────────── */
    /*
     * Native <dialog> with showModal() — semantic HTML first, ARIA minimal:
     *   • Implicit role="dialog" — do NOT add it manually (redundant).
     *   • showModal() makes background content inert — do NOT add
     *     aria-modal="true" manually (it is implicit; adding it can
     *     confuse legacy AT that does not understand the top layer).
     *   • Browser provides native focus trap (Tab / Shift+Tab).
     *   • Escape key closes natively and fires the `close` event.
     *   • ::backdrop pseudo-element provides the overlay — no extra div.
     *
     * aria-labelledby="dialog-title" — names the dialog from its <h2>
     * so screen readers announce "Confirm Action, dialog" on open.
     *
     * outline:none is safe here because focus is placed on the close
     * button (which has its own visible focus style), not on <dialog>.
     */
    dialog {
      padding: 0;
      border: none;
      border-radius: 0.75rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      width: min(460px, calc(100vw - 2rem));
      max-height: calc(100dvh - 4rem);
      overflow-y: auto;
      outline: none;
    }

    /*
     * Backdrop — the ::backdrop pseudo-element is NOT a focusable element,
     * so the native focus trap is never interrupted.
     * Backdrop click → dialog.close() is handled in JS (event.target check).
     */
    dialog::backdrop {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
    }

    /* ── Dialog header: title + X close button ──────────────────────── */
    .dialog-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    /*
     * <h2> — dialog heading; page already has <h1> so h2 is correct (SC 1.3.1).
     * id="dialog-title" is referenced by aria-labelledby on the <dialog>
     * so screen readers announce the title when the dialog opens.
     */
    .dialog-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    /*
     * X close button — icon-only:
     *   • aria-label="Close dialog" is the accessible name (SC 4.1.2).
     *   • SVG has aria-hidden="true" + focusable="false" — decorative icon.
     *     focusable="false" is required for IE/legacy Edge compatibility.
     *   • data-close used as a JS hook for the close handler.
     */
    .btn-close {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 0.375rem;
      color: var(--text-muted);   /* #4b5563 on #fff = 7.12:1 ✓ SC 1.4.3 */
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-close:hover { background: #f3f4f6; color: var(--text); }

    .btn-close:focus-visible {
      outline: 3px solid var(--accent);   /* 7.03:1 ✓ SC 1.4.11 */
      outline-offset: 2px;
    }

    /* ── Dialog body ─────────────────────────────────────────────────── */
    .dialog-body {
      padding: 1.25rem 1.5rem;
    }

    .dialog-body p {
      font-size: 0.9375rem;
      color: var(--text-muted);   /* 7.12:1 ✓ SC 1.4.3 */
      line-height: 1.65;
    }

    .dialog-body p + p { margin-top: 0.75rem; }

    /* ── Dialog footer: action buttons ──────────────────────────────── */
    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1rem 1.5rem 1.25rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    /* Cancel — outlined style */
    .btn-cancel {
      padding: 0.5625rem 1.125rem;
      background: #fff;
      color: var(--text);             /* 18.7:1 ✓ SC 1.4.3 */
      border: 1.5px solid #6b7280;   /* border 4.59:1 on white ✓ SC 1.4.11 */
      border-radius: 0.375rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-cancel:hover { background: #f9fafb; border-color: #374151; }

    .btn-cancel:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    /* Confirm — filled primary */
    .btn-confirm {
      padding: 0.5625rem 1.125rem;
      background: var(--accent);   /* white text 7.03:1 ✓ */
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-confirm:hover { background: var(--accent-dark); }

    .btn-confirm:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Reduced motion ──────────────────────────────────────────────── */
    /*
     * Suppress any dialog entry/exit animations for users who have
     * requested reduced motion. The functional toggle (open/close) is
     * unaffected — only the decorative animation is removed.
     */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <!--
    One <h1> per page — SC 2.4.6.
    The dialog heading uses <h2> (see below), never <h1>.
  -->
  <h1>Modal Dialog Demo</h1>
  <p class="description">
    Click the button below to open the dialog.
    Keyboard: <kbd>Tab</kbd> cycles within the dialog,
    <kbd>Escape</kbd> closes it.
  </p>

  <!--
    Trigger button:
      • class="trigger" — as specified.
      • type="button" — prevents accidental form submission.
      • aria-haspopup="dialog" — signals a dialog will open.
        NOT aria-expanded — that is for disclosure widgets only.
      • Accessible name from visible text "Open Dialog" (SC 4.1.2).
  -->
  <button
    class="trigger"
    type="button"
    aria-haspopup="dialog"
  >
    Open Dialog
  </button>

  <!--
    Native <dialog> element:
      • No `open` attribute — closed by default (opened via JS showModal()).
      • aria-labelledby="dialog-title" — names the dialog from its <h2>.
      • role="dialog" is implicit on <dialog> — NOT declared manually.
      • aria-modal is set automatically by showModal() — NOT declared manually.
  -->
  <dialog
    id="main-dialog"
    aria-labelledby="dialog-title"
  >

    <!-- Dialog header: title + X close button -->
    <div class="dialog-header">

      <!--
        <h2> — dialog heading; page already has <h1> so h2 is correct (SC 1.3.1).
        id="dialog-title" is referenced by aria-labelledby on the <dialog>.
      -->
      <h2 class="dialog-title" id="dialog-title">
        Confirm Action
      </h2>

      <!--
        X close button:
          • aria-label="Close dialog" — accessible name (SC 4.1.2).
          • SVG has aria-hidden="true" + focusable="false" — decorative.
          • data-close — JS hook for the unified close handler.
      -->
      <button
        class="btn-close"
        type="button"
        aria-label="Close dialog"
        data-close
      >
        <svg
          aria-hidden="true"
          focusable="false"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

    </div>

    <!-- Dialog body -->
    <div class="dialog-body">
      <p>
        Are you sure you want to proceed? This will apply your selected
        settings and cannot be undone immediately.
      </p>
      <p>
        Review your choices carefully before confirming.
      </p>
    </div>

    <!-- Dialog footer: action buttons -->
    <div class="dialog-footer">

      <!--
        Cancel — dismisses without action.
        data-close attribute targeted by the JS close handler.
        Accessible name from visible text "Cancel" (SC 4.1.2).
      -->
      <button
        class="btn-cancel"
        type="button"
        data-close
      >
        Cancel
      </button>

      <!--
        Confirm — performs the action then closes.
        Accessible name from visible text "Confirm" (SC 4.1.2).
      -->
      <button
        class="btn-confirm"
        type="button"
        id="btn-confirm"
      >
        Confirm
      </button>

    </div>

  </dialog>

  <script>
    /*
     * Modal dialog — accessible open / close
     * ────────────────────────────────────────────────────────────────
     *
     * Why native <dialog> + showModal():
     *   • Built-in focus trap (Tab / Shift+Tab cycle within dialog).
     *   • Native Escape key handling → fires the `close` event.
     *   • Top-layer rendering → no z-index stacking issues.
     *   • ::backdrop pseudo-element → no extra overlay div needed.
     *   • Implicit role="dialog" and aria-modal → no manual ARIA needed.
     *
     * Focus management (SC 2.4.3):
     *   • On open  → focus the close (X) button explicitly. Do not rely
     *     on autofocus alone; it is inconsistent across browser/AT combos.
     *   • On close → return focus to the element that opened the dialog
     *     (openerRef), stored before showModal() so it is available for
     *     ALL close paths via the single `close` event listener.
     *
     * Close paths — all fire `dialog.close()`, cleanup handled once:
     *   A. X button  (data-close)   → dialog.close()
     *   B. Cancel    (data-close)   → dialog.close()
     *   C. Confirm   (#btn-confirm) → dialog.close()
     *   D. Escape key               → handled natively by <dialog>
     *   E. Backdrop click           → detected via event.target === dialog
     */

    const dialog   = document.getElementById('main-dialog');
    const trigger  = document.querySelector('.trigger');
    const closeBtn = dialog.querySelector('.btn-close');

    // Holds the element that triggered the dialog — used to return focus
    // on close regardless of which close path was taken (SC 2.4.3).
    let openerRef = null;

    // ── Open ──────────────────────────────────────────────────────────
    trigger.addEventListener('click', () => {
      // Store opener BEFORE showModal() so focus has already moved.
      openerRef = document.activeElement;

      dialog.showModal();   // opens as modal in the top layer

      // Body scroll lock — prevents background page from scrolling.
      // Removed in the unified `close` listener below so ALL close
      // paths (X, Cancel, Confirm, Escape, backdrop) clean up correctly.
      document.body.classList.add('dialog-open');

      // Explicit focus on the X close button (first interactive element).
      // Never rely on browser implicit focus placement — it varies across
      // browser/AT combinations.
      closeBtn.focus();
    });

    // ── Close: X button and Cancel button (data-close selector) ──────
    dialog.querySelectorAll('[data-close]').forEach((btn) => {
      btn.addEventListener('click', () => dialog.close());
    });

    // ── Close: Confirm button ─────────────────────────────────────────
    document.getElementById('btn-confirm').addEventListener('click', () => {
      // Demo only — replace with real action in production.
      alert('Action confirmed. (Demo — nothing was changed.)');
      dialog.close();
    });

    // ── Close: Backdrop click ─────────────────────────────────────────
    /*
     * A click on the <dialog> element itself (not any child inside it)
     * means the user clicked the ::backdrop area. The event.target check
     * is mandatory — without it, clicking anywhere inside the dialog
     * would also trigger a close.
     */
    dialog.addEventListener('click', (e) => {
      if (e.target === dialog) dialog.close();
    });

    // ── Unified close handler — runs for ALL close paths ─────────────
    /*
     * This single listener covers every close path:
     *   X button, Cancel, Confirm, Escape key, backdrop click.
     *
     * Responsibilities:
     *   1. Remove body scroll lock.
     *   2. Return focus to the opener (SC 2.4.3).
     *      Falls back to document.body if the opener was removed from DOM.
     *
     * Important: do NOT add a separate keydown listener for Escape.
     * <dialog> handles Escape natively and fires this `close` event.
     * A duplicate keydown listener causes a double-close error.
     */
    dialog.addEventListener('close', () => {
      document.body.classList.remove('dialog-open');

      if (openerRef && document.contains(openerRef)) {
        openerRef.focus();
      } else {
        document.body.focus();
      }
      openerRef = null;
    });
  </script>

</body>
</html>
