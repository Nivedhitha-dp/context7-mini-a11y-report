<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — ShopMin</title>
  <style>
    /* ── Reset / tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #005fcc;   /* on white  7.03:1 ✓ SC 1.4.3 */
      --accent-dark: #004ab8;   /* on white  9.10:1 ✓ */
      --text:        #111827;   /* on white 18.7:1  ✓ */
      --text-muted:  #4b5563;   /* on white  7.12:1 ✓ */
      --brand:       #1e3a5f;   /* on white 13.5:1  ✓ */
      --border:      #6b7280;   /* on white  4.59:1 ✓ SC 1.4.11 */
      --border-focus:#005fcc;
      --error:       #b91c1c;   /* on white  6.47:1 ✓ */
      --error-bg:    #fef2f2;
      --success-bg:  #f0fdf4;
      --success-text:#14532d;   /* on #f0fdf4 9.38:1 ✓ */
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    /* ── Visually-hidden utility ─────────────────────────────────────── */
    /*
     * Hides content visually while keeping it in the accessibility tree.
     * Used for: required-field note text appended to labels.
     */
    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Page layout ─────────────────────────────────────────────────── */
    .page-wrapper {
      max-width: 520px;
      margin: 0 auto;
    }

    /*
     * <h1> — one per page, names the page (SC 2.4.6).
     * Descriptive title matches the <title> element.
     */
    .page-title {
      font-size: clamp(1.375rem, 5vw, 1.875rem);
      font-weight: 800;
      color: var(--brand);
      margin-bottom: 0.375rem;
    }

    .page-desc {
      font-size: 0.9375rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    /* ── Form card ───────────────────────────────────────────────────── */
    .form-card {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 0.75rem;
      padding: 2rem;
    }

    /*
     * Required-field legend (SC 1.3.1 / 3.3.2):
     * Appears BEFORE the first field in DOM order so screen reader
     * users encounter the convention before reaching required inputs.
     * aria-hidden on the asterisk — the text "(required)" in labels
     * is read by AT instead; asterisk is purely visual.
     */
    .required-note {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .required-note .req-star {
      color: var(--error);     /* decorative — aria-hidden */
      font-weight: 700;
    }

    /* ── div.form-field — wraps label + input + helper/error ─────────── */
    /*
     * Each .form-field contains:
     *   <label> → <input> → .field-hint (helper text) → .field-error
     * No element is visually reordered from DOM order (SC 2.1.1).
     */
    .form-field {
      margin-bottom: 1.25rem;
    }

    .form-field:last-of-type { margin-bottom: 0; }

    /* ── Label ───────────────────────────────────────────────────────── */
    /*
     * for="..." matches id="..." on each input (SC 4.1.2).
     * Required indicator: visible asterisk (aria-hidden) + visually-hidden
     * "(required)" text inside the label for screen readers.
     * Phone label has no asterisk/required text — optional field.
     */
    .form-label {
      display: block;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.375rem;
    }

    .req-star {
      color: var(--error);
      font-weight: 700;
      margin-left: 0.125rem;
    }

    /* ── Input ───────────────────────────────────────────────────────── */
    /*
     * type="text"  → Full Name  (autocomplete="name")
     * type="email" → Email      (autocomplete="email") SC 1.3.5
     * type="tel"   → Phone      (autocomplete="tel")   SC 1.3.5
     *
     * aria-describedby links hint + error IDs.
     * aria-invalid="false" set in HTML; JS flips to "true" on error.
     * required on Full Name + Email; NOT on Phone (optional).
     */
    .form-input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      color: var(--text);        /* #111827 on #fff = 18.7:1 ✓ */
      background: #fff;
      border: 1.5px solid var(--border);  /* 4.59:1 on #f3f4f6 ✓ SC 1.4.11 */
      border-radius: 0.375rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-input::placeholder {
      color: #6b7280;  /* 4.59:1 on white ✓ SC 1.4.3 */
    }

    .form-input:hover {
      border-color: var(--brand);
    }

    /*
     * Focus indicator — SC 2.4.7 / SC 1.4.11.
     * #005fcc ring on white background = 7.03:1 ✓ (well above 3:1 threshold).
     * outline-offset: 0 keeps ring tight to the input boundary.
     */
    .form-input:focus-visible {
      outline: 3px solid var(--border-focus);
      outline-offset: 0;
      border-color: var(--border-focus);
      box-shadow: none;
    }

    /*
     * Error state — border turns red when aria-invalid="true".
     * Red communicates error visually; aria-invalid + error text
     * communicate it to AT. Color is NOT the sole indicator (SC 1.4.1).
     */
    .form-input[aria-invalid="true"] {
      border-color: var(--error);
    }

    .form-input[aria-invalid="true"]:focus-visible {
      outline-color: var(--error);
      border-color: var(--error);
    }

    /* ── Helper text (hint) ──────────────────────────────────────────── */
    /*
     * Always visible — not hidden on load (SC 3.3.2).
     * id referenced by aria-describedby on the input (SC 1.3.1).
     */
    .field-hint {
      margin-top: 0.3125rem;
      font-size: 0.8125rem;
      color: var(--text-muted);   /* 7.12:1 on white ✓ SC 1.4.3 */
      line-height: 1.5;
    }

    /* ── Error message ───────────────────────────────────────────────── */
    /*
     * Pre-rendered in DOM (not JS-injected) so aria-describedby
     * association is registered by AT before any interaction.
     * Hidden via `hidden` attribute on load; revealed by JS on error.
     * role="alert" → assertive live region; announces when unhidden.
     * SC 3.3.1 / SC 4.1.3.
     *
     * Error text is descriptive and provides correction guidance (SC 3.3.3).
     */
    .field-error {
      margin-top: 0.3125rem;
      font-size: 0.8125rem;
      color: var(--error);     /* 6.47:1 on white ✓ SC 1.4.3 */
      font-weight: 600;
      line-height: 1.5;
    }

    .field-error[hidden] { display: none; }

    /* ── Submit button ───────────────────────────────────────────────── */
    /*
     * type="submit" — activates on Enter and Space natively.
     * Accessible name from visible text "Send Message" (SC 4.1.2 / SC 2.5.3).
     * SC 1.4.3: white on #005fcc = 7.03:1 ✓.
     */
    .btn-submit {
      width: 100%;
      margin-top: 1.75rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: var(--accent-dark); }

    .btn-submit:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Success message ─────────────────────────────────────────────── */
    /*
     * role="status" aria-live="polite" — SC 4.1.3.
     * Present in DOM at load (empty); text injected by JS after submit
     * so the live region is already registered when announcement fires.
     * tabindex="-1" allows JS to move focus here on success.
     */
    .success-message {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--success-bg);
      border: 1.5px solid #86efac;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      color: var(--success-text);  /* 9.38:1 on #f0fdf4 ✓ SC 1.4.3 */
      font-weight: 600;
      line-height: 1.5;
    }

    .success-message[hidden] { display: none; }

    /* ── Reduced motion ──────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <!--
      <h1> — one per page (non-negotiable standard).
      Descriptive name that matches the <title> (SC 2.4.6).
    -->
    <h1 class="page-title">Contact Us</h1>
    <p class="page-desc">
      Fill in the form below and we will get back to you within two business days.
    </p>

    <div class="form-card">

      <!--
        Required-field legend — SC 1.3.1 / SC 3.3.2.
        MUST appear before the first required field in DOM order
        so screen reader users know the asterisk convention before
        they reach the labeled inputs.
        The asterisk is aria-hidden; the words "required" appear
        in each required label as visually-hidden text.
      -->
      <p class="required-note">
        Fields marked <span class="req-star" aria-hidden="true">*</span> are required.
      </p>

      <!--
        <form>:
          • aria-labelledby="form-heading" — names the form region (SC 4.1.2).
          • novalidate — disables browser native validation UI so we can
            provide custom, accessible error messages with aria-invalid
            and role="alert" (SC 3.3.1 / 3.3.3).
          • action / method omitted in this demo; add for production use.
      -->
      <form
        id="contact-form"
        aria-labelledby="form-heading"
        novalidate
      >
        <!--
          Visually-hidden form heading — associates the form as a landmark
          via aria-labelledby. Not shown visually since the page <h1>
          already names the page. An <h2> is used to maintain heading
          hierarchy in case additional sections are added (SC 1.3.1).
        -->
        <h2 id="form-heading" class="visually-hidden">Contact form</h2>

        <!-- ── Field 1: Full Name ───────────────────────────────────── -->
        <!--
          div.form-field wraps label + input + hint + error as specified.

          Label:
            • for="full-name" matches id="full-name" on the input (SC 4.1.2).
            • Asterisk <span aria-hidden="true"> — visual only.
            • " (required)" inside .visually-hidden — read by AT (SC 1.3.1).

          Input:
            • type="text" — correct semantic type for a name.
            • autocomplete="name" — SC 1.3.5 Input Purpose.
            • required — programmatic required state (SC 1.3.1 / 3.3.2).
            • aria-invalid="false" — initialised; JS sets "true" on error.
            • aria-describedby="name-error" — links error message.
              (No persistent hint for this field; only error feedback.)
        -->
        <div class="form-field">
          <label class="form-label" for="full-name">
            Full Name
            <span class="req-star" aria-hidden="true">*</span>
            <span class="visually-hidden">(required)</span>
          </label>
          <input
            class="form-input"
            type="text"
            id="full-name"
            name="full-name"
            autocomplete="name"
            required
            aria-required="true"
            aria-invalid="false"
            aria-describedby="name-error"
            placeholder="e.g. Jane Smith"
          />
          <!--
            Error container — pre-rendered, hidden at load.
            role="alert" announces when revealed (SC 3.3.1 / SC 4.1.3).
            Error text is descriptive (SC 3.3.3).
          -->
          <p
            class="field-error"
            id="name-error"
            role="alert"
            hidden
          ></p>
        </div>

        <!-- ── Field 2: Email Address ───────────────────────────────── -->
        <!--
          Helper text (hint):
            • id="email-hint" — always visible, not toggled by JS.
            • Explains expected format (SC 3.3.2).

          Input:
            • type="email" — semantic type; enables appropriate keyboard on mobile.
            • autocomplete="email" — SC 1.3.5.
            • aria-describedby="email-hint email-error" — dual-ID pattern:
              hint is read first, then error (when revealed). Both IDs must
              exist in the DOM at page load for AT to register the association.
        -->
        <div class="form-field">
          <label class="form-label" for="email-address">
            Email Address
            <span class="req-star" aria-hidden="true">*</span>
            <span class="visually-hidden">(required)</span>
          </label>
          <input
            class="form-input"
            type="email"
            id="email-address"
            name="email"
            autocomplete="email"
            required
            aria-required="true"
            aria-invalid="false"
            aria-describedby="email-hint email-error"
            placeholder="name@example.com"
          />
          <!--
            Helper text — always visible (SC 3.3.2).
            Explains the expected format.
          -->
          <p class="field-hint" id="email-hint">
            Enter your email in the format <strong>name@example.com</strong>.
          </p>
          <p
            class="field-error"
            id="email-error"
            role="alert"
            hidden
          ></p>
        </div>

        <!-- ── Field 3: Phone Number (optional) ────────────────────── -->
        <!--
          Phone is optional:
            • No `required` attribute (SC 3.3.2).
            • No asterisk or "(required)" in label.
            • Helper text explicitly states the field is optional AND
              explains the preferred format (SC 3.3.2).
            • autocomplete="tel" — SC 1.3.5.
            • type="tel" — correct semantic type; shows numeric keyboard
              on mobile devices.
            • aria-describedby="phone-hint" — only hint; no validation
              error handling needed since the field is optional and not
              format-validated in this demo.
        -->
        <div class="form-field">
          <label class="form-label" for="phone-number">
            Phone Number
          </label>
          <input
            class="form-input"
            type="tel"
            id="phone-number"
            name="phone"
            autocomplete="tel"
            aria-describedby="phone-hint"
            placeholder="(555) 555-5555"
          />
          <!--
            Helper text — states the field is optional AND the preferred format.
            Sighted users may assume all form fields are required; this text
            removes that ambiguity (SC 3.3.2).
          -->
          <p class="field-hint" id="phone-hint">
            Optional. Preferred format: <strong>(555) 555-5555</strong>.
          </p>
        </div>

        <!--
          Submit button:
            • type="submit" — activates on Enter (in text inputs) and
              Space/Enter when focused. Native semantics; no JS needed
              for keyboard support (SC 2.1.1).
            • Accessible name "Send Message" from visible text (SC 4.1.2).
            • Visible text matches accessible name — SC 2.5.3 Label in Name ✓.
        -->
        <button class="btn-submit" type="submit">
          Send Message
        </button>

      </form>

      <!--
        Success message region:
          • role="status" aria-live="polite" aria-atomic="true" — SC 4.1.3.
          • Present in DOM at page load (empty, hidden) so AT registers
            the live region BEFORE text is injected. Injecting both the
            container and its text at the same time prevents announcement.
          • tabindex="-1" — allows JS to move focus here on success so
            keyboard users are also informed without requiring navigation.
          • Hidden via `hidden` attribute on load.
      -->
      <div
        id="success-message"
        class="success-message"
        role="status"
        aria-live="polite"
        aria-atomic="true"
        tabindex="-1"
        hidden
      ></div>

    </div><!-- /.form-card -->

  </div><!-- /.page-wrapper -->

  <script>
    /*
     * Contact form — accessible validation and submission
     *
     * Validation strategy (WCAG AA):
     *   • novalidate on <form> — use custom validation so we control
     *     error message markup (aria-invalid + role="alert").
     *   • On submit: validate all required fields → collect errors →
     *     reveal error messages → set aria-invalid="true" →
     *     move focus to first invalid field (SC 3.3.1 / SC 2.4.3).
     *   • On input: live-clear errors as user corrects each field.
     *   • On success: hide form, inject success message, move focus
     *     to success region (SC 4.1.3).
     */

    const form         = document.getElementById('contact-form');
    const successEl    = document.getElementById('success-message');

    // Field references
    const nameInput    = document.getElementById('full-name');
    const nameError    = document.getElementById('name-error');
    const emailInput   = document.getElementById('email-address');
    const emailError   = document.getElementById('email-error');

    // ── Validation helpers ─────────────────────────────────────────────

    function showError(input, errorEl, message) {
      input.setAttribute('aria-invalid', 'true');
      errorEl.textContent = message;
      errorEl.removeAttribute('hidden');
    }

    function clearError(input, errorEl) {
      input.setAttribute('aria-invalid', 'false');
      errorEl.textContent = '';
      errorEl.setAttribute('hidden', '');
    }

    /*
     * Live error clearing — SC 3.3.1 / SC 3.3.4:
     * As the user corrects a field, clear its error immediately so
     * they are not left with a stale "required" message while typing.
     */
    nameInput.addEventListener('input', () => {
      if (nameInput.value.trim()) clearError(nameInput, nameError);
    });

    emailInput.addEventListener('input', () => {
      if (emailInput.value.trim() && emailInput.validity.valid) {
        clearError(emailInput, emailError);
      }
    });

    // ── Submit handler ─────────────────────────────────────────────────
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      let firstInvalidField = null;

      // Validate Full Name
      if (!nameInput.value.trim()) {
        showError(nameInput, nameError, 'Full Name is required.');
        if (!firstInvalidField) firstInvalidField = nameInput;
      } else {
        clearError(nameInput, nameError);
      }

      // Validate Email Address
      if (!emailInput.value.trim()) {
        showError(emailInput, emailError, 'Email Address is required.');
        if (!firstInvalidField) firstInvalidField = emailInput;
      } else if (!emailInput.validity.valid) {
        showError(
          emailInput,
          emailError,
          'Enter a valid email address, for example name@example.com.'
        );
        if (!firstInvalidField) firstInvalidField = emailInput;
      } else {
        clearError(emailInput, emailError);
      }

      // Phone is optional — no validation required

      if (firstInvalidField) {
        /*
         * Move focus to first invalid field (SC 2.4.3 / SC 3.3.1).
         * This ensures keyboard and AT users are taken directly to
         * the problem without having to navigate the page manually.
         */
        firstInvalidField.focus();
        return;
      }

      // ── All valid — simulate submission ───────────────────────────
      /*
       * Success state:
       *   1. Hide the form so focus cannot land on now-invisible elements.
       *   2. Inject success message text into the pre-registered live
       *      region (role="status") — SC 4.1.3.
       *   3. Remove `hidden` to make the region visible.
       *   4. Move focus to the success container so keyboard users are
       *      informed even if they do not rely on live regions.
       */
      form.hidden = true;

      // Clear then set (ensures re-announcement if submitted twice in a session)
      successEl.textContent = '';
      successEl.removeAttribute('hidden');

      requestAnimationFrame(() => {
        successEl.textContent =
          'Thank you! Your message has been sent. We will get back to you within two business days.';
        successEl.focus();
      });
    });
  </script>

</body>
</html>
